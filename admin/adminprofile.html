<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile | PUPBC CareLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafb; padding: 2rem; }

        
        .clay-card {
            background: white;
            border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            overflow: hidden;
        }

        /* --- NAVBAR HEADER STYLE --- */
        .nav-navbar-header {
            background-color: #0D141A; /* Black Top Part */
            padding: 5px 10px;
            border-bottom: 5px solid #000000; /* Black Bottom Part */
        }

        .nav-navbar-header .nav-link {
            color: rgba(255, 255, 255, 0.6); /* Subtle white when inactive */
            border-radius: 0;
            font-weight: 600;
            padding: 15px 25px;
            transition: all 0.3s ease;
            background: transparent;
            border: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* HOVER EFFECT: Pure White */
        .nav-navbar-header .nav-link:hover {
            color: #FFFFFF !important;
            background: rgba(255, 255, 255, 0.1);
        }

        /* ACTIVE STATE */
        .nav-navbar-header .nav-link.active {
            background-color: transparent !important;
            color: #FFFFFF !important;
            position: relative;
        }

        .nav-navbar-header .nav-link.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 25px;
            right: 25px;
            height: 3px;
            background-color: #FFFFFF;
        }

        /* --- ORIGINAL CONTENT STYLES --- */
        .profile-label { color: #8898aa; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        .profile-value { color: #32325d; font-weight: 500; margin-bottom: 1.5rem; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #e9ecef; }
        .btn-save { background: #9C0C20; color: white; border-radius: 10px; padding: 10px 30px; border: none; font-weight: 600; }
        .btn-save:hover { background: #7a0919; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <h3 class="fw-bold mb-4">Profile Management</h3>
                
                <div class="clay-card">
                    <div class="nav-navbar-header">
                        <ul class="nav nav-pills" id="profileTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="view-tab" data-bs-toggle="pill" data-bs-target="#view-content" type="button">
                                    <i class="fa-solid fa-eye me-2"></i>View Profile
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="edit-tab" data-bs-toggle="pill" data-bs-target="#edit-content" type="button">
                                    <i class="fa-solid fa-pen-to-square me-2"></i>Edit Profile
                                </button>
                            </li>
                        </ul>
                    </div>

                    <div class="tab-content p-4" id="profileTabsContent">
                        
                        <div class="tab-pane fade show active" id="view-content" role="tabpanel">
                            <div class="row">
                                <div class="col-md-4 text-center border-end">
                                    <div class="bg-dark text-white rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 120px; height: 120px; font-size: 3rem;">
                                        <i class="fa-solid fa-user-shield"></i>
                                    </div>
                                    <h5 class="fw-bold">System Admin</h5>
                                    <p class="badge bg-primary-subtle text-primary rounded-pill">Active Session</p>
                                </div>
                                <div class="col-md-8 ps-md-5">
                                    <div class="row">
                                        <div class="col-6">
                                            <div class="profile-label">Admin ID</div>
                                            <div class="profile-value">2026-00870-ADN-0</div>
                                        </div>
                                        <div class="col-6">
                                            <div class="profile-label">Role</div>
                                            <div class="profile-value">Master Administrator</div>
                                        </div>
                                        <div class="col-6">
                                            <div class="profile-label">Email Address</div>
                                            <div class="profile-value">admin.carelink@pup.edu.ph</div>
                                        </div>
                                        <div class="col-6">
                                            <div class="profile-label">Phone Number</div>
                                            <div class="profile-value">+63 912 345 6789</div>
                                        </div>
                                        <div class="col-12">
                                            <div class="profile-label">Office Location</div>
                                            <div class="profile-value">PUP Biñan Campus - Medical Unit</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="edit-content" role="tabpanel">
                            <form>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Full Name</label>
                                        <input type="text" class="form-control" value="System Admin">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Email Address</label>
                                        <input type="email" class="form-control" value="admin.carelink@pup.edu.ph">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Contact Number</label>
                                        <input type="text" class="form-control" value="+63 912 345 6789">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Update Password</label>
                                        <input type="password" class="form-control" placeholder="Enter new password">
                                    </div>
                                    
                                    <div class="col-12 text-end mt-4">
                                        <button type="button" class="btn btn-light border rounded-pill px-4 me-2">Cancel</button>
                                        <button type="submit" class="btn-save shadow-sm">Save Changes</button>
                                    </div>
                                </div>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Anti-Direct Access Logic
    if (window.self === window.top) {
        const currentPage = window.location.pathname.split("/").pop();
        window.location.href = "admindashboard.html?page=" + currentPage;
    }
</script>
</body>
</html>
