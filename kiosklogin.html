<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareLink | Kiosk QR Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867;
            --clay-bg: #f8f9fa;
            --clay-shadow: 12px 12px 24px #d1d9e6, -12px -12px 24px #ffffff;
            --clay-inset: inset 6px 6px 12px #d1d9e6, inset -6px -6px 12px #ffffff;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #e0e5ec;
            overflow: hidden;
        }

        .kiosk-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
            width: 100vw;
        }

        /* --- LEFT SIDE: THE SCANNER --- */
        .scanner-panel {
            background: linear-gradient(135deg, var(--pup-maroon), #6b0816);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            position: relative;
        }

        .scanner-frame {
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 20px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        #reader {
            width: 100%;
            height: 100%;
            border-radius: 35px;
            overflow: hidden;
            background: #000;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            border-radius: 35px;
        }

        #reader__scan_region { background: transparent !important; }
        #reader__dashboard { display: none !important; }

        .laser {
            position: absolute;
            width: 90%;
            height: 4px;
            background: #ff4d4d;
            left: 5%;
            z-index: 10;
            box-shadow: 0 0 20px #ff4d4d;
            animation: scan-anim 3s infinite ease-in-out;
        }

        @keyframes scan-anim {
            0%, 100% { top: 10%; }
            50% { top: 85%; }
        }

        .btn-demo {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.8rem;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .btn-demo:hover {
            background: white;
            color: var(--pup-maroon);
            transform: translateY(-2px);
        }

        /* --- RIGHT SIDE: THE INFO --- */
        .info-panel {
            background: #e0e5ec;
            padding: 5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .kiosk-header { margin-bottom: 3rem; }

        .info-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--medical-blue);
            margin-left: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .display-box {
            background: var(--clay-bg);
            border-radius: 20px;
            padding: 1.2rem 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--clay-inset);
            font-size: 1.2rem;
            color: #888;
            transition: 0.4s;
            border: 1px solid transparent;
        }

        .display-box.active {
            color: var(--pup-maroon);
            font-weight: 600;
            border: 1px solid rgba(156, 12, 32, 0.1);
            background: #fff;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            background: #d1d9e6;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--medical-blue);
            margin-bottom: 1rem;
        }

        .pulse-text { animation: pulse-opacity 2s infinite; }
        @keyframes pulse-opacity { 50% { opacity: 0.5; } }

        /* Permanent Button Styles */
        .action-container {
            margin-top: 2rem;
        }

        .btn-confirm {
            background: var(--pup-maroon);
            border-radius: 20px;
            transition: 0.3s;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-confirm.ready {
            opacity: 1;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(156, 12, 32, 0.3);
        }

        .btn-back {
            background: #e0e5ec;
            color: var(--medical-blue);
            border-radius: 20px;
            box-shadow: var(--clay-shadow);
            border: none;
            transition: 0.3s;
        }

        .btn-back:hover {
            box-shadow: var(--clay-inset);
            color: var(--pup-maroon);
        }

    </style>
</head>
<body>

<div class="kiosk-container">
    <div class="scanner-panel">
        <div class="text-center text-white mb-5">
            <h1 class="fw-bold">CareLink Express</h1>
            <p class="opacity-75">KIOSK MODE: PORTAL ACCESS</p>
        </div>

        <div class="scanner-frame">
            <div class="laser"></div>
            <div id="reader"></div>
        </div>

        <button class="btn btn-demo" onclick="simulateScan()">
            <i class="fa-solid fa-flask me-2"></i> Simulate Student Scan
        </button>

        <div class="mt-4 text-white opacity-50 text-center">
            <small><i class="fa-solid fa-camera me-2"></i> Place QR Code within the frame</small>
        </div>
    </div>

    <div class="info-panel">
        <div class="kiosk-header">
            <div class="status-badge pulse-text" id="status-tag">SYSTEM READY</div>
            <h2 class="fw-bold" style="color: var(--medical-blue);">Verification</h2>
            <p class="text-muted">Information will appear upon successful scan.</p>
        </div>

        <div>
            <label class="info-label">Student Patient ID</label>
            <div class="display-box" id="out-id">Waiting for scan...</div>

            <div class="row">
                <div class="col-md-6">
                    <label class="info-label">First Name</label>
                    <div class="display-box" id="out-fname">---</div>
                </div>
                <div class="col-md-6">
                    <label class="info-label">Last Name</label>
                    <div class="display-box" id="out-lname">---</div>
                </div>
            </div>

            <label class="info-label">Department / Program</label>
            <div class="display-box" id="out-dept">---</div>
        </div>

        <div class="action-container d-flex flex-column gap-3">
            <button id="btn-login" class="btn btn-lg w-100 py-3 btn-confirm" onclick="handleLogin()" disabled>
                CONFIRM & LOGIN <i class="fa-solid fa-right-to-bracket ms-2"></i>
            </button>
            
            <button class="btn btn-lg w-100 py-3 btn-back" onclick="location.href='kioskhomepage.html'">
                <i class="fa-solid fa-arrow-left me-2"></i> BACK TO HOME
            </button>
        </div>
    </div>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");

    function onScanSuccess(decodedText) {
        html5QrCode.stop().then(() => {
            processData(decodedText);
        });
    }

    function simulateScan() {
        processData("2023-00123-BN-0,Jerome,Mallari,BSIT - 3RD YEAR");
    }

    function processData(text) {
        document.getElementById('status-tag').innerText = "IDENTITY VERIFIED";
        document.getElementById('status-tag').style.background = "#d4edda";
        document.getElementById('status-tag').style.color = "#155724";
        document.getElementById('status-tag').classList.remove('pulse-text');

        const data = text.split(',');
        if(data.length >= 4) {
            populateInfo(data[0], data[1], data[2], data[3]);
        } else {
            populateInfo("ID-PENDING", "Student", "User", "BSIT");
        }

        // Enable the confirm button
        const loginBtn = document.getElementById('btn-login');
        loginBtn.disabled = false;
        loginBtn.classList.add('ready');
    }

    function populateInfo(id, fname, lname, dept) {
        document.getElementById('out-id').innerText = id;
        document.getElementById('out-fname').innerText = fname;
        document.getElementById('out-lname').innerText = lname;
        document.getElementById('out-dept').innerText = dept;

        ['out-id', 'out-fname', 'out-lname', 'out-dept'].forEach(id => {
            document.getElementById(id).classList.add('active');
        });
    }

    function handleLogin() {
        location.href = 'kioskdashboard.html';
    }

    const config = { 
        fps: 20, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0 
    };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
    .catch(err => {
        console.warn("Retrying without strict aspect constraints...");
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess);
    });
</script>

</body>
</html>
