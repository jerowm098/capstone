<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareLink | Kiosk QR Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867;
            --clay-bg: #f8f9fa;
            --clay-shadow: 12px 12px 24px #d1d9e6, -12px -12px 24px #ffffff;
            --clay-inset: inset 6px 6px 12px #d1d9e6, inset -6px -6px 12px #ffffff;
            --success-green: #28a745;
        }

        body, html {
            height: 100%; margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(156, 12, 32, 0.8), rgba(13, 20, 26, 0.9)), 
                        url('https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=1920');
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            width: 1300px; height: 800px; 
            display: grid; grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        .scanner-panel {
            background: linear-gradient(135deg, var(--pup-maroon), #6b0816);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 3rem; position: relative;
        }

        .scanner-frame {
            width: 100%; max-width: 400px; aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px; border: 2px solid rgba(255,255,255,0.2);
            padding: 20px; box-shadow: 0 40px 80px rgba(0,0,0,0.3);
            position: relative; overflow: hidden;
        }

        #reader { width: 100%; height: 100%; border-radius: 35px; overflow: hidden; background: #000; }
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }

        .laser {
            position: absolute; width: 90%; height: 4px; background: #ff4d4d;
            left: 5%; z-index: 10; box-shadow: 0 0 20px #ff4d4d;
            animation: scan-anim 3s infinite ease-in-out;
        }

        @keyframes scan-anim { 0%, 100% { top: 10%; } 50% { top: 85%; } }

        .btn-demo {
            margin-top: 30px; background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3); color: white;
            padding: 10px 25px; border-radius: 30px; transition: 0.3s;
        }
        .btn-demo:hover { background: white; color: var(--pup-maroon); }

        .info-panel { padding: 4rem; display: flex; flex-direction: column; justify-content: center; }

        .display-box {
            background: var(--clay-bg); border-radius: 15px;
            padding: 1rem 1.5rem; margin-bottom: 1.2rem;
            box-shadow: var(--clay-inset); font-size: 1.1rem; color: #888;
            transition: 0.4s; border: 1px solid rgba(0,0,0,0.05);
        }

        .display-box.active {
            color: var(--pup-maroon); font-weight: 600;
            background: #fff; border: 1px solid rgba(156, 12, 32, 0.1);
        }

        .status-badge {
            display: inline-block; padding: 6px 18px; border-radius: 50px;
            background: #d1d9e6; font-size: 0.7rem; font-weight: 600;
            color: var(--medical-blue); margin-bottom: 1rem;
        }

        .pulse-text { animation: pulse-opacity 2s infinite; }
        @keyframes pulse-opacity { 50% { opacity: 0.5; } }

        .status-container {
            height: 64px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 1.1rem; transition: all 0.5s ease;
            background: var(--medical-blue); color: white; opacity: 0.4;
        }

        .status-container.redirecting {
            background: var(--success-green);
            color: white; opacity: 1;
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.2);
        }

        .hyperlink-msg { text-decoration: none; color: var(--medical-blue); font-size: 0.9rem; font-weight: 500; transition: 0.3s; }
        .hyperlink-msg:hover { color: var(--pup-maroon); text-decoration: underline; }
        .info-label { font-size: 0.75rem; font-weight: 600; color: var(--medical-blue); text-transform: uppercase; opacity: 0.7; }
    </style>
</head>
<body>

<div class="portal-card">
    <div class="scanner-panel">
        <div class="text-center text-white mb-4">
            <h1 class="fw-bold mb-1">CareLink Express</h1>
            <p class="opacity-75 small">KIOSK MODE: PORTAL ACCESS</p>
        </div>

        <div class="scanner-frame">
            <div class="laser"></div>
            <div id="reader"></div>
        </div>

        <button class="btn btn-demo" onclick="simulateScan()">
            <i class="fa-solid fa-flask me-2"></i> Simulate Student Scan
        </button>

        <div class="mt-4 text-white opacity-50 text-center">
            <small><i class="fa-solid fa-camera me-2"></i> Place QR Code within the frame</small>
        </div>
    </div>

    <div class="info-panel">
        <div class="kiosk-header">
            <div class="status-badge pulse-text" id="status-tag">SYSTEM READY</div>
            <h2 class="fw-bold" style="color: var(--medical-blue);">Verification</h2>
            <p class="text-muted small">Information will appear upon successful scan.</p>
        </div>

        <div>
            <label class="info-label">Student Patient ID</label>
            <div class="display-box" id="out-id">Waiting for scan...</div>

            <div class="row g-2">
                <div class="col-6">
                    <label class="info-label">First Name</label>
                    <div class="display-box" id="out-fname">---</div>
                </div>
                <div class="col-6">
                    <label class="info-label">Last Name</label>
                    <div class="display-box" id="out-lname">---</div>
                </div>
            </div>

            <label class="info-label">Department / Program</label>
            <div class="display-box" id="out-dept">---</div>
        </div>

        <div class="mt-4 d-flex flex-column gap-3">
            <div id="redirect-status" class="status-container">
                <i class="fa-solid fa-qrcode me-2"></i> WAITING FOR SCAN...
            </div>
            
            <div class="text-center mt-2">
                <a href="kioskportal.html" class="hyperlink-msg">
                    <i class="fa-solid fa-arrow-left-long me-1"></i> Back to Portal
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");

    function onScanSuccess(decodedText) {
        html5QrCode.stop().then(() => {
            processData(decodedText);
        });
    }

    function simulateScan() {
        processData("2023-00123-BN-0,Jerome,Mallari,BSIT - 3RD YEAR");
    }

    function processData(text) {
        const tag = document.getElementById('status-tag');
        tag.innerText = "IDENTITY VERIFIED";
        tag.style.background = "#d4edda";
        tag.style.color = "#155724";
        tag.classList.remove('pulse-text');

        const data = text.split(',');
        populateInfo(data[0] || "ID-PENDING", data[1] || "Student", data[2] || "User", data[3] || "BSIT");

        const statusBox = document.getElementById('redirect-status');
        statusBox.classList.add('redirecting');
        statusBox.innerHTML = 'Redirecting User... <i class="fa-solid fa-circle-notch fa-spin ms-2"></i>';

        setTimeout(() => {
            location.href = 'kioskdashboard.html';
        }, 2000);
    }

    function populateInfo(id, fname, lname, dept) {
        document.getElementById('out-id').innerText = id;
        document.getElementById('out-fname').innerText = fname;
        document.getElementById('out-lname').innerText = lname;
        document.getElementById('out-dept').innerText = dept;

        ['out-id', 'out-fname', 'out-lname', 'out-dept'].forEach(elId => {
            document.getElementById(elId).classList.add('active');
        });
    }

    const config = { fps: 20, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
    .catch(err => {
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess);
    });
</script>

</body>
</html>
