<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --main-form-width: 1150px;
            --layout-margin-top: 2rem;
            --standard-padding: 1.5rem;
            --border-subtle: 1px solid rgba(40, 49, 58, 0.1);
            --brand-primary: #28313a;      
            --medical-blue: #475867;        
            --medical-blue-dark: #323e49;
            --medical-blue-light: #667f94;
            --medical-blue-soft: rgba(71, 88, 103, 0.08); 
            --white: #ffffff;
            --text-main: #28313a;          
            --text-muted: #5c7285;     
            --clay-bg: #f4f7f6;
        }

        html {
            overflow-y: scroll; 
            scrollbar-gutter: stable;
        }
	    body {
            min-height: 101vh;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--clay-bg);
            padding: var(--layout-margin-top) 0;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .floating-form-container {
            width: 95%;
            max-width: var(--main-form-width);
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: var(--border-subtle);
        }

        /* --- NAVIGATION TAB HEADER --- */
        .nav-header-tab {
            background-color: var(--brand-primary);
            padding: 0 var(--standard-padding);
            display: flex;
            align-items: center;
            height: 60px;
        }

        .nav-header-tab h5 {
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s ease;
            margin: 0;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            padding: 10px 0;
            cursor: default;
        }
     	.nav-header-tab h5:hover {
            color: #ffffff;
        }    
        .form-content {
            padding: var(--standard-padding);
        }

        /* --- SEARCH & ACTIONS (Aligned to Right) --- */
        .action-row {
            display: flex;
            justify-content: flex-end; /* I-align sa kanan */
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: var(--border-subtle);
        }

        .search-box {
            background: var(--clay-bg);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 10px;
            padding: 8px 15px;
            width: 280px;
            transition: 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--medical-blue-light);
            background: var(--white);
            box-shadow: 0 0 0 3px var(--medical-blue-soft);
        }

        /* --- TABLE STYLING --- */
        .table-custom {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .table-custom thead th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            padding: 10px 15px;
            border: none;
        }

        .table-custom tbody tr {
            background: var(--white);
            transition: 0.2s;
        }

        .table-custom tbody tr:hover {
            background: var(--medical-blue-soft);
        }

        .table-custom td {
            padding: 15px;
            vertical-align: middle;
            border-top: var(--border-subtle);
            border-bottom: var(--border-subtle);
        }

        .table-custom td:first-child { border-left: var(--border-subtle); border-radius: 10px 0 0 10px; }
        .table-custom td:last-child { border-right: var(--border-subtle); border-radius: 0 10px 10px 0; }

        .status-badge {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-pending { background: #fff4e5; color: #b7791f; }
        .status-completed { background: #e6fffa; color: #234e52; }
        .status-cancelled { background: #fff5f5; color: #9b2c2c; }

        .patient-name {
            font-weight: 600;
            color: var(--medical-blue-dark);
            display: block;
        }

        .action-btn {
            color: var(--medical-blue);
            background: var(--clay-bg);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: var(--brand-primary);
            color: white;
        }

        .btn-medical {
            background-color: var(--brand-primary);
            color: white;
            border-radius: 8px;
            padding: 8px 20px;
            border: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-medical:hover {
            background-color: var(--medical-blue-dark);
            color: white;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="floating-form-container">
        
        <nav class="nav-header-tab">
            <h5>Daily Appointments</h5>
        </nav>

        <div class="form-content">
            
            <div class="action-row">
                <div class="d-flex gap-2">
                    <input type="text" class="search-box" placeholder="Search patient name...">
                    <button class="btn-medical shadow-sm">
                        <i class="fa-solid fa-plus me-2"></i> New Appointment
                    </button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Patient Details</th>
                            <th>Service Type</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><span class="fw-bold">08:30 AM</span></td>
                            <td>
                                <span class="patient-name">Mark Anthony Sy</span>
                                <small class="text-muted">ID: STUD-2024-0552</small>
                            </td>
                            <td>Regular Check-up</td>
                            <td><span class="status-badge status-completed">Completed</span></td>
                            <td>
                                <button class="action-btn"><i class="fa-solid fa-eye"></i></button>
                                <button class="action-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td><span class="fw-bold">10:15 AM</span></td>
                            <td>
                                <span class="patient-name">Maria Clara</span>
                                <small class="text-muted">ID: FAC-2021-0012</small>
                            </td>
                            <td>Lab Result Review</td>
                            <td><span class="status-badge status-pending">Pending</span></td>
                            <td>
                                <button class="action-btn"><i class="fa-solid fa-eye"></i></button>
                                <button class="action-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    if (window.self === window.top) {
        const currentPage = window.location.pathname.split("/").pop();
        window.location.href = "nursedashboard.html?page=" + currentPage;
    }
</script>
</body>
</html>
