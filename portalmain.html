<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Selection | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --pup-red: #D51C3D;
            --medical-blue: #475867;
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(156, 12, 32, 0.8), rgba(13, 20, 26, 0.9)), 
                        url('https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=1920');
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 3.1rem; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 580px; 
            transition: all 0.4s ease;
        }

        .welcome-badge {
            display: inline-block;
            background: rgba(156, 12, 32, 0.1);
            color: var(--pup-maroon);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #28a745;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 8px #28a745;
        }

        .role-btn {
            background: var(--clay-bg);
            border: none;
            border-radius: 20px;
            padding: 18px; 
            margin-bottom: 14px; 
            box-shadow: var(--clay-shadow);
            transition: 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 25px;
            font-weight: 600;
            color: var(--medical-blue);
            text-decoration: none;
        }

        .role-btn i { 
            font-size: 1.6rem; 
            margin-right: 18px; 
            color: var(--pup-maroon); 
        }

        .role-btn:hover {
            box-shadow: var(--clay-inset);
            transform: translateY(1px);
            color: var(--pup-maroon);
        }

        .role-description {
            display: block;
            font-size: 0.7rem;
            font-weight: 400;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="portal-card">
        
        <div class="text-center mb-4">
            <span class="welcome-badge">University Health System</span>
            <h1 class="fw-bold mb-1" style="color: var(--pup-maroon); letter-spacing: -1px; font-size: 2rem;">Welcome to CareLink</h1>
            <p class="text-muted px-4 mb-2" id="portal-subtitle" style="font-size: 0.9rem;">
                Good day, Scholar! Please select your portal.
            </p>
            <div style="font-size: 0.65rem; color: #666;">
                <span class="status-dot"></span> System Online
            </div>
        </div>

        <div id="role-selector" class="row g-2 mb-4"> 
            <div class="col-12">
                <a href="portaladmin.html" class="role-btn">
                    <i class="fa-solid fa-user-shield"></i>
                    <div>
                        <span>Admin Portal</span>
                        <span class="role-description">System management & oversight</span>
                    </div>
                </a>
            </div>            
            <div class="col-12">
                <a href="portaldoctor.html" class="role-btn">
                    <i class="fa-solid fa-hand-holding-medical"></i>
                    <div>
                        <span>Doctors Portal</span>
                        <span class="role-description">Consultations & records</span>
                    </div>
                </a>
            </div>
            <div class="col-12">
                <a href="studlogin.html" class="role-btn">
                    <i class="fa-solid fa-user-graduate"></i>
                    <div>
                        <span>Student Portal</span>
                        <span class="role-description">Appointments & certificates</span>
                    </div>
                </a>
            </div>
            
            <div class="text-center mt-3">
                <a href="digitalhealthcare/index/indexhtml.php" class="text-muted small text-decoration-none fw-bold" style="font-size: 0.75rem; opacity: 0.8;">
                    <i class="fa-solid fa-arrow-left-long me-2"></i> Return to Home Page
                </a>
            </div>
        </div>

        <div class="text-center pt-4 border-top mt-4" style="border-color: rgba(0,0,0,0.05) !important;"> 
            <p class="small text-muted mb-0" style="font-size: 0.75rem;">Trouble logging in? <a href="#" class="text-decoration-none" style="color: var(--pup-maroon); font-weight: 600;">Contact IT Support</a></p>
        </div>
    </div>
</div>

</body>
</html>
