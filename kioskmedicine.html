<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Medicine | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867;
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
            --success-green: #28a745;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(156, 12, 32, 0.85), rgba(13, 20, 26, 0.9)), 
                        url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1920');
            background-size: cover;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .kiosk-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 1.5rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            width: 1300px;
            height: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .page-intro { padding: 10px 15px; text-align: center; }

        .main-content-wrapper {
            display: flex;
            gap: 20px;
            flex-grow: 1;
            overflow: hidden;
            min-height: 0;
            padding-bottom: 10px;
        }

        .left-panel { flex: 2; display: flex; flex-direction: column; gap: 15px; min-height: 0; }
        .right-sidebar { flex: 0.7; display: flex; flex-direction: column; gap: 15px; min-height: 0; }

        .top-nav-bar {
            background: var(--clay-bg);
            border-radius: 20px;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--clay-inset);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px 20px;
            border-radius: 25px;
            box-shadow: var(--clay-shadow);
        }

        .search-container { position: relative; width: 300px; }
        .search-input {
            width: 100%;
            padding: 8px 15px 8px 40px;
            border-radius: 50px;
            border: 1px solid #eee;
            background: var(--clay-bg);
            box-shadow: var(--clay-inset);
            outline: none;
        }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--medical-blue); }

        .nav-pills-custom { display: flex; gap: 8px; }
        .pill-btn {
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            background: var(--clay-bg);
            color: var(--medical-blue);
            box-shadow: var(--clay-shadow);
            transition: 0.3s;
        }
        .pill-btn.active { background: var(--pup-maroon); color: white; box-shadow: var(--clay-inset); }

        .glass-panel {
            background: white;
            border-radius: 25px;
            padding: 25px; 
            box-shadow: var(--clay-shadow);
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
        }

        .med-display-area {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px;
        }

        .med-card {
            background: var(--clay-bg);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--clay-shadow);
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .med-img { 
            width: 100%; 
            height: 100px; 
            object-fit: contain; 
            margin-bottom: 12px;
            border-radius: 10px;
        }

        .med-name { font-weight: 700; color: var(--medical-blue); margin-bottom: 5px; }
        .stock-tag { font-size: 0.8rem; background: rgba(40, 167, 69, 0.1); color: var(--success-green); padding: 2px 10px; border-radius: 50px; margin-bottom: 10px; display: inline-block; }

        .btn-add-custom {
            background: var(--pup-maroon);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 8px;
            width: 100%;
            font-weight: 600;
        }

        .qr-placeholder-wrapper {
            width: 180px;
            height: 180px;
            background: white;
            border-radius: 20px;
            box-shadow: var(--clay-inset);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px auto;
        }

        .queue-box { 
            padding: 20px; 
            border-radius: 20px; 
            background: #f8f9fa; 
            border: 1px solid #eee; 
            margin-bottom: 20px;
            min-height: 140px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .queue-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .placeholder-text {
            letter-spacing: 2px;
            font-weight: bold;
            color: #ccc;
        }

        .cart-item-row {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 10px;
            gap: 15px;
        }

        /* Task 1: Styling for the temporarily disabled state */
        #complete-btn:disabled {
            background: #bdc3c7 !important;
            border: none;
            cursor: not-allowed;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="kiosk-card">
    <div class="top-nav-bar">
        <a href="kioskdashboard.html" class="btn border-0 shadow-sm" style="background:white; color:var(--pup-maroon); font-weight:600;">
            <i class="fa-solid fa-arrow-left me-2"></i> Back to Dashboard
        </a>
        <div class="d-flex align-items-center gap-3">
            <div class="text-end">
                <h6 class="m-0 fw-bold" style="color: var(--medical-blue);">Jerome Mallari</h6>
                <span style="font-size: 0.75rem" class="text-muted">ID: 2023-01020-BN-0</span>
            </div>
            <div style="width: 35px; height: 35px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--pup-maroon);">
                <i class="fa-solid fa-user-graduate"></i>
            </div>
        </div>
    </div>

    <div class="page-intro">
        <h4 class="fw-bold mb-1" style="color: var(--pup-maroon);">Medicine Kiosk</h4>
        <p class="text-muted mb-0" style="font-size: 0.9rem;">Select essentials and generate your pickup ticket below.</p>
    </div>

    <div class="main-content-wrapper">
        <div class="left-panel">
            <div class="action-bar">
                <div class="nav-pills-custom">
                    <button class="pill-btn active" id="btn-available" onclick="filterMeds('available')">Available</button>
                    <button class="pill-btn" id="btn-vitamins" onclick="filterMeds('vitamins')">Vitamins</button>
                    <button class="pill-btn" id="btn-painkiller" onclick="filterMeds('painkiller')">Pain Killer</button>
                    <button class="pill-btn" id="btn-cart" onclick="showCart()" style="background: #e8f5e9; color: var(--success-green);">
                        <i class="fa-solid fa-cart-shopping me-1"></i>Cart (<span id="cart-count">0</span>)
                    </button>
                </div>

                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" class="search-input" id="med-search" placeholder="Search Medicine..." onkeyup="searchMeds()">
                </div>
            </div>

            <div id="dynamic-display" class="glass-panel flex-grow-1">
                <div id="med-grid" class="med-display-area"></div>
                <div id="cart-view" style="display:none;">
                    <h5 class="fw-bold mb-3">Review Selection</h5>
                    <div id="cart-items-container"></div>
                </div>
            </div>
        </div>

        <div class="right-sidebar">
            <div class="glass-panel text-center flex-grow-1" style="justify-content: center; padding: 25px 20px;">
                <h6 class="fw-bold text-uppercase tracking-wider mb-0" style="color: var(--medical-blue); font-size: 0.85rem;">Clinic Pickup Ticket</h6>
                <small class="text-muted">Show this at the counter</small>
                
                <div class="qr-placeholder-wrapper">
                    <div id="qr-ghost">
                        <i class="fa-solid fa-qrcode fa-5x mb-2" style="color:#eee;"></i>
                        <p style="font-size: 0.7rem" class="text-muted">Pending purchase</p>
                    </div>
                    <img id="qr-img" src="" alt="QR" style="display:none; width: 90%;">
                </div>

                <div class="queue-box" id="queue-box">
                    <div class="queue-info-row">
                        <span class="text-muted">Estimated Wait:</span>
                        <span id="queue-time-val" class="placeholder-text">- - - -</span>
                    </div>
                    <div class="queue-info-row">
                        <span class="text-muted">Ticket No:</span>
                        <span id="queue-num-val" class="placeholder-text">- - - -</span>
                    </div>
                    <hr class="my-2" style="opacity: 0.1;">
                    <div class="queue-info-row">
                        <span class="text-muted">Ref Code:</span>
                        <span id="ref-code" class="placeholder-text">- - - -</span>
                    </div>
                </div>

                <button id="complete-btn" class="btn btn-success w-100 py-3 fw-bold rounded-4 shadow-sm" onclick="handlePurchaseAction()" disabled>
                    ADD TO CART FIRST
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const inventory = [
        { id: 1, name: 'Paracetamol', cat: 'available', stock: 45, img: 'https://allaboutskindoha.com/cdn/shop/files/UNILAB_BiogesicParacetamol_10Tablets_doha_qatar_skincare_available_daily_routine_allaboutskindoha_allaboutskindoha_bestselling_best_mostselling_most_beauty_product_facebook_instagram_9454f92f-ac81-4085-b198-9d9e79962c5e.jpg?v=1754235354&width=1920' },
        { id: 2, name: 'Amoxicillin', cat: 'available', stock: 12, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcScjD6AJwMQFiIBIFKOQhWDFo8zwmjeT6sdXg&s' },
        { id: 3, name: 'Vitamin C', cat: 'vitamins', stock: 100, img: 'https://store.iloilosupermart.com/wp-content/uploads/2020/08/RITEMED-ASCORBIC-ACID-500MG-TABLET.jpg' },
        { id: 4, name: 'Multivitamins', cat: 'vitamins', stock: 30, img: 'https://cpimg.tistatic.com/2370194/b/5/multivitamins-tablets.jpg' },
        { id: 5, name: 'Ibuprofen', cat: 'painkiller', stock: 25, img: 'https://shopsuki.ph/cdn/shop/files/107996055_1024x.png?v=1682990382' },
        { id: 6, name: 'Mefenamic Acid', cat: 'painkiller', stock: 18, img: 'https://www.proactivemart.com/cdn/shop/products/Screenshot2021-03-17at2.30.10PM_1024x1024.png?v=1615963467' }
    ];

    let cart = [];
    let currentCategory = 'available';
    let isCompleted = false;

    function renderInventory(items) {
        const grid = document.getElementById('med-grid');
        grid.style.display = 'grid';
        document.getElementById('cart-view').style.display = 'none';
        grid.innerHTML = items.map(med => `
            <div class="med-card">
                <img src="${med.img}" class="med-img" alt="${med.name}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/822/822143.png'">
                <h6 class="med-name">${med.name}</h6>
                <span class="stock-tag">Stock: ${med.stock}</span>
                <button class="btn-add-custom" onclick="addToCart(${med.id})">
                    <i class="fa-solid fa-plus me-2"></i>Add
                </button>
            </div>`).join('');
    }

    function searchMeds() {
        const query = document.getElementById('med-search').value.toLowerCase();
        const filtered = inventory.filter(med => 
            med.name.toLowerCase().includes(query) && 
            (currentCategory === 'all' || med.cat === currentCategory)
        );
        renderInventory(filtered);
    }

    function filterMeds(category) {
        currentCategory = category;
        document.getElementById('med-search').value = "";
        updateActivePill(document.getElementById('btn-' + category));
        renderInventory(inventory.filter(m => m.cat === category));
    }

    function showCart() {
        updateActivePill(document.getElementById('btn-cart'));
        document.getElementById('med-grid').style.display = 'none';
        document.getElementById('cart-view').style.display = 'block';
    }

    function addToCart(id) {
        const item = inventory.find(m => m.id === id);
        const existing = cart.find(c => c.id === id);
        existing ? existing.qty++ : cart.push({ ...item, qty: 1 });
        updateCartUI();
    }

    function updateCartUI() {
        const count = cart.reduce((sum, item) => sum + item.qty, 0);
        document.getElementById('cart-count').innerText = count;
        
        const container = document.getElementById('cart-items-container');
        container.innerHTML = cart.map(item => `
            <div class="cart-item-row">
                <img src="${item.img}" width="40" height="40" style="object-fit:contain">
                <div class="flex-grow-1"><h6 class="m-0 fw-bold">${item.name}</h6><small>Qty: ${item.qty}</small></div>
                <button class="btn btn-link text-danger p-0" onclick="removeFromCart(${item.id})"><i class="fa-solid fa-trash"></i></button>
            </div>`).join('');

        // Task 1 Logic: Update Button State
        const btn = document.getElementById('complete-btn');
        if (!isCompleted) {
            if (count > 0) {
                btn.disabled = false;
                btn.innerHTML = 'PURCHASE & GENERATE QR';
            } else {
                btn.disabled = true;
                btn.innerHTML = 'ADD TO CART FIRST';
            }
        }
    }

    function removeFromCart(id) {
        cart = cart.filter(c => c.id !== id);
        updateCartUI();
    }

    function handlePurchaseAction() {
        if (isCompleted) return purchaseAgain();
        if (cart.length === 0) return;
        
        const btn = document.getElementById('complete-btn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> GENERATING...';
        btn.disabled = true;

        setTimeout(() => {
            const ref = "RX-" + Math.floor(1000 + Math.random() * 9000);
            const qNum = "MED-" + Math.floor(100 + Math.random() * 899);
            
            document.getElementById('qr-ghost').style.display = 'none';
            document.getElementById('qr-img').style.display = 'block';
            document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${ref}`;
            
            const timeSpan = document.getElementById('queue-time-val');
            const numSpan = document.getElementById('queue-num-val');
            const refSpan = document.getElementById('ref-code');

            timeSpan.innerText = "3-5 Mins";
            timeSpan.classList.remove('placeholder-text');
            timeSpan.classList.add('text-success', 'fw-bold');

            numSpan.innerText = qNum;
            numSpan.classList.remove('placeholder-text');
            numSpan.classList.add('text-dark', 'fw-bold');

            refSpan.innerText = ref;
            refSpan.classList.remove('placeholder-text');
            refSpan.classList.add('text-danger', 'fw-bold');

            btn.innerHTML = 'PURCHASE AGAIN <i class="fa-solid fa-rotate-right ms-2"></i>';
            btn.classList.replace('btn-success', 'btn-primary');
            btn.disabled = false;
            isCompleted = true;
        }, 1500);
    }

    function purchaseAgain() {
        cart = [];
        isCompleted = false;
        updateCartUI();
        
        document.getElementById('qr-ghost').style.display = 'block';
        document.getElementById('qr-img').style.display = 'none';
        
        const fields = ['queue-time-val', 'queue-num-val', 'ref-code'];
        fields.forEach(id => {
            const el = document.getElementById(id);
            el.innerText = "- - - -";
            el.className = "placeholder-text";
        });

        const btn = document.getElementById('complete-btn');
        btn.classList.replace('btn-primary', 'btn-success');
        btn.disabled = true; // Task 1 reset
        btn.innerHTML = 'ADD TO CART FIRST';
        filterMeds('available');
    }

    function updateActivePill(target) {
        document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
        target.classList.add('active');
    }

    renderInventory(inventory.filter(m => m.cat === 'available'));
</script>
</body>
</html>
