<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurse Inventory | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* --- Main Layout & Dimensions --- */
            --main-form-width: 1150px;
            --layout-margin-top: 2rem;
            --standard-padding: 1.5rem;
            --border-subtle: 1px solid rgba(40, 49, 58, 0.1);
            
            /* --- Colors --- */
            --brand-primary: #28313a;      
            --medical-blue: #475867;        
            --medical-blue-dark: #323e49;
            --medical-blue-light: #667f94;
            --medical-blue-soft: rgba(71, 88, 103, 0.08); 
            --white: #ffffff;
            --text-main: #28313a;          
            --text-muted: #5c7285;     
            --clay-bg: #f4f7f6;
            
            /* --- Form Container --- */
            --form-bg-color: #ffffff;
            --form-border-radius: 20px;           
            --form-box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            --form-border: 1px solid rgba(0, 0, 0, 0.05);
        }

        html {
            overflow-y: scroll; 
            scrollbar-gutter: stable;
        }
        
        body {
            min-height: 101vh;
            font-family: 'Poppins', sans-serif;
            background-color: var(--clay-bg);
            margin: 0;
            padding: var(--layout-margin-top) 0;
            display: flex;
            justify-content: center;
            color: var(--text-main);
        }

        /* --- MAIN FLOATING FORM LAYOUT --- */
        .floating-form-container {
            width: 95%;
            max-width: var(--main-form-width);
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: var(--border-subtle);
        }

        /* ============================================= */
        /* NAVIGATION TAB HEADER - MATCHING nurseappointment.html STYLE */
        /* ============================================= */
        .nav-header-tab {
            background-color: var(--brand-primary);
            padding: 0 var(--standard-padding);
            display: flex;
            align-items: center;
            height: 60px;
        }

        /* Tab links styling - directly in navbar header (matching the h5 style but as tabs) */
        .nav-header-tab .nav-tabs-inline {
            display: flex;
            gap: 2rem;
            margin: 0;
            padding: 0;
            height: 100%;
            align-items: center;
        }

        .nav-header-tab .nav-link-tab {
            color: rgba(255, 255, 255, 0.5);
            border: none;
            padding: 10px 0;
            font-weight: 600;
            background: transparent !important;
            position: relative;
            transition: 0.3s;
            text-decoration: none;
            font-size: 1rem;
            display: inline-block;
            cursor: pointer;
        }

        .nav-header-tab .nav-link-tab:hover {
            color: #ffffff !important;
        }

        .nav-header-tab .nav-link-tab.active {
            color: #ffffff !important;
            background: transparent !important;
        }

        /* --- Content Area --- */
        .profile-body {
            flex-grow: 1;
            display: block;
            width: 100%;
            background: var(--white);
            padding: 0;
        }

        #inventory-frame {
            width: 100%;
            min-height: 550px;
            border: none;
            background: transparent;
            display: block;
        }

        /* --- Responsive adjustments --- */
        @media (max-width: 768px) {
            .nav-header-tab {
                padding: 0 1rem;
            }
            .nav-header-tab .nav-tabs-inline {
                gap: 1rem;
            }
            .nav-header-tab .nav-link-tab {
                font-size: 0.85rem;
                padding: 8px 0;
            }
        }
    </style>
</head>
<body>

    <div class="floating-form-container">
        <!-- NAVIGATION TAB HEADER - Matching nurseappointment.html style (same navbar header with underline hover effect) -->
        <nav class="nav-header-tab">
            <div class="nav-tabs-inline" id="inventoryTabs">
                <a href="nurseinventoryavailable.html" target="inventory-frame" class="nav-link-tab active" id="available-tab">
                    Available Drugs
                </a>
                <a href="nurseinventoryregister.html" target="inventory-frame" class="nav-link-tab" id="register-tab">
                    Register New Drug
                </a>
            </div>
        </nav>

        <div class="profile-body">
            <iframe src="nurseinventoryavailable.html" name="inventory-frame" id="inventory-frame"></iframe>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const subTabs = document.querySelectorAll('.nav-link-tab');
            const iframe = document.getElementById('inventory-frame');

            // 1. Handle normal clicking - tab switching
            subTabs.forEach(tab => {
                tab.addEventListener('click', function(e) {
                    // Don't prevent default - let the link work normally
                    subTabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    
                    // Store the current tab in sessionStorage for persistence
                    sessionStorage.setItem('activeInventoryTab', this.getAttribute('href'));
                });
            });

            // 2. Handle Ctrl + Click / URL parameters for dashboard integration
            const urlParams = new URLSearchParams(window.location.search);
            const subpage = urlParams.get('subpage');

            if (subpage) {
                iframe.src = subpage;
                subTabs.forEach(tab => {
                    tab.classList.remove('active');
                    if (tab.getAttribute('href') === subpage) {
                        tab.classList.add('active');
                    }
                });
            }

            // 3. Restore last active tab from sessionStorage (for within-session persistence)
            const lastActiveTab = sessionStorage.getItem('activeInventoryTab');
            if (lastActiveTab && !subpage) {
                // Check if the stored tab exists in our tabs
                const matchingTab = Array.from(subTabs).find(tab => tab.getAttribute('href') === lastActiveTab);
                if (matchingTab) {
                    subTabs.forEach(tab => tab.classList.remove('active'));
                    matchingTab.classList.add('active');
                    iframe.src = lastActiveTab;
                }
            }

            // 4. Handle iframe load events to sync active tab when iframe navigates internally
            iframe.addEventListener('load', function() {
                try {
                    const iframeSrc = iframe.contentWindow.location.pathname.split('/').pop();
                    const matchingTab = Array.from(subTabs).find(tab => {
                        const tabHref = tab.getAttribute('href');
                        return tabHref === iframeSrc || tabHref.includes(iframeSrc);
                    });
                    if (matchingTab) {
                        subTabs.forEach(t => t.classList.remove('active'));
                        matchingTab.classList.add('active');
                        sessionStorage.setItem('activeInventoryTab', matchingTab.getAttribute('href'));
                    }
                } catch(e) {
                    // Cross-origin errors may occur, ignore
                    console.log('Cannot access iframe location due to cross-origin policy');
                }
            });

            // 5. Security Redirect (If opened alone outside dashboard)
            if (window.self === window.top) {
                const currentPage = window.location.pathname.split("/").pop();
                const activeIframeSrc = iframe.getAttribute('src');
                // Only redirect if we're not already in the dashboard context
                if (!window.location.href.includes('nursedashboard.html')) {
                    window.location.href = "nursedashboard.html?page=" + currentPage + "&subpage=" + activeIframeSrc;
                }
            }
        });
    </script>
</body>
</html>
