<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareLink Express | QR Portal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867;
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
            --success-green: #2ecc71;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(156, 12, 32, 0.8), rgba(13, 20, 26, 0.9)), 
                        url('https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=1920');
            background-size: cover;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; padding: 20px;
        }

        .portal-card-lg {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            width: 100%; max-width: 1250px;
            display: grid; 
            grid-template-columns: 1fr 1fr 320px; /* Fixed column width to prevent shifting */
            min-height: 650px; /* Fixed height to prevent vertical jumping */
            overflow: hidden;
        }

        .column-padding { padding: 2.5rem; }

        /* Scanner Styling */
        .camera-section { background: var(--clay-bg); border-right: 1px solid rgba(0, 0, 0, 0.05); text-align: center; }
        .scanner-wrapper {
            position: relative; width: 100%; aspect-ratio: 1/1;
            border-radius: 30px; overflow: hidden;
            box-shadow: var(--clay-shadow); border: 8px solid var(--clay-bg); background: #000;
        }
        #reader { width: 100%; height: 100%; }

        /* Form Inputs */
        .form-label { font-weight: 600; color: var(--medical-blue); font-size: 0.8rem; margin-left: 10px; margin-bottom: 5px; display: block; }
        .input-group-clay { background: var(--clay-bg); border-radius: 15px; padding: 2px 15px; box-shadow: var(--clay-inset); display: flex; align-items: center; margin-bottom: 12px; }
        .input-group-clay input { background: transparent; border: none; outline: none; width: 100%; padding: 10px 0; color: var(--medical-blue); font-size: 0.85rem; }
        .populated input { color: var(--pup-maroon) !important; font-weight: 600; }
        
        /* Buttons */
        .btn-schedule { background: var(--pup-maroon); color: white; border: none; border-radius: 15px; padding: 12px; width: 100%; font-weight: 600; transition: background 0.3s; margin-top: 10px; }
        .btn-schedule:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-exit { background: var(--clay-bg); color: var(--medical-blue); border: none; border-radius: 15px; padding: 12px; width: 100%; font-weight: 600; box-shadow: var(--clay-shadow); text-decoration: none; display: block; text-align: center; margin-top: 10px; }

        /* TICKET SECTION (Column 3) */
        .ticket-section { background: #fdfdfd; border-left: 1px solid #eee; display: flex; flex-direction: column; }
        
        .ticket-card {
            background: white; border-radius: 25px; padding: 25px;
            border: 2px dashed #ddd; text-align: center;
            transition: all 0.4s ease; 
            filter: grayscale(1);
            opacity: 0.5;
            height: 480px; /* Locked height so it doesn't expand later */
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .ticket-card.active {
            opacity: 1; filter: grayscale(0); border: 2px solid var(--success-green);
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.15);
        }

        .qr-placeholder {
            width: 150px; height: 150px; background: #f8f9fa;
            margin: 0 auto; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; color: #e0e0e0;
            border: 1px solid #eee;
        }

        .active .qr-placeholder { color: var(--medical-blue); background: white; border: 2px solid var(--clay-bg); }

        .ticket-number { font-family: 'Courier New', monospace; font-size: 1.8rem; font-weight: 800; color: #ccc; }
        .active .ticket-number { color: var(--pup-maroon); }

        /* Prevents jumping: buttons exist but are invisible until active */
        .ticket-actions { 
            visibility: hidden; 
            opacity: 0; 
            transition: opacity 0.3s ease; 
            display: flex; flex-direction: column; gap: 8px; 
        }
        .active .ticket-actions { visibility: visible; opacity: 1; }

        .hr-invisible { border: 0; height: 1px; background: transparent; margin: 15px 0; }
        .active .hr-invisible { background: #eee; }
    </style>
</head>
<body>

<div class="portal-card-lg">
    <div class="camera-section column-padding">
        <h6 class="fw-bold mb-3" style="color: var(--medical-blue);">QR Gateway</h6>
        <div class="scanner-wrapper mb-4">
            <div id="reader"></div>
        </div>
        <button class="btn btn-sm btn-outline-secondary opacity-50" onclick="simulateStudentScan()">Simulate Scan</button>
    </div>

    <div class="form-section column-padding">
        <h6 class="fw-bold mb-4" id="status-text">Patient Information</h6>
        
        <label class="form-label">Student ID</label>
        <div class="input-group-clay" id="box-id"><input type="text" id="display-id" placeholder="Waiting..." readonly></div>
        
        <div class="row g-2">
            <div class="col-6">
                <label class="form-label">First Name</label>
                <div class="input-group-clay" id="box-fname"><input type="text" id="display-fname" placeholder="---" readonly></div>
            </div>
            <div class="col-6">
                <label class="form-label">Last Name</label>
                <div class="input-group-clay" id="box-lname"><input type="text" id="display-lname" placeholder="---" readonly></div>
            </div>
        </div>

        <label class="form-label">Program & Section</label>
        <div class="input-group-clay" id="box-dept"><input type="text" id="display-dept" placeholder="---" readonly></div>

        <button id="confirm-btn" class="btn-schedule" disabled onclick="activateTicket()">
            Confirm Entry <i class="fa-solid fa-arrow-right-long ms-2"></i>
        </button>
        <a href="kioskdashboard.html" class="btn-exit">Cancel / Exit</a>
    </div>

    <div class="ticket-section column-padding">
        <div class="text-center mb-4">
            <h6 class="fw-bold text-secondary">Clinic Pass</h6>
        </div>

        <div id="main-ticket" class="ticket-card">
            <div>
                <span class="badge bg-light text-dark mb-3">QUEUING SYSTEM</span>
                <div class="qr-placeholder">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
            </div>
            
            <div>
                <div class="ticket-number" id="q-number">#----</div>
                <p class="small fw-bold text-uppercase text-muted mt-1" id="q-status">Pending Confirmation</p>
            </div>
            
            <div class="ticket-actions">
                <hr class="hr-invisible">
                <button class="btn btn-dark btn-sm py-2" onclick="window.print()">
                    <i class="fa-solid fa-print me-2"></i>Print Ticket
                </button>
                <button class="btn btn-outline-success btn-sm py-2" onclick="location.reload()">
                    <i class="fa-solid fa-check me-2"></i>Finish
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");

    function simulateStudentScan() {
        updateFormFields("2023-00123-BN-0", "Jerome", "Mallari", "BSIT 3-1");
    }

    function updateFormFields(id, fname, lname, dept) {
        document.getElementById('display-id').value = id;
        document.getElementById('display-fname').value = fname;
        document.getElementById('display-lname').value = lname;
        document.getElementById('display-dept').value = dept;

        ['box-id', 'box-fname', 'box-lname', 'box-dept'].forEach(gid => {
            document.getElementById(gid).classList.add('populated');
        });

        document.getElementById('confirm-btn').disabled = false;
        document.getElementById('status-text').innerText = "Identity Verified";
        document.getElementById('status-text').style.color = "var(--success-green)";
    }

    function activateTicket() {
        const ticket = document.getElementById('main-ticket');
        const qNum = document.getElementById('q-number');
        const qStatus = document.getElementById('q-status');
        const confirmBtn = document.getElementById('confirm-btn');

        // Logic
        const randomID = Math.floor(100 + Math.random() * 899);
        qNum.innerText = "T-" + randomID;
        qStatus.innerText = "Ticket Generated";
        qStatus.style.color = "var(--success-green)";

        // Animation / State Change (Dimensions remain same)
        ticket.classList.add('active');
        confirmBtn.innerHTML = 'Confirmed <i class="fa-solid fa-circle-check"></i>';
        confirmBtn.style.background = 'var(--success-green)';
        confirmBtn.disabled = true;
    }

    const config = { fps: 15, qrbox: { width: 200, height: 200 } };
    html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
        const data = decodedText.split(',');
        updateFormFields(data[0], data[1] || "Student", data[2] || "User", data[3] || "N/A");
    }).catch(err => {});
</script>

</body>
</html>
