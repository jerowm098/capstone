<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Medicine | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867;
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
            --success-green: #28a745;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(156, 12, 32, 0.85), rgba(13, 20, 26, 0.9)), 
                        url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1920');
            background-size: cover;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .kiosk-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 1.5rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            width: 1300px;
            height: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.4);
            position: relative; /* Keep everything contained */
            overflow: hidden;
        }

        /* HEADER */
        .top-nav-bar {
            background: var(--clay-bg);
            border-radius: 20px;
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--clay-inset);
            flex-shrink: 0;
        }

        .page-header { text-align: center; margin-top: 5px; flex-shrink: 0;}
        .page-header h2 { color: var(--pup-maroon); font-weight: 800; font-size: 1.8rem; margin: 0; }

        /* ACTION BAR (Pills & Search) */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px 20px;
            border-radius: 25px;
            box-shadow: var(--clay-shadow);
            flex-shrink: 0;
        }

        .nav-pills-custom { display: flex; gap: 12px; }
        .pill-btn {
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            background: var(--clay-bg);
            color: var(--medical-blue);
            box-shadow: var(--clay-shadow);
            transition: 0.3s;
        }
        .pill-btn.active {
            background: var(--pup-maroon);
            color: white;
            box-shadow: var(--clay-inset);
        }
        .pill-btn.cart-btn { background: #e8f5e9; color: var(--success-green); }

        .search-wrapper {
            position: relative;
            width: 300px;
        }
        .search-wrapper input {
            width: 100%;
            padding: 8px 15px 8px 40px;
            border-radius: 50px;
            border: none;
            background: var(--clay-bg);
            box-shadow: var(--clay-inset);
            font-size: 0.85rem;
        }
        .search-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }

        /* MEDICINE GRID - Controlled sizing to prevent overflow */
        .med-display-area {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            padding: 10px;
            min-height: 0; /* Important for flex child sizing */
        }

        .med-card {
            background: var(--clay-bg);
            border-radius: 25px;
            padding: 15px;
            box-shadow: var(--clay-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            border: 2px solid transparent;
            max-height: 250px; /* Limit card size */
        }

        .med-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background: white;
            border-radius: 15px;
            margin-bottom: 5px;
            padding: 5px;
        }

        .med-name { font-weight: 700; color: var(--medical-blue); font-size: 0.9rem; margin: 0; }
        .stock-count { font-size: 0.7rem; color: var(--success-green); font-weight: 600; margin-bottom: 5px; }

        .btn-action {
            width: 100%;
            border: none;
            padding: 8px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .btn-add { background: var(--medical-blue); color: white; }
        .btn-remove { background: #ffeded; color: #d00000; }

        /* COMPLETE PURCHASE BAR - Fixed at the bottom */
        .purchase-footer {
            background: white;
            padding: 12px 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--clay-shadow);
            flex-shrink: 0;
            margin-top: auto; /* Push to bottom of kiosk-card */
        }
    </style>
</head>
<body>

<div class="kiosk-card">
    <div class="top-nav-bar">
        <a href="kioskdashboard.html" class="btn border-0 shadow-sm" style="background:white; color:var(--pup-maroon); font-weight:600; font-size: 0.85rem;">
            <i class="fa-solid fa-arrow-left me-2"></i> Back to Dashboard
        </a>
        <div class="d-flex align-items-center gap-3">
            <div class="text-end">
                <h6 class="m-0 fw-bold" style="font-size: 0.85rem; color: var(--medical-blue);">Jerome Mallari</h6>
                <span style="font-size: 0.7rem; color: #888;">ID: 2023-01020-BN-0</span>
            </div>
            <div style="width: 35px; height: 35px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--clay-shadow); color: var(--pup-maroon);">
                <i class="fa-solid fa-user-graduate" style="font-size: 0.9rem;"></i>
            </div>
        </div>
    </div>

    <div class="page-header">
        <h2>Purchase Medicine</h2>
    </div>

    <div class="action-bar">
        <div class="nav-pills-custom">
            <button class="pill-btn active" onclick="filterMeds('available', event)">Available Meds</button>
            <button class="pill-btn" onclick="filterMeds('vitamins', event)">Vitamins</button>
            <button class="pill-btn" onclick="filterMeds('painkiller', event)">Pain Killer</button>
            <button class="pill-btn cart-btn" onclick="showCart()">
                <i class="fa-solid fa-cart-shopping me-2"></i>Add to Cart (<span id="cart-count">0</span>)
            </button>
        </div>
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search medicine name...">
        </div>
    </div>

    <div id="med-grid" class="med-display-area">
        </div>

    <div id="purchase-bar" class="purchase-footer" style="visibility: hidden; height: 0; padding: 0; margin: 0; opacity: 0;">
        <div>
            <span class="text-muted" style="font-size: 0.75rem;">Ready to checkout?</span>
            <h5 class="m-0 fw-bold" style="color: var(--medical-blue); font-size: 1.1rem;">Items in Cart: <span id="cart-total-footer">0</span></h5>
        </div>
        <button class="btn border-0 px-5 py-2 shadow-sm" style="background: var(--success-green); color:white; border-radius: 12px; font-weight: 700;">
            COMPLETE PURCHASE <i class="fa-solid fa-circle-check ms-2"></i>
        </button>
    </div>
</div>

<script>
    const inventory = [
        { id: 1, name: 'Paracetamol', cat: 'available', stock: 45, img: 'https://cdn-icons-png.flaticon.com/512/822/822143.png' },
        { id: 2, name: 'Amoxicillin', cat: 'available', stock: 12, img: 'https://cdn-icons-png.flaticon.com/512/4320/4320353.png' },
        { id: 3, name: 'Vitamin C', cat: 'vitamins', stock: 100, img: 'https://cdn-icons-png.flaticon.com/512/2903/2903425.png' },
        { id: 4, name: 'Multivitamins', cat: 'vitamins', stock: 30, img: 'https://cdn-icons-png.flaticon.com/512/3022/3022133.png' },
        { id: 5, name: 'Ibuprofen', cat: 'painkiller', stock: 25, img: 'https://cdn-icons-png.flaticon.com/512/2864/2864448.png' },
        { id: 6, name: 'Mefenamic Acid', cat: 'painkiller', stock: 18, img: 'https://cdn-icons-png.flaticon.com/512/883/883356.png' }
    ];

    let cart = [];

    function renderMeds(items, isCartView = false) {
        const grid = document.getElementById('med-grid');
        const purchaseBar = document.getElementById('purchase-bar');
        grid.innerHTML = '';
        
        if (isCartView && cart.length > 0) {
            purchaseBar.style.visibility = "visible";
            purchaseBar.style.height = "auto";
            purchaseBar.style.padding = "12px 30px";
            purchaseBar.style.opacity = "1";
        } else {
            purchaseBar.style.visibility = "hidden";
            purchaseBar.style.height = "0";
            purchaseBar.style.padding = "0";
            purchaseBar.style.opacity = "0";
        }

        if(items.length === 0) {
            grid.innerHTML = `<div class="w-100 text-center mt-5" style="grid-column: span 4;">
                <i class="fa-solid fa-box-open d-block mb-3" style="font-size: 3rem; color: #ccc;"></i>
                <p class="text-muted">No medicines found.</p>
            </div>`;
            return;
        }

        items.forEach(med => {
            const card = `
                <div class="med-card">
                    <img src="${med.img}" class="med-img" alt="${med.name}">
                    <div>
                        <p class="med-name">${med.name}</p>
                        <div class="stock-count">Available: ${med.stock}</div>
                    </div>
                    ${isCartView ? 
                        `<button class="btn-action btn-remove" onclick="removeFromCart(${med.id})">Remove from Cart</button>` :
                        `<button class="btn-action btn-add" onclick="addToCart(${med.id})">Add to Cart</button>`
                    }
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    function filterMeds(category, event) {
        updateActivePill(event.target);
        const filtered = inventory.filter(m => m.cat === category);
        renderMeds(filtered);
    }

    function addToCart(id) {
        const item = inventory.find(m => m.id === id);
        if(!cart.includes(item)) {
            cart.push(item);
            document.getElementById('cart-count').innerText = cart.length;
        }
        showCart();
    }

    function removeFromCart(id) {
        cart = cart.filter(m => m.id !== id);
        document.getElementById('cart-count').innerText = cart.length;
        document.getElementById('cart-total-footer').innerText = cart.length;
        showCart();
    }

    function showCart() {
        const cartPill = document.querySelector('.cart-btn');
        updateActivePill(cartPill);
        document.getElementById('cart-total-footer').innerText = cart.length;
        renderMeds(cart, true);
    }

    function updateActivePill(target) {
        document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
        target.classList.add('active');
    }

    renderMeds(inventory.filter(m => m.cat === 'available'));
</script>

</body>
</html>
