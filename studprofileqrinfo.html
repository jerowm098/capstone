<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --pup-maroon: #9C0C20; --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: transparent; padding: 2.5rem; }
        .left-info-column { background: #f8f9fa; border-radius: 25px; padding: 2.5rem 1.5rem; text-align: center; border: 1px solid #eee; }
        .qr-placeholder { color: var(--pup-maroon); margin-bottom: 1rem; }
        .section-title { color: var(--pup-maroon); font-weight: 700; font-size: 1.1rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex-grow: 1; height: 1px; background: #eee; }
    </style>
</head>
<body>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="left-info-column">
                <div class="bg-white p-3 d-inline-block mb-3" style="border-radius: 20px; box-shadow: var(--clay-shadow);">
                    <i class="fa-solid fa-qrcode fa-5x qr-placeholder"></i>
                </div>
                <h6 class="fw-bold mb-0">CareLink QR Code</h6>
                <p class="text-muted small">Scan for Clinic Access</p>
            </div>
        </div>
        <div class="col-md-8">
            <h5 class="section-title">QR Configuration</h5>
            <div class="row g-3">
                <div class="col-md-6"><div class="form-floating"><input type="text" class="form-control" value="Juan" readonly><label>First Name</label></div></div>
                <div class="col-md-6"><div class="form-floating"><input type="text" class="form-control" value="Dela Cruz" readonly><label>Last Name</label></div></div>
                <div class="col-12"><div class="form-floating"><input type="text" class="form-control" value="3rd Year - BSIT" readonly><label>Year and Course</label></div></div>
            </div>
        </div>
    </div>
    <script>
                // Tinitingnan kung ang page ay HINDI naka-iframe
        if (window.self === window.top) {
            // Kunin ang pangalan ng file na ito (e.g., studappointments.html)
            const currentPage = window.location.pathname.split("/").pop();
            
            // I-redirect sa main dashboard pero lagyan ng parameter
            window.location.href = "studdashboard.html?page=studprofile.html&subpage=" + currentPage;
        }
    </script>
</body>
</html>
