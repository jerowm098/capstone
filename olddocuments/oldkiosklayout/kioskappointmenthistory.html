<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kiosk Appointment History | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pup-maroon: #9C0C20;
            --pup-maroon-dark: #7a0919;
            --medical-blue: #2C3E50;
            --clay-bg: #f4f7fc;
            --clay-shadow: 12px 12px 24px #d5dce3, -8px -8px 20px #ffffff;
            --clay-soft-shadow: 6px 6px 12px #d1d9e6, -4px -4px 10px #ffffff;
            --clay-inset: inset 5px 5px 12px #d1d9e6, inset -5px -5px 12px #ffffff;
            --signal-red: #dc3545;
            --signal-green: #28a745;
            --pending-orange: #f39c12;
            --completed-green: #2ecc71;
            --action-blue: #3498db;
            --action-soft-bg: rgba(52,152,219,0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, rgba(156, 12, 32, 0.88), rgba(28, 38, 48, 0.94)), 
                        url('https://images.unsplash.com/photo-1584515933487-779824d29309?auto=format&fit=crop&w=1920');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .kiosk-master-card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(8px);
            border-radius: 42px;
            padding: 1.8rem 2.5rem 1.8rem 2.5rem;
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.5);
            width: 1400px;
            height: 800px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
        }

        .brand-header {
            flex-shrink: 0;
            margin-bottom: 0.5rem;
        }
        
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .pup-logo-container {
            width: 58px;
            height: 58px;
            background: linear-gradient(135deg, var(--pup-maroon) 0%, var(--pup-maroon-dark) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(156,12,32,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .pup-logo-container i {
            font-size: 32px;
            color: white;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        
        .brand-text h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--pup-maroon);
            margin-bottom: 0;
            letter-spacing: -0.5px;
        }
        .brand-text p {
            color: var(--medical-blue);
            font-weight: 500;
            font-size: 0.8rem;
            margin-bottom: 0;
        }

        .step-breadcrumb {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 0rem;
            margin: 0.8rem 0 0.2rem 0;
            padding: 0.2rem 0 0.5rem 0;
            flex-shrink: 0;
            border-bottom: 2px solid rgba(156,12,32,0.2);
        }
        
        .table-title-area {
            display: flex;
            align-items: baseline;
            gap: 12px;
            width: 100%;
        }
        
        .table-main-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--pup-maroon);
            letter-spacing: -0.3px;
            background: rgba(156,12,32,0.08);
            padding: 4px 18px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .table-main-title i {
            font-size: 1.2rem;
        }
        
        .appointment-count-badge {
            background: var(--medical-blue);
            color: white;
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .separator-line-upper {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(156,12,32,0.25), rgba(44,62,80,0.4), rgba(156,12,32,0.25), transparent);
            border-radius: 4px;
            margin: 0.3rem 0 0.4rem 0;
            flex-shrink: 0;
        }
        
        .separator-line-bottom {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(156,12,32,0.25), rgba(44,62,80,0.4), rgba(156,12,32,0.25), transparent);
            border-radius: 4px;
            margin: 0.2rem 0 0.1rem 0;
            flex-shrink: 0;
        }
        
        .main-content-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: auto;
        }

        .toast-popup {
            position: absolute;
            top: 6px;
            right: 20px;
            width: 380px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease-in-out;
            border-left: 5px solid var(--pup-maroon);
        }
        .toast-popup.show {
            opacity: 1;
            visibility: visible;
        }
        .toast-popup.hide-toast {
            opacity: 0;
            visibility: hidden;
        }
        .toast-header-custom {
            background: var(--pup-maroon);
            color: white;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        .toast-header-custom strong {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast-close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.8;
        }
        .toast-close-btn:hover {
            opacity: 1;
        }
        .toast-body-custom {
            padding: 14px 18px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--medical-blue);
            background: #fff;
        }

        /* Detailed view modal */
        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
        }
        .detail-modal.show-detail-modal {
            display: flex;
        }
        .detail-modal-content {
            background: white;
            border-radius: 32px;
            width: 500px;
            max-width: 90%;
            overflow: hidden;
            animation: modalFadeIn 0.25s ease;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
        }
        .detail-modal-header {
            background: linear-gradient(135deg, var(--pup-maroon), var(--pup-maroon-dark));
            color: white;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .detail-modal-header h3 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .detail-close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .detail-close-btn:hover {
            background: rgba(255,255,255,0.4);
        }
        .detail-modal-body {
            padding: 24px;
            background: #fefefe;
        }
        .detail-info-row {
            display: flex;
            border-bottom: 1px solid #eef2f7;
            padding: 12px 0;
            align-items: flex-start;
        }
        .detail-info-label {
            width: 130px;
            font-weight: 700;
            color: var(--pup-maroon);
            font-size: 0.85rem;
        }
        .detail-info-value {
            flex: 1;
            color: var(--medical-blue);
            font-weight: 500;
            font-size: 0.9rem;
            word-break: break-word;
        }
        .detail-badge-status {
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-pending {
            background: #fff3e0;
            color: var(--pending-orange);
        }
        .status-completed {
            background: #e0f9ef;
            color: var(--completed-green);
        }
        .detail-modal-footer {
            padding: 16px 24px;
            background: #f8fafc;
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid #eef2f7;
        }
        .detail-ok-btn {
            background: var(--pup-maroon);
            border: none;
            border-radius: 40px;
            padding: 8px 28px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .kiosk-table-container {
            width: 100%;
            background: var(--clay-bg);
            border-radius: 28px;
            box-shadow: var(--clay-shadow);
            padding: 1.2rem 1rem;
            margin-top: 0.5rem;
            overflow-x: auto;
        }
        
        .appointments-history-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            font-family: 'Poppins', sans-serif;
        }
        
        .appointments-history-table thead th {
            background: transparent;
            color: var(--medical-blue);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 12px;
            border-bottom: 2px solid rgba(156,12,32,0.25);
            text-align: left;
        }
        
        .appointments-history-table tbody tr {
            background: white;
            border-radius: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            cursor: pointer;
        }
        
        .appointments-history-table tbody tr:hover {
            background: #fffaf5;
            transform: scale(1.01);
            box-shadow: var(--clay-soft-shadow);
        }
        
        .appointments-history-table td {
            padding: 14px 12px;
            vertical-align: middle;
            border-top: 1px solid #f0f2f5;
            border-bottom: 1px solid #f0f2f5;
            font-size: 0.85rem;
            color: var(--medical-blue);
        }
        
        .appointments-history-table td:first-child {
            border-left: 1px solid #f0f2f5;
            border-radius: 18px 0 0 18px;
        }
        .appointments-history-table td:last-child {
            border-right: 1px solid #f0f2f5;
            border-radius: 0 18px 18px 0;
        }
        
        .nurse-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nurse-avatar-sm {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--pup-maroon), #b04555);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .nurse-info h6 {
            margin: 0;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .nurse-id-label {
            font-size: 0.7rem;
            font-family: 'Monaco', 'Menlo', monospace;
            font-weight: 500;
            background: #f0f2f7;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-block;
            color: #2c3e50;
            letter-spacing: 0.3px;
            margin-top: 4px;
            border: 1px solid #e2e8f0;
        }
        
        .appointment-id-badge-kiosk {
            background: rgba(156,12,32,0.08);
            padding: 5px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: 700;
            font-size: 0.8rem;
            display: inline-block;
            color: var(--pup-maroon);
            border: 1px solid rgba(156,12,32,0.2);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            width: fit-content;
        }
        .status-badge.pending {
            background: #fef5e7;
            color: var(--pending-orange);
            border-left: 3px solid var(--pending-orange);
        }
        .status-badge.completed {
            background: #e8f8f0;
            color: var(--completed-green);
            border-left: 3px solid var(--completed-green);
        }
        
        .action-buttons-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-action-copy {
            background: var(--action-soft-bg);
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.7rem;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Poppins', sans-serif;
            color: var(--action-blue);
        }
        .btn-action-copy i {
            font-size: 0.75rem;
        }
        .btn-action-copy:hover {
            background: var(--action-blue);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(52,152,219,0.3);
        }
        
        .empty-state-table {
            text-align: center;
            padding: 3rem;
            color: #8e9eae;
            cursor: default;
        }
        
        .footer-link-area {
            text-align: center;
            margin-top: 0.5rem;
            margin-bottom: 0.2rem;
            flex-shrink: 0;
        }
        .back-link {
            text-decoration: none;
            font-weight: 600;
            color: var(--medical-blue);
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.5);
            padding: 4px 14px;
            border-radius: 40px;
            transition: 0.2s;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.8);
            color: var(--pup-maroon);
        }
        
        @media (max-width: 900px) {
            .kiosk-master-card { padding: 1rem 1.2rem; width: 95vw; height: 90vh; }
            .appointments-history-table thead th { font-size: 0.65rem; padding: 8px 4px; }
            .appointments-history-table td { padding: 10px 6px; font-size: 0.7rem; }
            .btn-action-copy { padding: 4px 8px; font-size: 0.6rem; }
            .nurse-avatar-sm { width: 30px; height: 30px; font-size: 0.7rem; }
            .action-buttons-group { gap: 4px; }
        }
    </style>
</head>
<body>

<div class="kiosk-master-card">
    <div class="brand-header d-flex justify-content-between align-items-center">
        <div class="logo-wrapper">
            <div class="pup-logo-container">
                <i class="fas fa-university"></i>
            </div>
            <div class="brand-text">
                <h1>PUPBC CareLink</h1>
                <p>Kiosk • Appointment History | View Records & Get Copy</p>
            </div>
        </div>
    </div>

    <div class="step-breadcrumb">
        <div class="table-title-area">
            <div class="table-main-title">
                <i class="fa-solid fa-clock-rotate-left"></i> Appointment History
            </div>
            <div class="appointment-count-badge" id="totalAppointmentsBadge">0 records</div>
        </div>
    </div>
    
    <div class="separator-line-upper"></div>

    <!-- Toast Notification -->
    <div id="successToast" class="toast-popup">
        <div class="toast-header-custom">
            <strong><i class="fa-regular fa-envelope"></i> Copy Request</strong>
            <button class="toast-close-btn" onclick="hideToast()">&times;</button>
        </div>
        <div class="toast-body-custom" id="toastMessage"></div>
    </div>

    <!-- Detailed View Modal (unchanged design) -->
    <div id="detailViewModal" class="detail-modal">
        <div class="detail-modal-content">
            <div class="detail-modal-header">
                <h3><i class="fa-regular fa-file-lines"></i> Appointment Details</h3>
                <button class="detail-close-btn" id="closeDetailModalBtn">&times;</button>
            </div>
            <div class="detail-modal-body" id="detailModalBody"></div>
            <div class="detail-modal-footer">
                <button class="detail-ok-btn" id="detailOkBtn">Close</button>
            </div>
        </div>
    </div>

    <div class="main-content-wrapper">
        <div class="kiosk-table-container">
            <table class="appointments-history-table" id="appointmentsHistoryTable">
                <thead>
                    <tr>
                        <th>Nurse Name</th>
                        <th>Appointment ID</th>
                        <th>Status</th>   <!-- NEW column between Appointment ID and Action -->
                        <th>Action</th>    <!-- Updated: Get Copy via SMS / Email -->
                    </tr>
                </thead>
                <tbody id="appointmentsListTbody">
                    <!-- dynamic rows -->
                </tbody>
            </table>
        </div>
    </div>

    <div class="separator-line-bottom"></div>
    <div class="footer-link-area"><a href="kioskdashboard.html" class="back-link"><i class="fa-solid fa-arrow-left-long me-1"></i> Back to Dashboard</a></div>
</div>

<script>
    // ----- APPOINTMENT HISTORY DATA (includes status: pending / completed) -----
    let historyAppointments = [];

    // Helper to generate rich sample data with mixed statuses
    function generateHistoryData() {
        const nurses = [
            { name: "Dr. Maria Santiago", baseId: "NUR-2024-0123" },
            { name: "Nurse Emily Rodriguez", baseId: "NUR-2024-0124" },
            { name: "Dr. James Cruz", baseId: "NUR-2024-0125" },
            { name: "Nurse Michael Tan", baseId: "NUR-2024-0126" },
            { name: "Dr. Patricia Lim", baseId: "NUR-2024-0127" },
            { name: "Nurse Sarah Gomez", baseId: "NUR-2024-0128" },
            { name: "Dr. Christopher Diaz", baseId: "NUR-2024-0129" }
        ];
        
        const patients = [
            { name: "Juan Dela Cruz", id: "PUP-10123", service: "General Checkup", time: "09:00 AM" },
            { name: "Maria Santos", id: "PUP-10145", service: "Vaccination", time: "10:30 AM" },
            { name: "Carlos Reyes", id: "PUP-10178", service: "Dental Consultation", time: "01:00 PM" },
            { name: "Ana Marie Lopez", id: "PUP-10201", service: "Prenatal Check", time: "02:15 PM" },
            { name: "Roberto Fernandez", id: "PUP-10234", service: "Physical Therapy", time: "03:45 PM" },
            { name: "Kristine Joy Villanueva", id: "PUP-10267", service: "Nutrition Counseling", time: "11:00 AM" },
            { name: "Mark Anthony Flores", id: "PUP-10299", service: "Laboratory Results", time: "04:00 PM" }
        ];
        
        // Statuses: mixed pending & completed
        const statuses = ["pending", "completed", "pending", "completed", "completed", "pending", "completed"];
        
        return nurses.map((nurse, idx) => {
            const patient = patients[idx % patients.length];
            const statusValue = statuses[idx % statuses.length];
            return {
                id: `hist_${idx+1}`,
                nurseName: nurse.name,
                nurseId: nurse.baseId,
                appointmentId: `APT-2404-${871 + idx}`,
                patientName: patient.name,
                patientId: patient.id,
                serviceType: patient.service,
                appointmentTime: patient.time,
                status: statusValue,   // 'pending' or 'completed'
                nurseInitials: nurse.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase()
            };
        });
    }
    
    // Load data from localStorage or generate fresh
    function loadHistoryData() {
        const stored = localStorage.getItem('kiosk_appointment_history');
        if (stored && JSON.parse(stored).length > 0) {
            historyAppointments = JSON.parse(stored);
            // ensure each item has status field
            let updated = false;
            historyAppointments.forEach(apt => {
                if (!apt.status) { apt.status = "pending"; updated = true; }
                if (!apt.nurseId) apt.nurseId = "NUR-DEFAULT";
                if (!apt.patientName) apt.patientName = "Patient";
                if (!apt.serviceType) apt.serviceType = "Consultation";
            });
            if (updated) saveToLocalStorage();
        } else {
            historyAppointments = generateHistoryData();
            saveToLocalStorage();
        }
        updateTotalBadge();
        renderHistoryTable();
    }
    
    function saveToLocalStorage() {
        localStorage.setItem('kiosk_appointment_history', JSON.stringify(historyAppointments));
    }
    
    function updateTotalBadge() {
        const badge = document.getElementById('totalAppointmentsBadge');
        if (badge) badge.innerText = `${historyAppointments.length} record${historyAppointments.length !== 1 ? 's' : ''}`;
    }
    
    function getInitialsFromName(name) {
        if (!name) return "N";
        const parts = name.split(' ');
        if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
        return (parts[0].charAt(0) + parts[parts.length-1].charAt(0)).toUpperCase();
    }
    
    // Show toast message for copy actions
    function showToastMessage(message, type = "info") {
        const toastDiv = document.getElementById('successToast');
        const toastMsgSpan = document.getElementById('toastMessage');
        const icon = type === "sms" ? "fa-regular fa-comment" : "fa-regular fa-envelope";
        toastMsgSpan.innerHTML = `<i class="${icon} me-2"></i> ${message}`;
        toastDiv.classList.remove('hide-toast', 'show');
        void toastDiv.offsetWidth;
        toastDiv.classList.add('show');
        if (window.toastTimeout) clearTimeout(window.toastTimeout);
        window.toastTimeout = setTimeout(() => hideToast(), 4000);
    }
    
    window.hideToast = function() {
        const toastDiv = document.getElementById('successToast');
        if(toastDiv) {
            toastDiv.classList.add('hide-toast');
            setTimeout(() => toastDiv.classList.remove('show', 'hide-toast'), 300);
        }
    };
    
    // Action handlers: Get Copy via SMS / Email
    function handleCopyViaSMS(appointment) {
        // Simulate sending SMS with appointment details
        const phoneNumber = "+63 912 345 6789"; // placeholder: In real kiosk would capture user mobile
        const message = `PUPBC CareLink: Your appointment ${appointment.appointmentId} with ${appointment.nurseName} on ${appointment.appointmentTime} (${appointment.serviceType}) is ${appointment.status}. Thank you!`;
        console.log(`[SMS] To: ${phoneNumber} | Message: ${message}`);
        showToastMessage(`SMS copy sent to ${phoneNumber} with appointment details.`, "sms");
    }
    
    function handleCopyViaEmail(appointment) {
        const emailAddress = "patient@pup.edu.ph"; // placeholder
        const subject = `Appointment Copy - ${appointment.appointmentId}`;
        const body = `Dear Patient,\n\nHere is your appointment details:\nAppointment ID: ${appointment.appointmentId}\nNurse: ${appointment.nurseName}\nPatient: ${appointment.patientName}\nService: ${appointment.serviceType}\nTime: ${appointment.appointmentTime}\nStatus: ${appointment.status.toUpperCase()}\n\nThank you for using PUPBC CareLink Kiosk.`;
        console.log(`[EMAIL] To: ${emailAddress} | Subject: ${subject} | Body: ${body}`);
        showToastMessage(`Email copy sent to ${emailAddress} with appointment details.`, "email");
    }
    
    // Detailed modal view (preserved)
    function showDetailModal(appointment) {
        const modalBody = document.getElementById('detailModalBody');
        if (!modalBody) return;
        
        const statusClass = appointment.status === 'pending' ? 'status-pending' : 'status-completed';
        const statusText = appointment.status === 'pending' ? 'Pending' : 'Completed';
        const statusIcon = appointment.status === 'pending' ? '<i class="fa-regular fa-hourglass-half"></i>' : '<i class="fa-regular fa-circle-check"></i>';
        
        modalBody.innerHTML = `
            <div class="detail-info-row">
                <div class="detail-info-label"><i class="fa-solid fa-user-nurse"></i> Nurse Name:</div>
                <div class="detail-info-value"><strong>${escapeHtml(appointment.nurseName)}</strong></div>
            </div>
            <div class="detail-info-row">
                <div class="detail-info-label"><i class="fa-regular fa-id-card"></i> Nurse ID:</div>
                <div class="detail-info-value">${escapeHtml(appointment.nurseId)}</div>
            </div>
            <div class="detail-info-row">
                <div class="detail-info-label"><i class="fa-solid fa-user"></i> Patient Name:</div>
                <div class="detail-info-value">${escapeHtml(appointment.patientName)}</div>
            </div>
            <div class="detail-info-row">
                <div class="detail-info-label"><i class="fa-regular fa-id-card"></i> Patient ID:</div>
                <div class="detail-info-value">${escapeHtml(appointment.patientId)}</div>
            </div>
            <div class="detail-info-row">
                <div class="detail-info-label"><i class="fa-solid fa-stethoscope"></i> Service Type:</div>
                <div class="detail-info-value">${escapeHtml(appointment.serviceType)}</div>
            </div>
            <div class="detail-info-row">
                <div class="detail-info-label"><i class="fa-solid fa-receipt"></i> Appointment ID:</div>
                <div class="detail-info-value"><code>${escapeHtml(appointment.appointmentId)}</code></div>
            </div>
            <div class="detail-info-row">
                <div class="detail-info-label"><i class="fa-regular fa-calendar-clock"></i> Appointment Time:</div>
                <div class="detail-info-value">${escapeHtml(appointment.appointmentTime)}</div>
            </div>
            <div class="detail-info-row">
                <div class="detail-info-label"><i class="fa-solid fa-flag-checkered"></i> Status:</div>
                <div class="detail-info-value"><span class="detail-badge-status ${statusClass}">${statusIcon} ${statusText}</span></div>
            </div>
        `;
        const detailModal = document.getElementById('detailViewModal');
        detailModal.classList.add('show-detail-modal');
    }
    
    function closeDetailModal() {
        const detailModal = document.getElementById('detailViewModal');
        detailModal.classList.remove('show-detail-modal');
    }
    
    function handleRowClick(event, appointment) {
        if (event.target.closest('.btn-action-copy')) return;
        showDetailModal(appointment);
    }
    
    function renderHistoryTable() {
        const tbody = document.getElementById('appointmentsListTbody');
        if (!tbody) return;
        
        if (historyAppointments.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="empty-state-table"><i class="fa-solid fa-folder-open fa-2x mb-2 opacity-50 d-block"></i>No appointment history found.<br><small>Appointments will appear here after check-in.</small></td></tr>`;
            return;
        }
        
        let html = '';
        historyAppointments.forEach(apt => {
            const initials = getInitialsFromName(apt.nurseName);
            const nurseNameEscaped = escapeHtml(apt.nurseName);
            const appointmentIdEscaped = escapeHtml(apt.appointmentId);
            const nurseIdDisplay = apt.nurseId || "NUR-0000";
            const statusValue = apt.status === 'pending' ? 'pending' : 'completed';
            const statusLabel = statusValue === 'pending' ? 'Pending' : 'Completed';
            const statusIconClass = statusValue === 'pending' ? 'fa-regular fa-clock' : 'fa-regular fa-circle-check';
            const statusBadgeClass = statusValue === 'pending' ? 'pending' : 'completed';
            
            html += `
                <tr class="history-row" data-id="${apt.id}" style="cursor:pointer;">
                    <td>
                        <div class="nurse-cell">
                            <div class="nurse-avatar-sm">${escapeHtml(initials)}</div>
                            <div class="nurse-info">
                                <h6>${nurseNameEscaped}</h6>
                                <div class="nurse-id-label"><i class="fa-regular fa-id-card me-1"></i> ${escapeHtml(nurseIdDisplay)}</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="appointment-id-badge-kiosk"><i class="fa-solid fa-receipt me-1"></i> ${appointmentIdEscaped}</span></td>
                    <td>
                        <div class="status-badge ${statusBadgeClass}">
                            <i class="${statusIconClass}"></i> ${statusLabel}
                        </div>
                    </td>
                    <td>
                        <div class="action-buttons-group">
                            <button class="btn-action-copy copy-sms" data-apt-id="${apt.id}" data-copy-type="sms">
                                <i class="fa-solid fa-mobile-alt"></i> Get Copy via SMS
                            </button>
                            <button class="btn-action-copy copy-email" data-apt-id="${apt.id}" data-copy-type="email">
                                <i class="fa-regular fa-envelope"></i> Get Copy via Email
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
        
        // Attach row click for detail view
        document.querySelectorAll('.history-row').forEach(row => {
            const aptId = row.getAttribute('data-id');
            const appointment = historyAppointments.find(a => a.id === aptId);
            if (appointment) {
                row.addEventListener('click', (e) => handleRowClick(e, appointment));
            }
        });
        
        // Attach action button events (SMS / Email)
        document.querySelectorAll('.copy-sms').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const aptId = btn.getAttribute('data-apt-id');
                const apt = historyAppointments.find(a => a.id === aptId);
                if (apt) handleCopyViaSMS(apt);
            });
        });
        
        document.querySelectorAll('.copy-email').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const aptId = btn.getAttribute('data-apt-id');
                const apt = historyAppointments.find(a => a.id === aptId);
                if (apt) handleCopyViaEmail(apt);
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Optional: sync with any external walk-in data but preserve history structure (just for completeness)
    function syncExternalData() {
        // For demonstration: keep existing history, no overwrite
        const existing = localStorage.getItem('kiosk_appointment_history');
        if (!existing || JSON.parse(existing).length === 0) {
            loadHistoryData();
        }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        loadHistoryData();
        
        // Detail modal close handlers
        const closeDetailBtn = document.getElementById('closeDetailModalBtn');
        const detailOkBtn = document.getElementById('detailOkBtn');
        if (closeDetailBtn) closeDetailBtn.addEventListener('click', closeDetailModal);
        if (detailOkBtn) detailOkBtn.addEventListener('click', closeDetailModal);
        window.addEventListener('click', (e) => {
            const detailModal = document.getElementById('detailViewModal');
            if (e.target === detailModal) closeDetailModal();
        });
        
        syncExternalData();
    });
    
    window.closeDetailModal = closeDetailModal;
    window.hideToast = hideToast;
</script>
</body>
</html>
