<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Patient Management | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --main-form-width: 1200px;
            --layout-margin-top: 1rem;
            --standard-padding: 1.5rem;
            --border-subtle: 1px solid rgba(40, 49, 58, 0.1);
            --brand-primary: #28313a;      
            --medical-blue: #475867;        
            --white: #ffffff;
            --text-main: #28313a;          
            --clay-bg: #f4f7f6;
            --form-border-radius: 10px;           
            
            /* HEIGHT LOGIC VARIABLES */
            --app-height-fs: 100vh;
            --app-height-min: 600px;
            --app-height-fit: auto;
        }

        html { overflow-y: auto; scrollbar-gutter: stable; height: auto; }
        
        body {
            min-height: 100vh;
            height: auto;
            font-family: 'Poppins', sans-serif;
            background-color: var(--clay-bg);
            margin: 0;
            padding: var(--layout-margin-top) 0;
            display: flex;
            justify-content: center;
            color: var(--text-main);
        }

        .floating-form-container {
            width: 95%;
            max-width: var(--main-form-width);
            min-height: var(--app-height-min);
            height: var(--app-height-fit);
            background: var(--white);
            border-radius: var(--form-border-radius);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: var(--border-subtle);
            display: flex;
            flex-direction: column;
        }

        .nav-header-tab {
            background-color: var(--brand-primary);
            padding: 0 var(--standard-padding);
            display: flex;
            align-items: center;
            height: 60px;
            flex-shrink: 0;
        }

        .nav-header-tab .nav-tabs-inline {
            display: flex;
            gap: 2rem;
            margin: 0;
            padding: 0;
            height: 100%;
            align-items: center;
        }

        .nav-header-tab .nav-link-tab {
            color: rgba(255, 255, 255, 0.5);
            border: none;
            padding: 10px 0;
            font-weight: 600;
            background: transparent !important;
            position: relative;
            transition: 0.3s;
            text-decoration: none;
            font-size: 1.1rem;
            display: inline-block;
            cursor: pointer;
        }

        .nav-header-tab .nav-link-tab:hover, 
        .nav-header-tab .nav-link-tab.active {
            color: #ffffff !important;
        }

        .profile-body {
            flex-grow: 1;
            display: flex;
            width: 100%;
            background: var(--white);
            padding: 0;
            overflow: visible;
        }

        #patient-frame {
            width: 100%;
            flex-grow: 1;
            min-height: 500px;
            border: none;
            background: transparent;
            display: block;
        }

        @media (max-width: 768px) {
            .nav-header-tab { padding: 0 1rem; }
            .nav-header-tab .nav-tabs-inline { gap: 1rem; }
            .nav-header-tab .nav-link-tab { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="floating-form-container">
        <nav class="nav-header-tab">
            <div class="nav-tabs-inline" id="patientTabs">
                <a href="nursepatientnew.html" data-tab="new" class="nav-link-tab active">
                    Monitor New Patient
                </a>
                <a href="nursepatientmanage.html" data-tab="manage" class="nav-link-tab">
                    Manage Patients
                </a>
                <a href="nursepatientrecords.html" data-tab="records" class="nav-link-tab">
                    Medical Records
                </a>
            </div>
        </nav>

        <div class="profile-body">
            <iframe src="nursepatientnew.html" name="patient-frame" id="patient-frame"></iframe>
        </div>
    </div>

    <script>
        /**
         * FUNCTION #1: SECURITY REDIRECT (LAYOUT PROTECTION)
         * GINAGAWA: Sinisiguro na laging nakabukas sa loob ng Dashboard.
         */
        if (window.self === window.top) {
            const currentPage = window.location.pathname.split("/").pop();
            const urlParams = new URLSearchParams(window.location.search);
            const sub = urlParams.get('subpage') || 'nursepatientnew.html';
            window.location.href = "nursedashboard.html?page=" + currentPage + "&subpage=" + sub;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const tabs = document.querySelectorAll('.nav-link-tab');
            const iframe = document.getElementById('patient-frame');

            /**
             * FUNCTION #2: TAB SWITCHING LOGIC
             */
            function switchTab(tabId) {
                const mapping = {
                    'new': 'nursepatientnew.html',
                    'manage': 'nursepatientmanage.html',
                    'records': 'nursepatientrecords.html'
                };

                const iframeSrc = mapping[tabId] || 'nursepatientnew.html';
                iframe.src = iframeSrc;
                
                tabs.forEach(t => {
                    t.classList.remove('active');
                    if (t.getAttribute('data-tab') === tabId) t.classList.add('active');
                });
            }

            /**
             * FUNCTION #3: INITIAL URL STATE CHECKER (DEEP LINKING)
             */
            let activeSub = 'new'; 
            try {
                if (window.parent !== window.self) {
                    const parentParams = new URLSearchParams(window.parent.location.search);
                    const parentSubpage = parentParams.get('subpage');
                    
                    if (parentSubpage) {
                        if (parentSubpage.includes('manage')) activeSub = 'manage';
                        else if (parentSubpage.includes('records')) activeSub = 'records';
                        else if (parentSubpage.includes('new')) activeSub = 'new';
                    }
                }
            } catch(e) { activeSub = 'new'; }
            
            switchTab(activeSub);

            /**
             * FUNCTION #4: TAB CLICK EVENT HANDLER
             */
            tabs.forEach(tab => {
                tab.addEventListener('click', function(e) {
                    if (!e.ctrlKey && !e.metaKey) {
                        e.preventDefault();
                        const tabId = this.getAttribute('data-tab');
                        switchTab(tabId);
                        
                        try {
                            if (window.parent !== window.self) {
                                const subFile = this.getAttribute('href');
                                const newURL = window.parent.location.origin + window.parent.location.pathname + 
                                               '?page=nursepatient.html&subpage=' + subFile;
                                window.parent.history.replaceState({ path: newURL }, '', newURL);
                            }
                        } catch(e) { console.log('URL sync failed'); }
                    }
                });
            });

            /**
             * FUNCTION #5: IFRAME-TO-PARENT SYNC (AUTO-UPDATE)
             * GINAGAWA: Bina-balanse ang UI kung sakaling mag-navigate sa loob ng iframe.
             */
            iframe.addEventListener('load', function() {
                try {
                    const iframeSrc = iframe.contentWindow.location.pathname.split('/').pop();
                    let activeTabId = '';
                    
                    if (iframeSrc.includes('manage')) activeTabId = 'manage';
                    else if (iframeSrc.includes('records')) activeTabId = 'records';
                    else if (iframeSrc.includes('new')) activeTabId = 'new';
                    
                    if (activeTabId) {
                        tabs.forEach(t => {
                            t.classList.remove('active');
                            if (t.getAttribute('data-tab') === activeTabId) t.classList.add('active');
                        });
                        
                        if (window.parent !== window.self) {
                            const newURL = window.parent.location.origin + window.parent.location.pathname + 
                                           '?page=nursepatient.html&subpage=' + iframeSrc;
                            window.parent.history.replaceState({ path: newURL }, '', newURL);
                        }
                    }
                } catch(e) { }
            });
        });
    </script>
</body>
</html>
