<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Portal | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867; /* Kept from your Admin class */
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* Mirrored & Blurred Background using your requested Image */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* Use a simple dark gradient to ensure text is visible without changing image colors */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), 
                        url('https://media.istockphoto.com/id/1501183871/photo/doctors-registering-patients-at-the-hospital.jpg?s=612x612&w=0&k=20&c=mnjpoSNO69dNWp11zMmbmMx5S0ch4cG_d-8sMvKzKwI=');
            background-size: cover;
            background-position: center;
            filter: blur(10px);
            transform: scale(1.1);
            z-index: -1;
        }

        .login-container {
            width: 100%; max-width: 1100px;
            height: 650px;
            background: transparent;
            border-radius: 40px;
            display: grid; grid-template-columns: 1.2fr 1fr;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            position: relative;
            backdrop-filter: blur(5px);
        }

        /* BRAND SIDE - Updated content based on Document Objectives */
        .brand-side {
            /* Changed from maroon/blue-grey tint to a neutral dark overlay */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), 
                        url('https://media.istockphoto.com/id/1501183871/photo/doctors-registering-patients-at-the-hospital.jpg?s=612x612&w=0&k=20&c=mnjpoSNO69dNWp11zMmbmMx5S0ch4cG_d-8sMvKzKwI=');
            background-size: cover;
            background-position: center;
            padding: 4rem;
            display: flex; flex-direction: column; justify-content: center;
            color: white;
        }

        /* FORM SIDE */
        .form-side {
            padding: 3rem 4rem;
            background: rgba(253, 253, 253, 0.95);
            display: flex; flex-direction: column; justify-content: center;
        }

        .login-header h2 { font-weight: 700; color: var(--medical-blue); margin-bottom: 0.5rem; }
        .login-header p { color: #666; font-size: 0.85rem; margin-bottom: 2rem; }

        /* Claymorphism Inputs */
        .input-box {
            background: var(--clay-bg);
            border-radius: 20px;
            padding: 5px 20px;
            box-shadow: var(--clay-inset);
            display: flex; 
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--medical-blue); }
        .input-box i { color: var(--medical-blue); margin-left: 15px; opacity: 0.6; }
        .input-box input {
            background: transparent; border: none; outline: none;
            width: 100%; padding: 12px 0; font-size: 0.9rem;
            color: var(--medical-blue);
        }

        .btn-doctor {
            background: var(--medical-blue);
            color: white; border: none; border-radius: 20px;
            padding: 15px; width: 100%; font-weight: 600;
            box-shadow: 0 10px 20px rgba(71, 88, 103, 0.2);
            transition: 0.3s; margin-top: 5px;
        }
        .btn-doctor:hover { transform: translateY(-3px); background: #35424d; }

        .form-footer { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: #888; }
        .form-footer a { color: var(--pup-maroon); text-decoration: none; font-weight: 600; }
        
        .btn-back-footer {
            display: inline-block; margin-top: 1rem;
            color: var(--medical-blue) !important;
            font-size: 0.8rem; transition: 0.3s; opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand-side">
        <h1 class="fw-bold">Medical<br>Portal</h1>
        <p class="lead opacity-75">Health Information System & Triage Management</p>
        
        <div class="mt-4">
            <div class="d-flex align-items-center mb-3">
                <i class="fa-solid fa-file-medical me-3 fs-4"></i>
                <span>EHR & Health Record Management</span>
            </div>
            <div class="d-flex align-items-center mb-3">
                <i class="fa-solid fa-heart-pulse me-3 fs-4"></i>
                <span>Real-time Triage Urgency Monitoring</span>
            </div>
            <div class="d-flex align-items-center mb-3">
                <i class="fa-solid fa-qrcode me-3 fs-4"></i>
                <span>QR-Integrated Patient Identification</span>
            </div>
        </div>
    </div>

    <div class="form-side">
        <div class="login-header">
            <h2>Staff Login</h2>
            <p>Authorized Clinic Personnel Access Only</p>
        </div>

        <form action="nursedashboard.html" method="GET">
            <label class="small fw-bold mb-1 ms-2" style="color: var(--medical-blue);">EMPLOYEE / LICENSE ID</label>
            <div class="input-box">
                <input type="text" placeholder="EMP-2026-XXXX" required>
                <i class="fa-solid fa-id-card"></i>
            </div>

            <label class="small fw-bold mb-1 ms-2" style="color: var(--medical-blue);">SECURITY PASSCODE</label>
            <div class="input-box">
                <input type="password" placeholder="••••••••" required>
                <i class="fa-solid fa-shield-halved"></i>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberDoctor">
                    <label class="form-check-label small text-muted" for="rememberDoctor">Keep me logged in</label>
                </div>
                <a href="#" class="small text-decoration-none" style="color: var(--medical-blue); font-weight: 600;">Forgot?</a>
            </div>

            <button type="submit" class="btn-doctor">
                ACCESS SYSTEM <i class="fa-solid fa-right-to-bracket ms-2"></i>
            </button>
        </form>

        <div class="form-footer">
            New medical staff? <br>
            <a href="nurseregister.html">Request Account Access</a>
            <br>
            <a href="portalmain.html" class="btn-back-footer">
                <i class="fa-solid fa-arrow-left-long"></i> Back to Main Portal
            </a>
        </div>
    </div>
</div>

</body>
</html>
