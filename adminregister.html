<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --admin-dark: #0D141A;
            --admin-slate: #475867;
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1200');
            background-size: cover;
            background-position: center;
            filter: blur(10px);
            transform: scale(1.1);
            z-index: -1;
        }

        .registration-container {
            width: 100%; max-width: 1100px;
            height: 650px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            /* SWAPPED: Form is now 1.2fr (wider) and Image is 1fr (narrower) */
            display: grid; grid-template-columns: 1.2fr 1fr;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            backdrop-filter: blur(15px);
        }

        .brand-side {
            background: linear-gradient(rgba(13, 20, 26, 0.9), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1200');
            background-size: cover;
            background-position: center;
            padding: 4rem;
            display: flex; flex-direction: column; justify-content: center;
            color: white;
            /* Image on the right side */
            order: 2;
        }

        .form-side {
            padding: 3rem 4rem;
            background: rgba(253, 253, 253, 0.95);
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            text-align: center;
            /* Form on the left side */
            order: 1;
        }

        .header h2 { font-weight: 700; color: var(--admin-dark); margin-bottom: 0.3rem; }
        .header p { color: #666; font-size: 0.85rem; margin-bottom: 1.5rem; }

        .personnel-tag {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-size: 0.65rem;
            color: var(--pup-maroon);
            margin: 0 auto 1.2rem auto; 
            padding: 6px 15px;
            background: rgba(156, 12, 32, 0.08);
            border-radius: 12px;
            display: table; 
        }

        .form-label-custom {
            display: block;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 5px;
            margin-left: 10px;
            color: var(--admin-slate);
        }

        .input-box {
            background: var(--clay-bg);
            border-radius: 18px;
            padding: 2px 18px;
            box-shadow: var(--clay-inset);
            display: flex; 
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--admin-dark); }
        .input-box i { color: var(--admin-dark); margin-left: 15px; opacity: 0.6; font-size: 0.9rem; }
        .input-box input {
            background: transparent; border: none; outline: none;
            width: 100%; padding: 10px 0; font-size: 0.85rem;
            color: var(--admin-dark);
        }

        /* Side-by-side wrapper */
        .input-row {
            display: flex;
            gap: 15px;
        }
        .input-row > div { flex: 1; }

        .btn-admin {
            background: var(--admin-dark);
            color: white; border: none; border-radius: 20px;
            padding: 14px; width: 100%; font-weight: 600;
            box-shadow: 0 10px 20px rgba(13, 20, 26, 0.2);
            transition: 0.3s; margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        .btn-admin:hover { transform: translateY(-3px); background: #1a252f; box-shadow: 0 15px 30px rgba(0,0,0,0.3); }

        .form-footer { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: #888; }
        .form-footer a { color: var(--admin-dark); text-decoration: none; font-weight: 600; }
        
        .btn-back-footer {
            display: inline-block;
            margin-top: 1rem;
            color: var(--admin-slate) !important;
            font-size: 0.8rem;
            transition: 0.3s;
            opacity: 0.8;
            text-decoration: none;
        }
        .btn-back-footer:hover { opacity: 1; transform: translateX(-3px); color: var(--pup-maroon) !important; }
    </style>
</head>
<body>

<div class="registration-container">
    <div class="form-side">
        <div class="header">
            <div class="personnel-tag">
                <i class="fa-solid fa-user-shield me-1"></i>
                Admin Personnel Registration
            </div>
            <h2>Create Account</h2>
            <p>Enter your details to register for system access.</p>
        </div>

        <form>
            <div class="input-row">
                <div>
                    <label class="form-label-custom">FIRST NAME</label>
                    <div class="input-box">
                        <input type="text" placeholder="First Name" required>
                    </div>
                </div>
                <div>
                    <label class="form-label-custom">LAST NAME</label>
                    <div class="input-box">
                        <input type="text" placeholder="Last Name" required>
                    </div>
                </div>
            </div>

            <label class="form-label-custom">OFFICIAL EMAIL</label>
            <div class="input-box">
                <input type="email" placeholder="admin@pup.edu.ph" required>
                <i class="fa-solid fa-envelope"></i>
            </div>

            <div class="input-row">
                <div>
                    <label class="form-label-custom">PASSWORD</label>
                    <div class="input-box">
                        <input type="password" placeholder="••••••••" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>
                <div>
                    <label class="form-label-custom">CONFIRM</label>
                    <div class="input-box">
                        <input type="password" placeholder="••••••••" required>
                        <i class="fa-solid fa-check-double"></i>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-admin">
                Register Admin <i class="fa-solid fa-user-plus ms-2"></i>
            </button>
        </form>

        <div class="form-footer">
            Already registered? <a href="adminlogin.html">Login here</a>
            <br>
            <a href="portalmain.html" class="btn-back-footer">
                <i class="fa-solid fa-arrow-left-long me-1"></i> Back to Portal
            </a>
        </div>
    </div>

    <div class="brand-side">
        <h1 class="display-5 fw-bold">Admin<br>Portal</h1>
        <p class="lead opacity-75">CareLink Security & Database Management.</p>
        <div class="mt-4">
            <div class="d-flex align-items-center mb-3">
                <i class="fa-solid fa-shield-halved me-3"></i>
                <span>Secure Access Control</span>
            </div>
            <div class="d-flex align-items-center">
                <i class="fa-solid fa-database me-3"></i>
                <span>System Administration</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
