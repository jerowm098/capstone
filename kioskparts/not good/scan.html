<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareLink Express | QR Portal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867;
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(156, 12, 32, 0.8), rgba(13, 20, 26, 0.9)), 
                        url('https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=1920');
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .portal-card-lg {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        .column-padding { padding: 3rem; }

        /* Left Side: QR Scanner */
        .camera-section {
            background: var(--clay-bg);
            border-right: 1px solid rgba(0, 0, 0, 0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Fixed size container to prevent shrinking/jumping */
        #reader {
            width: 100%;
            aspect-ratio: 1/1; /* Keeps it square regardless of state */
            border-radius: 30px;
            overflow: hidden;
            background: #000;
            position: relative;
            box-shadow: var(--clay-shadow);
            border: 8px solid var(--clay-bg);
        }

        .scanner-laser {
            position: absolute;
            top: 10%;
            left: 0;
            width: 100%;
            height: 3px;
            background: #ff4d4d;
            box-shadow: 0 0 15px 2px #ff4d4d;
            z-index: 10;
            animation: scanning 3s infinite ease-in-out;
        }

        @keyframes scanning { 50% { top: 90%; } }

        /* Form UI */
        .form-label { 
            font-weight: 600; 
            color: var(--medical-blue); 
            font-size: 0.85rem; 
            margin-left: 10px; 
            margin-bottom: 8px;
            display: block;
        }

        .input-group-clay {
            background: var(--clay-bg);
            border-radius: 15px;
            padding: 5px 20px;
            box-shadow: var(--clay-inset);
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .input-group-clay input {
            background: transparent; 
            border: none; 
            outline: none;
            width: 100%; 
            padding: 12px 0; 
            color: var(--medical-blue); 
            font-size: 0.9rem;
        }

        /* Success State */
        .populated input {
            color: var(--pup-maroon) !important;
            font-weight: 600;
        }

        .btn-schedule {
            background: var(--pup-maroon);
            color: white; 
            border: none; 
            border-radius: 15px;
            padding: 15px; 
            width: 100%; 
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(156, 12, 32, 0.2);
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-schedule:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-schedule:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(156, 12, 32, 0.3);
        }

        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { color: white; text-decoration: none; opacity: 0.8; font-weight: 600; }

        @media (max-width: 991px) {
            .portal-card-lg { grid-template-columns: 1fr; max-width: 500px; }
            .camera-section { border-right: none; }
        }
    </style>
</head>
<body>

<nav class="back-nav">
    <a href="studentdashboard.html" class="back-link">
        <i class="fa-solid fa-arrow-left me-2"></i> Dashboard
    </a>
</nav>

<div class="portal-card-lg">
    <div class="camera-section column-padding">
        <div class="mb-4">
            <h4 class="fw-bold mb-1" style="color: var(--medical-blue);">QR Scan</h4>
            <p class="small opacity-75">Align ID to the viewfinder</p>
        </div>

        <div id="reader">
            <div class="scanner-laser"></div>
        </div>

        <div class="mt-4">
            <p class="small text-secondary m-0">
                <i class="fa-solid fa-shield-halved me-1"></i> CareLink Secure Portal
            </p>
        </div>
    </div>

    <div class="form-section column-padding">
        <div class="mb-4">
            <h4 class="fw-bold mb-1" id="form-title" style="color: var(--medical-blue);">Patient Information</h4>
            <p class="small opacity-75" id="form-subtitle">Data will populate automatically</p>
        </div>

        <div id="patient-form">
            <label class="form-label">Student / Patient ID</label>
            <div class="input-group-clay" id="box-id">
                <input type="text" id="display-id" placeholder="Waiting for scan..." readonly>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    <div class="input-group-clay" id="box-fname">
                        <input type="text" id="display-fname" placeholder="---" readonly>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <div class="input-group-clay" id="box-lname">
                        <input type="text" id="display-lname" placeholder="---" readonly>
                    </div>
                </div>
            </div>

            <label class="form-label">Department / Program</label>
            <div class="input-group-clay" id="box-dept">
                <input type="text" id="display-dept" placeholder="---" readonly>
            </div>

            <div id="form-actions">
                <button id="confirm-btn" class="btn-schedule" disabled onclick="alert('Attendance Recorded!')">
                    Confirm Entry <i class="fa-solid fa-check-circle ms-2"></i>
                </button>
                <button id="rescan-btn" class="btn btn-sm w-100 mt-3 text-secondary" style="font-weight:600" onclick="location.reload()">
                    <i class="fa-solid fa-rotate-right me-1"></i> Rescan / Clear
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");

    function onScanSuccess(decodedText) {
        html5QrCode.stop();
        // Assuming format: ID,FirstName,LastName,Dept
        const data = decodedText.split(',');

        if (data.length >= 4) {
            updateFormFields(data[0], data[1], data[2], data[3]);
        } else {
            // Manual fallback for testing
            updateFormFields(decodedText, "Jerome", "Mallari", "BSIT - 3");
        }
    }

    function updateFormFields(id, fname, lname, dept) {
        document.getElementById('display-id').value = id;
        document.getElementById('display-fname').value = fname;
        document.getElementById('display-lname').value = lname;
        document.getElementById('display-dept').value = dept;

        // Apply visual "populated" style
        ['box-id', 'box-fname', 'box-lname', 'box-dept'].forEach(gid => {
            document.getElementById(gid).classList.add('populated');
        });

        // Enable buttons and update text
        document.getElementById('confirm-btn').disabled = false;
        document.getElementById('form-title').innerText = "Identity Verified";
        document.getElementById('form-subtitle').innerText = "Please confirm the details below";
    }

    // Set fixed scan box size to prevent internal library scaling
    const config = { fps: 15, qrbox: { width: 250, height: 250 } };
    
    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
    .catch(err => console.error("Scanner Error:", err));
</script>

</body>
</html>
