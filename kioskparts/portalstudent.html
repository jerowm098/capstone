<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Your Defined Palette */
            --pup-maroon: #9C0C20;
            --pup-red: #D51C3D;
            --dark-navy: #0D141A;
            --slate-gray: #475867;
            --soft-blue: #91ABBC;
            --clay-bg: #f0f0f0;
            
            /* Claymorphism Variables */
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 6px 6px 12px rgba(0,0,0,0.05), inset -6px -6px 12px rgba(255,255,255,0.8);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        .login-body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Background represents the campus with a maroon overlay */
            background: linear-gradient(rgba(156, 12, 32, 0.7), rgba(13, 20, 26, 0.8)), 
                        url('https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 20px 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Claymorphic Input Fields */
        .form-control-clay {
            background: var(--clay-bg);
            border: none;
            border-radius: 15px;
            padding: 12px 15px;
            box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
            transition: all 0.3s ease;
            color: var(--dark-navy);
        }

        .form-control-clay:focus {
            box-shadow: inset 6px 6px 10px #b8c2d1, inset -6px -6px 10px #ffffff;
            background: var(--clay-bg);
            outline: none;
        }

        /* Claymorphic Buttons */
        .btn-login {
            background: var(--pup-maroon);
            color: white;
            font-weight: 600;
            border-radius: 15px;
            padding: 12px;
            width: 100%;
            border: none;
            transition: 0.3s;
            box-shadow: 5px 5px 15px rgba(156, 12, 32, 0.3);
        }

        .btn-login:hover {
            background: var(--pup-red);
            transform: translateY(-2px);
            color: white;
            box-shadow: 8px 8px 20px rgba(156, 12, 32, 0.4);
        }

        .icon-box {
            background: var(--clay-bg);
            border-radius: 20px;
            box-shadow: var(--clay-shadow);
            display: inline-block;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .input-group-text {
            border: none;
            background: transparent;
        }

        a {
            color: var(--pup-maroon);
            transition: 0.2s;
        }

        a:hover {
            color: var(--pup-red);
        }
    </style>
</head>
<body class="login-body">

    <div class="container d-flex justify-content-center">
        <div class="login-card text-center">
            
            <div class="mb-4">
                <div class="icon-box">
                    <i class="fa-solid fa-staff-snake fa-3x" style="color: var(--pup-maroon);"></i>
                </div>
                <h2 class="fw-bold mt-2" style="color: var(--dark-navy);">CareLink Login</h2>
                <p class="text-muted small">PUP Biñan Campus Clinic Portal</p>
            </div>

            <form action="studentdashboard.html" method="POST">
                <div class="mb-3 text-start">
                    <label class="ms-2 mb-1 small fw-bold" style="color: var(--slate-gray);">Student/Faculty ID</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-id-card text-muted"></i></span>
                        <input type="text" class="form-control form-control-clay" placeholder="202X-XXXXX-BN-0" required>
                    </div>
                </div>

                <div class="mb-4 text-start">
                    <label class="ms-2 mb-1 small fw-bold" style="color: var(--slate-gray);">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control form-control-clay" placeholder="••••••••" required>
                    </div>
                    <div class="text-end mt-2">
                        <a href="#" class="text-decoration-none small">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" class="btn btn-login mb-3">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>SIGN IN
                </button>

                <div class="mt-2">
                    <p class="small text-muted">Don't have an account? 
                        <a href="studregister.html" class="fw-bold text-decoration-none" style="color: var(--slate-gray);">Request Access</a>
                    </p>
                </div>
            </form>

            <div class="mt-4 pt-3 border-top border-light">
                <a href="portalmain.html" class="btn btn-sm btn-light rounded-pill px-3 shadow-sm border">
                    <i class="fa-solid fa-arrow-left me-1"></i> Back to Portal
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
