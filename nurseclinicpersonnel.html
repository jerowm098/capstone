<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Clinic Personnel | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* --- Main Layout & Dimensions --- */
            --main-form-width: 1150px;
            --layout-margin-top: 2rem;
            --standard-padding: 1.5rem;
            --border-subtle: 1px solid rgba(40, 49, 58, 0.1);
            
            /* --- Colors --- */
            --brand-primary: #28313a;      
            --medical-blue: #475867;        
            --medical-blue-dark: #323e49;
            --medical-blue-light: #667f94;
            --medical-blue-soft: rgba(71, 88, 103, 0.08); 
            --white: #ffffff;
            --text-main: #28313a;          
            --text-muted: #5c7285;     
            --clay-bg: #f4f7f6;
            --danger-red: #dc3545;
            --danger-red-dark: #c82333;
            --success-green: #28a745;
            --warning-orange: #fd7e14;

            /* --- Form Container --- */
            --form-bg-color: #ffffff;
            --form-border-radius: 20px;           
            --form-box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            --form-border: 1px solid rgba(0, 0, 0, 0.05);
        }

        html {
            overflow-y: scroll; 
            scrollbar-gutter: stable;
        }
        
        body {
            min-height: 101vh;
            font-family: 'Poppins', sans-serif;
            background-color: var(--clay-bg);
            padding: var(--layout-margin-top) 0;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            margin: 0;
        }

        /* --- MAIN FLOATING FORM LAYOUT --- */
        .floating-form-container {
            width: 95%;
            max-width: var(--main-form-width);
            background: var(--form-bg-color);
            border-radius: var(--form-border-radius);
            overflow: hidden;
            box-shadow: var(--form-box-shadow);
            border: var(--form-border);
        }

        /* ============================================= */
        /* NAVBAR HEADER - MATCHING nurseappointments.html DESIGN */
        /* ============================================= */
        .nav-header-tab {
            background-color: var(--brand-primary);
            padding: 0 var(--standard-padding);
            display: flex;
            align-items: center;
            height: 60px;
        }

        .nav-header-tab h5 {
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s ease;
            margin: 0;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            padding: 10px 0;
            cursor: default;
            letter-spacing: 0.3px;
        }
        .nav-header-tab h5:hover {
            color: #ffffff;
        }

        /* --- CONTENT AREA --- */
        .form-content {
            padding: var(--standard-padding);
        }

        /* --- ACTION ROW LAYOUT: Left = Add Button, Right = Search + Total Counter --- */
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: var(--border-subtle);
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Left side group: add button only */
        .left-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Right side: search box + total personnel counter below */
        .right-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .search-box {
            background: var(--clay-bg);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 10px;
            padding: 8px 15px;
            width: 280px;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--medical-blue-light);
            background: var(--white);
            box-shadow: 0 0 0 3px var(--medical-blue-soft);
        }

        .btn-medical {
            background-color: var(--brand-primary);
            color: white;
            border-radius: 8px;
            padding: 8px 20px;
            border: none;
            font-weight: 500;
            transition: 0.3s;
            font-size: 0.85rem;
        }

        .btn-medical:hover {
            background-color: var(--medical-blue-dark);
            color: white;
            transform: translateY(-1px);
        }

        /* Total Personnel Counter - positioned below search */
        .total-counter {
            background: var(--medical-blue-soft);
            color: var(--medical-blue-dark);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .total-counter i {
            font-size: 0.75rem;
        }

        /* ============================================= */
        /* PERSONNEL TABLE STYLES - Clean List View */
        /* ============================================= */
        .personnel-table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid #eef2f6;
            background: white;
        }

        .personnel-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .personnel-table th {
            background: #f8fafc;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--medical-blue-dark);
            border-bottom: 2px solid #eef2f6;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .personnel-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f2f5;
            vertical-align: middle;
        }

        .personnel-table tr:hover {
            background: #fafcff;
        }

        /* Combined Avatar + Name Cell */
        .name-with-avatar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .table-avatar {
            width: 42px;
            height: 42px;
            background: var(--medical-blue-soft);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--medical-blue);
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .personnel-name {
            font-weight: 600;
            color: var(--brand-primary);
        }

        .role-badge {
            background: var(--medical-blue-soft);
            color: var(--medical-blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-block;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-edit-icon {
            background: var(--medical-blue-soft);
            color: var(--medical-blue);
        }

        .btn-edit-icon:hover {
            background: var(--medical-blue);
            color: white;
        }

        .btn-delete-icon {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger-red);
        }

        .btn-delete-icon:hover {
            background: var(--danger-red);
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* Modal Styling */
        .modal-custom .modal-content {
            border-radius: 20px;
            border: none;
        }

        .modal-header-custom {
            background: var(--brand-primary);
            color: white;
            border-radius: 20px 20px 0 0;
            padding: 1rem 1.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-content {
                padding: 1rem;
            }
            .action-row {
                flex-direction: column;
                align-items: stretch;
            }
            .left-actions {
                justify-content: flex-start;
                width: 100%;
            }
            .right-section {
                align-items: stretch;
                width: 100%;
            }
            .search-box {
                width: 100%;
            }
            .total-counter {
                align-self: flex-start;
            }
            .personnel-table th, 
            .personnel-table td {
                padding: 10px 12px;
            }
            .action-buttons {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>

    <div class="floating-form-container">
        
        <!-- NAVBAR HEADER - No Icon -->
        <nav class="nav-header-tab">
            <h5>Clinic Personnel Management</h5>
        </nav>

        <div class="form-content">
            <!-- Action Row: Left side = Add Button, Right side = Search + Total Counter below -->
            <div class="action-row">
                <!-- LEFT SIDE: Add Personnel Button only -->
                <div class="left-actions">
                    <button class="btn-medical shadow-sm" id="openAddPersonnelModalBtn">
                        <i class="fa-solid fa-plus me-2"></i> Add New Personnel
                    </button>
                </div>
                
                <!-- RIGHT SIDE: Search Box + Total Personnel Counter below -->
                <div class="right-section">
                    <input type="text" class="search-box" id="searchPersonnelInput" placeholder="Search by name, role, email, or ID...">
                    <div class="total-counter" id="totalPersonnelCounter">
                        <i class="fa-solid fa-users"></i> 
                        Total Personnel: <span id="totalCount">0</span>
                    </div>
                </div>
            </div>

            <!-- Personnel Table List View - Combined Avatar and Name Column -->
            <div class="personnel-table-wrapper">
                <table class="personnel-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Employee ID</th>
                            <th>Email</th>
                            <th>Shift</th>
                            <th style="width: 100px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="personnelTableBody">
                        <!-- Dynamic rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL: Add/Edit Personnel -->
    <div class="modal fade" id="personnelModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-custom">
                <div class="modal-header-custom">
                    <h5 class="modal-title text-white" id="modalTitle">Add New Personnel</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="editPersonnelId">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="personnelName" placeholder="e.g., John Michael Santos">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Role / Position <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="personnelRole" placeholder="e.g., Staff Nurse, Midwife, Medical Officer">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Employee ID <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="personnelEmpId" placeholder="e.g., NURSE-2025-045">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="personnelEmail" placeholder="email@pup.edu.ph">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Phone Number</label>
                        <input type="text" class="form-control" id="personnelPhone" placeholder="+63 912 345 6789">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Department</label>
                        <input type="text" class="form-control" id="personnelDept" value="University Health Services Office">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Shift Schedule</label>
                        <input type="text" class="form-control" id="personnelShift" placeholder="e.g., Morning (7AM-4PM)">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">License No. (Optional)</label>
                        <input type="text" class="form-control" id="personnelLicense" placeholder="PRC-XXXXXXXXX">
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0 pb-4 px-4">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="savePersonnelBtn" style="background: var(--medical-blue);">Save Personnel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to remove <strong id="deletePersonnelName"></strong> from clinic personnel?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete Permanently</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // =============================================
        // CLINIC PERSONNEL MANAGEMENT SYSTEM - LIST VIEW
        // Layout: Add button on LEFT side, Search + Total Counter on RIGHT side
        // Combined Avatar and Name column
        // =============================================
        
        // ---------- Initial Personnel Data (Sample co-workers) ----------
        let personnelList = [
            {
                id: "p1",
                name: "Maria Santos",
                role: "Senior Nurse",
                empId: "NURSE-2024-012",
                email: "maria.santos@pup.edu.ph",
                phone: "+63 917 123 4567",
                department: "University Health Services Office",
                shift: "Morning (7AM-4PM)",
                license: "PRC-123456789",
                avatarIcon: "fa-solid fa-user-nurse"
            },
            {
                id: "p2",
                name: "Dr. Ricardo Cruz",
                role: "Clinic Physician",
                empId: "MD-2023-088",
                email: "ricardo.cruz@pup.edu.ph",
                phone: "+63 918 765 4321",
                department: "University Health Services Office",
                shift: "Afternoon (1PM-10PM)",
                license: "PRC-MD-98765",
                avatarIcon: "fa-solid fa-user-md"
            },
            {
                id: "p3",
                name: "Elena Rivera",
                role: "Midwife",
                empId: "MID-2025-034",
                email: "elena.rivera@pup.edu.ph",
                phone: "+63 920 555 1234",
                department: "Maternal & Child Health",
                shift: "Morning (7AM-4PM)",
                license: "PRC-MW-45678",
                avatarIcon: "fa-solid fa-hand-holding-heart"
            },
            {
                id: "p4",
                name: "John Dela Cruz",
                role: "Dental Assistant",
                empId: "DEN-2024-021",
                email: "john.delacruz@pup.edu.ph",
                phone: "+63 915 678 9012",
                department: "Dental Clinic",
                shift: "Rotating (8AM-5PM)",
                license: "PRC-DA-11223",
                avatarIcon: "fa-solid fa-tooth"
            },
            {
                id: "p5",
                name: "Michelle Reyes",
                role: "Staff Nurse",
                empId: "NURSE-2025-089",
                email: "michelle.reyes@pup.edu.ph",
                phone: "+63 922 345 6780",
                department: "University Health Services Office",
                shift: "Night (10PM-7AM)",
                license: "PRC-55667788",
                avatarIcon: "fa-solid fa-user-nurse"
            }
        ];

        // DOM Elements
        let modalInstance = null;
        let deleteModalInstance = null;
        let currentDeleteId = null;

        // Helper: Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Get icon based on role
        function getRoleIcon(role) {
            const roleLower = role.toLowerCase();
            if (roleLower.includes('physician') || roleLower.includes('doctor')) return 'fa-solid fa-user-md';
            if (roleLower.includes('midwife')) return 'fa-solid fa-hand-holding-heart';
            if (roleLower.includes('dental')) return 'fa-solid fa-tooth';
            if (roleLower.includes('nurse')) return 'fa-solid fa-user-nurse';
            return 'fa-solid fa-user';
        }

        // Update Total Personnel Counter (shows total count regardless of search)
        function updateTotalCounter() {
            const totalCountSpan = document.getElementById('totalCount');
            if (totalCountSpan) {
                totalCountSpan.innerText = personnelList.length;
            }
        }

        // Render Personnel Table
        function renderPersonnelTable() {
            const tbody = document.getElementById('personnelTableBody');
            const searchTerm = document.getElementById('searchPersonnelInput')?.value.toLowerCase() || '';
            
            let filteredList = personnelList.filter(p => 
                p.name.toLowerCase().includes(searchTerm) || 
                p.role.toLowerCase().includes(searchTerm) || 
                p.email.toLowerCase().includes(searchTerm) ||
                p.empId.toLowerCase().includes(searchTerm)
            );
            
            if (filteredList.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center py-5">
                            <div class="empty-state">
                                <i class="fa-solid fa-users-slash fa-3x mb-3 opacity-50"></i>
                                <p class="mb-0">No clinic personnel found.</p>
                                <small class="text-muted">Click "Add New Personnel" to add your co-workers.</small>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = filteredList.map(person => {
                const avatarIcon = person.avatarIcon || getRoleIcon(person.role);
                return `
                    <tr data-id="${person.id}">
                        <td>
                            <div class="name-with-avatar">
                                <div class="table-avatar">
                                    <i class="${avatarIcon}"></i>
                                </div>
                                <span class="personnel-name">${escapeHtml(person.name)}</span>
                            </div>
                        </td>
                        <td><span class="role-badge">${escapeHtml(person.role)}</span></td>
                        <td><code class="text-muted">${escapeHtml(person.empId)}</code></td>
                        <td><small>${escapeHtml(person.email)}</small></td>
                        <td><small><i class="fa-regular fa-clock me-1"></i>${escapeHtml(person.shift || 'Not set')}</small></td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-icon btn-edit-icon" onclick="editPersonnel('${person.id}')" title="Edit">
                                    <i class="fa-regular fa-pen-to-square"></i>
                                </button>
                                <button class="btn-icon btn-delete-icon" onclick="confirmDeletePersonnel('${person.id}', '${escapeHtml(person.name)}')" title="Delete">
                                    <i class="fa-regular fa-trash-can"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Add New Personnel';
            document.getElementById('editPersonnelId').value = '';
            document.getElementById('personnelName').value = '';
            document.getElementById('personnelRole').value = '';
            document.getElementById('personnelEmpId').value = '';
            document.getElementById('personnelEmail').value = '';
            document.getElementById('personnelPhone').value = '';
            document.getElementById('personnelDept').value = 'University Health Services Office';
            document.getElementById('personnelShift').value = '';
            document.getElementById('personnelLicense').value = '';
            modalInstance.show();
        }
        
        window.editPersonnel = function(id) {
            const person = personnelList.find(p => p.id === id);
            if (!person) return;
            document.getElementById('modalTitle').innerText = 'Edit Personnel';
            document.getElementById('editPersonnelId').value = person.id;
            document.getElementById('personnelName').value = person.name;
            document.getElementById('personnelRole').value = person.role;
            document.getElementById('personnelEmpId').value = person.empId;
            document.getElementById('personnelEmail').value = person.email;
            document.getElementById('personnelPhone').value = person.phone || '';
            document.getElementById('personnelDept').value = person.department || 'University Health Services Office';
            document.getElementById('personnelShift').value = person.shift || '';
            document.getElementById('personnelLicense').value = person.license || '';
            modalInstance.show();
        };
        
        function savePersonnel() {
            const id = document.getElementById('editPersonnelId').value;
            const name = document.getElementById('personnelName').value.trim();
            const role = document.getElementById('personnelRole').value.trim();
            const empId = document.getElementById('personnelEmpId').value.trim();
            const email = document.getElementById('personnelEmail').value.trim();
            const phone = document.getElementById('personnelPhone').value.trim();
            const department = document.getElementById('personnelDept').value.trim();
            const shift = document.getElementById('personnelShift').value.trim();
            const license = document.getElementById('personnelLicense').value.trim();
            
            if (!name || !role || !empId || !email) {
                alert("Please fill in required fields: Name, Role, Employee ID, and Email");
                return;
            }
            
            if (id) {
                const index = personnelList.findIndex(p => p.id === id);
                if (index !== -1) {
                    personnelList[index] = {
                        ...personnelList[index],
                        name, role, empId, email, phone, department, shift, license,
                        avatarIcon: getRoleIcon(role)
                    };
                }
            } else {
                const newId = "p" + Date.now() + Math.random().toString(36).substr(2, 6);
                personnelList.push({
                    id: newId,
                    name, role, empId, email, phone, department, shift, license,
                    avatarIcon: getRoleIcon(role)
                });
            }
            updateTotalCounter();
            renderPersonnelTable();
            modalInstance.hide();
        }
        
        window.confirmDeletePersonnel = function(id, name) {
            currentDeleteId = id;
            document.getElementById('deletePersonnelName').innerText = name;
            deleteModalInstance.show();
        };
        
        function executeDelete() {
            if (currentDeleteId) {
                personnelList = personnelList.filter(p => p.id !== currentDeleteId);
                updateTotalCounter();
                renderPersonnelTable();
                deleteModalInstance.hide();
                currentDeleteId = null;
            }
        }
        
        function initSearchListener() {
            const searchInput = document.getElementById('searchPersonnelInput');
            if (searchInput) {
                searchInput.addEventListener('input', renderPersonnelTable);
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            modalInstance = new bootstrap.Modal(document.getElementById('personnelModal'));
            deleteModalInstance = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
            
            document.getElementById('savePersonnelBtn').addEventListener('click', savePersonnel);
            document.getElementById('confirmDeleteBtn').addEventListener('click', executeDelete);
            document.getElementById('openAddPersonnelModalBtn').addEventListener('click', openAddModal);
            
            initSearchListener();
            updateTotalCounter();
            renderPersonnelTable();
        });
        
        if (window.self === window.top) {
            const currentPage = window.location.pathname.split("/").pop();
            window.location.href = "nursedashboard.html?page=" + currentPage;
        }
    </script>
</body>
</html>
