<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareLink Express | Kiosk Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867;
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 6px 6px 12px #d1d9e6, inset -6px -6px 12px #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(156, 12, 32, 0.8), rgba(13, 20, 26, 0.9)), 
                        url('https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=1920');
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 2.5rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            width: 1300px;
            height: 800px; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .logo-header-box {
            background: var(--clay-bg);
            border-radius: 20px;
            padding: 15px 40px;
            box-shadow: var(--clay-inset);
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 15px;
        }

        .logo-header-box img { height: 50px; }
        .logo-header-box span { font-weight: 800; font-size: 1.8rem; color: var(--pup-maroon); }

        .stat-card-grid {
            display: flex;
            justify-content: center;
            align-items: center; 
            flex-grow: 1;
        }

        .services-wrapper {
            display: flex;
            justify-content: center;
            gap: 60px;
        }

        /* FIXED: In-update ang sukat para mag-match sa confirmation card later */
        .stat-btn {
            background: var(--clay-bg);
            border-radius: 35px;
            padding: 30px;
            text-decoration: none !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--clay-shadow);
            transition: 0.3s ease;
            text-align: center;
            width: 400px;  /* MATCHED SIZE */
            height: 250px; /* MATCHED SIZE */
            border: 1px solid rgba(255,255,255,0.5);
            cursor: pointer;
            color: inherit;
        }

        .stat-btn:hover { box-shadow: var(--clay-inset); transform: translateY(-5px); }
        .stat-btn i { font-size: 5rem; color: var(--pup-maroon); margin-bottom: 20px; }
        .stat-btn .stat-label { font-weight: 600; color: var(--medical-blue); font-size: 1.5rem; text-transform: uppercase; line-height: 1.2; }

        .back-home-footer { text-align: center; padding-top: 1rem; }
        .home-link { color: var(--medical-blue); text-decoration: none; font-weight: 600; font-size: 1.1rem; }

        #confirmation-box {
            display: none; 
            text-align: center;
            flex-grow: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.4s ease-out;
        }

        .btn-confirm { padding: 18px 40px; border-radius: 15px; border: none; font-weight: 600; width: 280px; font-size: 1.1rem; transition: 0.2s; }
        .btn-yes { background: var(--pup-maroon); color: white; }
        .btn-no { background: white; color: var(--medical-blue); box-shadow: var(--clay-shadow); }

        .hidden { display: none !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="portal-card" id="mainCard">
    <div class="header-section">
        <div class="logo-header-box">
            <img src="https://www.pup.edu.ph/about/images/PUPLogo.png" alt="Logo">
            <span>CareLink</span>
        </div>

        <div class="text-center mb-3"> 
            <h1 class="fw-bold mb-0" style="color: var(--medical-blue); font-size: 3rem;">CareLink Express</h1>
            <p class="text-muted" id="instructionText" style="font-size: 1.2rem;">Touch a service to begin your request</p>
        </div>
    </div>

    <div class="stat-card-grid" id="buttonGrid">
        <div class="services-wrapper">
            <div onclick="showConfirmation('Make walk-in appointments', 'kioskappointment-walkin.html', this)" class="stat-btn">
                <i class="fa-solid fa-person-walking"></i>
                <div class="stat-label">Walk-in<br>Appointments</div>
            </div>

            <div onclick="showConfirmation('View appointment history', 'kioskappointmenthistory.html', this)" class="stat-btn">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <div class="stat-label">Appointment<br>History</div>
            </div>
        </div>
    </div>

    <div class="back-home-footer" id="footerNav">
        <a href="kiosklogin.html" class="home-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Login
        </a>
    </div>

    <div id="confirmation-box">
        <div id="selected-button-container" class="d-flex justify-content-center mb-4"></div>
        <h2 class="fw-bold" style="color: var(--medical-blue); font-size: 2.2rem;">Confirm your destination</h2>
        <p class="confirm-text h4 mb-5 text-muted">You are about to <b id="targetName" class="text-danger">...</b>.<br>Do you want to proceed?</p>
        
        <div class="d-flex gap-4 justify-content-center">
            <button class="btn-confirm btn-yes" id="finalProceed">Yes, Proceed</button>
            <button class="btn-confirm btn-no" onclick="cancelRedirect()">No, Go Back</button>
        </div>
    </div>
</div>

<script>
    let currentTargetUrl = "";

    function showConfirmation(name, url, element) {
        currentTargetUrl = url;
        document.getElementById('buttonGrid').classList.add('hidden');
        document.getElementById('footerNav').classList.add('hidden');
        document.getElementById('instructionText').innerText = "Please confirm your action";
        document.getElementById('targetName').innerText = name;
        
        const confirmBox = document.getElementById('confirmation-box');
        const container = document.getElementById('selected-button-container');
        
        container.innerHTML = "";
        const clone = element.cloneNode(true);
        
        // EKSAKTONG MATCH NA SILA NGAYON
        clone.style.width = "400px"; 
        clone.style.height = "250px";
        clone.style.pointerEvents = "none";
        clone.style.boxShadow = "var(--clay-inset)";
        clone.style.border = "4px solid var(--pup-maroon)";
        container.appendChild(clone);

        confirmBox.style.display = "flex";
        
        document.getElementById('finalProceed').onclick = function() {
            window.location.href = currentTargetUrl;
        };
    }

    function cancelRedirect() {
        document.getElementById('buttonGrid').classList.remove('hidden');
        document.getElementById('footerNav').classList.remove('hidden');
        document.getElementById('confirmation-box').style.display = "none";
        document.getElementById('instructionText').innerText = "Touch a service to begin your request";
    }
</script>

</body>
</html>
