<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | CareLink Express</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867;
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--clay-bg);
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0;
        }

        .login-container {
            width: 100%; max-width: 1100px;
            height: 650px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            display: grid; grid-template-columns: 1.2fr 1fr;
            overflow: hidden;
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
            position: relative;
        }

        /* BRAND SIDE */
        .brand-side {
            background: linear-gradient(rgba(156, 12, 32, 0.85), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=1200');
            background-size: cover;
            padding: 4rem;
            display: flex; flex-direction: column; justify-content: center;
            color: white;
        }

        /* FORM SIDE */
        .form-side {
            padding: 3rem 4rem;
            background: #fdfdfd;
            display: flex; flex-direction: column; justify-content: center;
            position: relative;
        }

        /* Go Back Button Styling */
        .btn-back {
            position: absolute;
            top: 30px;
            left: 40px;
            color: var(--medical-blue);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            padding: 8px 15px;
            border-radius: 12px;
        }
        .btn-back:hover {
            color: var(--pup-maroon);
            background: var(--clay-bg);
            box-shadow: var(--clay-shadow);
            transform: translateX(-5px);
        }

        .login-header h2 { font-weight: 700; color: var(--pup-maroon); margin-bottom: 0.5rem; }
        .login-header p { color: var(--medical-blue); font-size: 0.9rem; margin-bottom: 2.5rem; }

        /* Claymorphism Inputs */
        .input-box {
            background: var(--clay-bg);
            border-radius: 20px;
            padding: 5px 20px;
            box-shadow: var(--clay-inset);
            display: flex; align-items: center;
            margin-bottom: 20px;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--pup-maroon); }
        .input-box i { color: var(--medical-blue); margin-right: 15px; opacity: 0.6; }
        .input-box input {
            background: transparent; border: none; outline: none;
            width: 100%; padding: 12px 0; font-size: 0.9rem;
            color: var(--medical-blue);
        }

        /* Buttons */
        .btn-login {
            background: var(--pup-maroon);
            color: white; border: none; border-radius: 20px;
            padding: 15px; width: 100%; font-weight: 600;
            box-shadow: 0 10px 20px rgba(156, 12, 32, 0.2);
            transition: 0.3s; margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(156, 12, 32, 0.3); }

        .form-footer { margin-top: 2rem; text-align: center; font-size: 0.85rem; color: #888; }
        .form-footer a { color: var(--pup-maroon); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand-side">
        <h1 class="display-4 fw-bold">CareLink<br>Express</h1>
        <p class="lead opacity-75">Your health gateway for the PUP Biñan community.</p>
        <div class="mt-4">
            <div class="d-flex align-items-center mb-3">
                <i class="fa-solid fa-circle-check me-3"></i>
                <span>Fast Appointment Queuing</span>
            </div>
            <div class="d-flex align-items-center mb-3">
                <i class="fa-solid fa-circle-check me-3"></i>
                <span>Digital Health Records</span>
            </div>
        </div>
    </div>

    <div class="form-side">
        <a href="portalmain.html" class="btn-back">
            <i class="fa-solid fa-arrow-left-long"></i> Back to Portal
        </a>

        <div class="login-header">
            <h2>Welcome Back!</h2>
            <p>Please log in with your Student Credentials.</p>
        </div>

        <form action="studdashboard.html" method="POST">
            <label class="small fw-bold mb-1 ms-2" style="color: var(--medical-blue);">STUDENT ID NUMBER</label>
            <div class="input-box">
                <i class="fa-solid fa-id-card"></i>
                <input type="text" placeholder="e.g. 2023-00000-BN-0" required>
            </div>

            <label class="small fw-bold mb-1 ms-2" style="color: var(--medical-blue);">PASSWORD</label>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label small text-muted" for="remember">Remember me</label>
                </div>
                <a href="#" class="small text-decoration-none" style="color: var(--pup-maroon);">Forgot?</a>
            </div>

            <button type="submit" class="btn-login">
                Sign In <i class="fa-solid fa-right-to-bracket ms-2"></i>
            </button>
        </form>

        <div class="form-footer">
            New to Biñan Campus? <br>
            <a href="studregister.html">Create a Health Profile</a>
        </div>
    </div>
</div>

</body>
</html>
