<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Register New Drug | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-primary: #28313a;
            --medical-blue: #475867;
            --medical-blue-dark: #323e49;
            --medical-blue-soft: rgba(71, 88, 103, 0.05);
            --text-main: #28313a;
            --text-muted: #5c7285;
            --border-light: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff; /* White background matching available drugs */
            margin: 0;
            padding: 1.5rem;
            color: var(--text-main);
        }

        /* Header Section - EXACTLY matching available drugs styling */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .header-title h4 {
            font-weight: 700;
            margin: 0;
            color: var(--brand-primary);
            font-size: 1.5rem;
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 0;
            margin-top: 0.25rem;
        }

        /* Empty spacer to match available drugs search bar positioning */
        .header-spacer {
            width: 25%;
        }

        /* Form Container - Clean with no extra background, matching table area */
        .form-container {
            background: transparent;
            width: 100%;
        }

        /* Form Grid - Using same padding/margin as table cells */
        .form-grid {
            display: flex;
            flex-wrap: wrap;
            margin: 0 -0.75rem;
        }

        .form-col {
            padding: 0 0.75rem;
            margin-bottom: 1.25rem;
        }

        .form-col-6 {
            flex: 0 0 50%;
            max-width: 50%;
        }

        .form-col-4 {
            flex: 0 0 33.333333%;
            max-width: 33.333333%;
        }

        .form-col-12 {
            flex: 0 0 100%;
            max-width: 100%;
        }

        /* Label Styling - Matching table header styling */
        .form-label {
            color: var(--brand-primary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            display: block;
        }

        /* Input Styling - Clean and consistent */
        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid var(--border-light);
            font-size: 0.9rem;
            transition: all 0.2s ease;
            background-color: #ffffff;
            width: 100%;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--medical-blue);
            box-shadow: 0 0 0 3px rgba(71, 88, 103, 0.1);
            outline: none;
        }

        .form-control::placeholder {
            color: #adb5bd;
            font-size: 0.85rem;
        }

        /* Button Styling - Matching action button area but primary */
        .btn-primary-custom {
            background-color: var(--medical-blue);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
            width: auto;
            cursor: pointer;
        }

        .btn-primary-custom:hover {
            background-color: var(--medical-blue-dark);
            transform: translateY(-1px);
        }

        .btn-primary-custom:active {
            transform: translateY(0);
        }

        /* Button wrapper - full width like available drugs table */
        .button-wrapper {
            margin-top: 0.5rem;
            display: flex;
            justify-content: flex-start;
        }

        /* Responsive adjustments - EXACTLY matching available drugs */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .header-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                margin-bottom: 1.25rem;
            }
            .header-spacer {
                display: none;
            }
            .form-col-6, .form-col-4 {
                flex: 0 0 100%;
                max-width: 100%;
            }
            .button-wrapper {
                width: 100%;
            }
            .btn-primary-custom {
                width: 100%;
            }
        }

        /* Small screen adjustments */
        @media (max-width: 480px) {
            .form-label {
                font-size: 0.75rem;
            }
            .form-control, .form-select {
                padding: 8px 10px;
                font-size: 0.85rem;
            }
        }

        /* Additional styling for consistency */
        hr {
            margin: 1rem 0;
            border-color: var(--border-light);
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <!-- Header Section - EXACTLY matching available drugs layout -->
    <div class="header-section">
        <div class="header-title">
            <h4>New Medication Registration</h4>
            <p>Input details to add new stock to the campus clinic database.</p>
        </div>
        <div class="header-spacer">
            <!-- Empty spacer to match available drugs search bar positioning -->
        </div>
    </div>

    <!-- Form Container - Clean with same spacing as table area -->
    <div class="form-container">
        <form id="drugRegistrationForm">
            <div class="form-grid">
                <div class="form-col form-col-6">
                    <label class="form-label fw-semibold">Drug Name</label>
                    <input type="text" class="form-control" placeholder="e.g. Ibuprofen" required>
                </div>

                <div class="form-col form-col-6">
                    <label class="form-label fw-semibold">Category</label>
                    <select class="form-select" required>
                        <option value="" selected disabled>Choose category...</option>
                        <option>Analgesic</option>
                        <option>Antibiotic</option>
                        <option>Antihistamine</option>
                        <option>Antipyretic</option>
                        <option>First Aid Supply</option>
                    </select>
                </div>

                <div class="form-col form-col-4">
                    <label class="form-label fw-semibold">Dosage (mg/ml)</label>
                    <input type="text" class="form-control" placeholder="e.g. 500mg" required>
                </div>

                <div class="form-col form-col-4">
                    <label class="form-label fw-semibold">Initial Quantity</label>
                    <input type="number" class="form-control" placeholder="0" min="1" required>
                </div>

                <div class="form-col form-col-4">
                    <label class="form-label fw-semibold">Expiry Date</label>
                    <input type="date" class="form-control" required>
                </div>

                <div class="form-col form-col-12">
                    <div class="button-wrapper">
                        <button type="submit" class="btn-primary-custom">
                            <i class="fa-solid fa-save"></i> Register Drug to System
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // =============================================
        // PRESERVED ORIGINAL SCRIPT LOGIC
        // =============================================
        
        // SECURITY REDIRECT: If opened alone outside dashboard (PRESERVED from original)
        if (window.self === window.top) {
            const currentPage = window.location.pathname.split("/").pop();
            // Force the dashboard to load Inventory and this specific sub-page
            window.location.href = "nursedashboard.html?page=nurseinventory.html&subpage=" + currentPage;
        }
        
        // =============================================
        // FORM HANDLING (PRESERVING ORIGINAL FUNCTIONALITY)
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('drugRegistrationForm');
            
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    // Collect form data (preserved functionality)
                    const drugNameInput = form.querySelector('input[placeholder="e.g. Ibuprofen"]');
                    const categorySelect = form.querySelector('select');
                    const dosageInput = form.querySelector('input[placeholder="e.g. 500mg"]');
                    const quantityInput = form.querySelector('input[placeholder="0"]');
                    const expiryInput = form.querySelector('input[type="date"]');
                    
                    const drugName = drugNameInput?.value || '';
                    const category = categorySelect?.value || '';
                    const dosage = dosageInput?.value || '';
                    const quantity = quantityInput?.value || '';
                    const expiryDate = expiryInput?.value || '';
                    
                    // Basic validation (preserved)
                    if (!drugName || !category || !dosage || !quantity || !expiryDate) {
                        alert('Please fill in all fields before registering.');
                        return;
                    }
                    
                    if (parseInt(quantity) <= 0) {
                        alert('Quantity must be at least 1.');
                        return;
                    }
                    
                    // Simulate successful registration (original behavior)
                    alert(`Drug "${drugName}" has been successfully registered!\n\nCategory: ${category}\nDosage: ${dosage}\nQuantity: ${quantity}\nExpiry: ${expiryDate}`);
                    
                    // Reset form after submission (preserved)
                    form.reset();
                    
                    // You can add additional logic here to actually save to database
                    // This preserves the original form submission intent
                });
            }
        });
    </script>
</body>
</html>
