<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register New Drug | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-primary: #28313a;
            --medical-blue: #475867;
            --medical-blue-dark: #323e49;
            --medical-blue-soft: rgba(71, 88, 103, 0.08);
            --text-main: #28313a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 1.5rem;
            color: var(--text-main);
        }

        /* Form Card Styling */
        .inventory-card {
            background: var(--medical-blue-soft);
            border-radius: 15px;
            padding: 2rem;
            border: 1px solid rgba(71, 88, 103, 0.1);
            max-width: 900px;
            margin: 0 auto;
        }

        .form-label {
            color: var(--brand-primary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 10px 15px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--medical-blue);
            box-shadow: 0 0 0 0.25rem rgba(71, 88, 103, 0.1);
        }

        /* Button Styling */
        .btn-primary-custom {
            background-color: var(--medical-blue);
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary-custom:hover {
            background-color: var(--medical-blue-dark);
            transform: translateY(-1px);
        }

        .header-title {
            max-width: 900px;
            margin: 0 auto 1.5rem auto;
        }
    </style>
</head>
<body>

    <div class="header-title">
        <h4 class="fw-bold m-0" style="color: var(--brand-primary);">New Medication Registration</h4>
        <p class="text-muted small">Input details to add new stock to the campus clinic database.</p>
    </div>

    <div class="inventory-card">
        <form id="drugRegistrationForm">
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Drug Name</label>
                    <input type="text" class="form-control" placeholder="e.g. Ibuprofen" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Category</label>
                    <select class="form-select" required>
                        <option value="" selected disabled>Choose category...</option>
                        <option>Analgesic</option>
                        <option>Antibiotic</option>
                        <option>Antihistamine</option>
                        <option>Antipyretic</option>
                        <option>First Aid Supply</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Dosage (mg/ml)</label>
                    <input type="text" class="form-control" placeholder="e.g. 500mg" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Initial Quantity</label>
                    <input type="number" class="form-control" placeholder="0" min="1" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Expiry Date</label>
                    <input type="date" class="form-control" required>
                </div>

                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary-custom w-100">
                        <i class="fa-solid fa-save"></i> Register Drug to System
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if (window.self === window.top) {
        const currentPage = window.location.pathname.split("/").pop();
        // Force the dashboard to load Inventory and this specific sub-page
        window.location.href = "nursedashboard.html?page=nurseinventory.html&subpage=" + currentPage;
    }
</script>
</body>
</html>
