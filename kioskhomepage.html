<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CareLink Express | Health Kiosk — Sky Blue Get Started</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- SweetAlert2 - LOCKED to prevent any scrollbar / layout flickering -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --pup-maroon-dark: #7a0919;
            --portal-sky: #38bdf8;
            --portal-sky-dark: #0ea5e9;
            --get-started-sky: #0ea5e9;
            --get-started-sky-light: #7dd3fc;
            --faq-teal: #14b8a6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CRITICAL: LOCK VIEWPORT TO PREVENT ANY SCROLLBAR / LAYOUT SHIFT */
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000; 
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* BLURRING BACKGROUND - clean, no black artifacts */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: inherit;
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.45);
            transform: scale(1.02);
            z-index: -2;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            z-index: -1;
        }

        /* MAIN LAYOUT CARD - fixed dimensions, no reflow */
        .portal-card {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 20px;
            width: 1300px;
            height: 850px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.2) inset;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.92);
            flex-shrink: 0;
        }
        
        /* Card overlay: gradient dark for readability */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.65) 100%);
            z-index: 1;
            border-radius: inherit;
            pointer-events: none;
        }

        /* GLASS MORPHISM NAVBAR - fully transparent (preserved) */
        .navbar-custom {
            position: absolute;
            top: 20px;
            left: 100px;
            right: 100px;
            padding: 15px 40px 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-radius: 0;
            border: none;
            box-shadow: none;
            z-index: 100;
        }

        /* TOP HORIZONTAL SEPARATOR below the logo area - sleek line that matches PUP branding (unchanged) */
        .logo-separator-wrapper {
            position: absolute;
            top: 95px;
            left: 100px;
            right: 100px;
            z-index: 99;
            pointer-events: none;
        }
        
        /* BOTTOM HORIZONTAL SEPARATOR - footer-like look, matching top separator style */
        .bottom-separator-wrapper {
            position: absolute;
            bottom: 90px;
            left: 100px;
            right: 100px;
            z-index: 99;
            pointer-events: none;
        }
        
        .brand-separator {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.7) 15%, 
                rgba(255,215,0,0.9) 50%, 
                rgba(255,255,255,0.7) 85%, 
                rgba(255,255,255,0) 100%);
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            justify-content: flex-start; 
            position: relative;
        }
        
        .logo-area img { 
            height: 45px; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); 
        }
        
        .logo-area span { 
            font-weight: 800; 
            font-size: 1.5rem; 
            color: white; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        .login-area { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            gap: 15px; 
        }

        /* ===== LIVE CLOCK - Permanent Fixed Width Container ===== */
        .time-container-permanent {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Poppins', monospace;
            letter-spacing: 1px;
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.45);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(6px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            min-width: 180px;
            width: auto;
            white-space: nowrap;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
            cursor: default;
        }
        
        @keyframes gentleColonBlink {
            0% { opacity: 1; }
            50% { opacity: 0.65; }
            100% { opacity: 1; }
        }
        
        .time-container-permanent span {
            display: inline-block;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* HERO TEXT: Shifted rightward & Centered alignment */
        .hero-text {
            position: absolute;
            left: 370px;
            right: auto;
            top: 170px;
            width: auto;
            max-width: 700px;
            z-index: 10;
            text-align: center;
            transform: none;
        }

        .hero-text h1 { 
            font-size: 4.75rem; 
            font-weight: 800; 
            color: #ffffff; 
            line-height: 1.05; 
            margin-bottom: 20px;
            text-shadow: 0 2px 15px rgba(0,0,0,0.5);
            letter-spacing: -0.01em;
            text-align: center;
        }
        
        .hero-text p { 
            font-size: 1.2rem; 
            color: rgba(255,255,255,0.96); 
            margin-bottom: 0;
            text-shadow: 0 1px 5px rgba(0,0,0,0.4);
            font-weight: 400;
            text-align: center;
        }

        /* STAT CARD BUTTONS - ONE STAT CARD (Get Started) */
        .stat-card-buttons {
            position: absolute;
            bottom: 160px;
            left: 100px;
            right: 100px;
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            justify-content: center;
            align-items: center;
            z-index: 15;
        }

        /* ONE stat card button - Get Started - SKY BLUE */
        .kiosk-btn {
            flex: 1;
            min-width: 260px;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 52px 20px 52px 20px;
            border-radius: 18px;
            font-size: 1.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.4), 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            backdrop-filter: blur(2px);
            color: white;
            text-shadow: 0 2px 3px rgba(0,0,0,0.3);
        }

        /* Larger 3D Heartbeat Icon */
        .kiosk-btn i {
            font-size: 4.2rem;
            margin: 0;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.4)) drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            transition: all 0.2s ease;
            display: inline-block;
        }

        .kiosk-btn span {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-align: center;
            display: block;
        }

        /* Get Started button - SKY BLUE base */
        .btn-getstarted {
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            border-bottom: 6px solid #075985;
            color: white;
        }

        /* SIMPLE HOVER: slightly darker background, no bright colors */
        .btn-getstarted:hover {
            background: linear-gradient(135deg, #2c9fd6, #026d9e);
            border-bottom-color: #054a66;
            box-shadow: 0 16px 24px -10px rgba(0, 0, 0, 0.35);
        }
        
        .btn-getstarted:hover i {
            transform: scale(1.02);
            filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.4));
        }

        .btn-getstarted:active {
            transform: scale(0.98);
            border-bottom-width: 2px;
            box-shadow: 0 8px 12px -6px rgba(0, 0, 0, 0.4);
        }

        /* ====== FAQ BUTTON - MOVED TO RIGHT SIDE CORNER, ALIGNED WITH LIVE TIME EDGE ====== */
        /* The button is now positioned absolutely at bottom-right, aligned flush to the right 
           and vertically positioned near the bottom separator, matching the "ruler" alignment with the live time container's right edge.
           The live time container sits within .login-area which is on the far right of navbar.
           We align the FAQ button to the same horizontal position (right: 100px) and bottom spacing to mirror precision.
        */
        .faq-link-wrapper {
            position: absolute;
            bottom: 38px;       
            right: 130px;        
            left: auto;          
            text-align: right;  
            z-index: 15;
            pointer-events: auto;
        }

        .faq-simple-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            padding: 8px 24px;
            border-radius: 60px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: #e2e8f0;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.25);
            letter-spacing: 0.3px;
        }

        .faq-simple-link i {
            font-size: 1rem;
            color: #2dd4bf;
        }

        .faq-simple-link:hover {
            background: rgba(0, 0, 0, 0.55);
            color: white;
            border-color: white;
            text-decoration: none;
        }

        /* Responsive adjustments — preserve all elements, ensure FAQ stays right-aligned */
        @media (max-width: 1100px) {
            .portal-card { width: 95%; height: 90vh; }
            .navbar-custom { left: 50px; right: 50px; top: 20px; }
            .logo-separator-wrapper { left: 50px; right: 50px; top: 95px; }
            .bottom-separator-wrapper { left: 50px; right: 50px; bottom: 90px; }
            .hero-text { left: 150px; top: 210px; max-width: 550px; }
            .hero-text h1 { font-size: 3.4rem; }
            .stat-card-buttons { left: 50px; right: 50px; bottom: 170px; gap: 25px; }
            .kiosk-btn { min-width: 280px; padding: 42px 18px; gap: 18px; }
            .kiosk-btn i { font-size: 3.8rem; }
            .kiosk-btn span { font-size: 1.4rem; }
            /* Update FAQ wrapper to keep alignment with navbar right edge */
            .faq-link-wrapper { right: 50px; bottom: 38px; }
            .time-container-permanent { min-width: 170px; font-size: 0.9rem; padding: 0 16px; }
        }
        
        @media (max-width: 850px) {
            .navbar-custom { left: 40px; right: 40px; flex-wrap: wrap; gap: 12px; top: 20px; }
            .logo-separator-wrapper { left: 40px; right: 40px; top: 95px; }
            .bottom-separator-wrapper { left: 40px; right: 40px; bottom: 85px; }
            .hero-text { left: 100px; top: 180px; max-width: 480px; }
            .hero-text h1 { font-size: 2.8rem; }
            .stat-card-buttons { left: 40px; right: 40px; bottom: 160px; gap: 25px; }
            .kiosk-btn { padding: 36px 15px; min-width: 260px; }
            .kiosk-btn i { font-size: 3.5rem; }
            .faq-link-wrapper { right: 40px; bottom: 32px; }
            .time-container-permanent { min-width: 160px; font-size: 0.85rem; }
        }
        
        @media (max-width: 580px) {
            .navbar-custom { left: 25px; right: 25px; flex-direction: column; align-items: stretch; top: 15px; }
            .logo-separator-wrapper { left: 25px; right: 25px; top: 105px; }
            .bottom-separator-wrapper { left: 25px; right: 25px; bottom: 100px; }
            .login-area { justify-content: center; margin-left: 0; }
            .hero-text { left: 20px; right: 20px; top: 160px; text-align: center; max-width: none; }
            .hero-text h1 { font-size: 2.3rem; }
            .stat-card-buttons { left: 25px; right: 25px; bottom: 190px; flex-direction: column; gap: 18px; }
            .kiosk-btn { width: 100%; max-width: 280px; padding: 32px 12px; }
            .kiosk-btn i { font-size: 3.2rem; }
            .faq-link-wrapper { right: 25px; bottom: 28px; }
            .faq-simple-link { font-size: 0.8rem; padding: 6px 18px; }
            .time-container-permanent { min-width: 150px; font-size: 0.75rem; height: 42px; }
        }
        
        @media (max-width: 480px) {
            .navbar-custom { left: 20px; right: 20px; }
            .logo-separator-wrapper { left: 20px; right: 20px; top: 105px; }
            .bottom-separator-wrapper { left: 20px; right: 20px; bottom: 95px; }
            .hero-text { left: 15px; right: 15px; top: 150px; }
            .hero-text h1 { font-size: 2rem; }
            .stat-card-buttons { left: 20px; right: 20px; bottom: 180px; }
            .kiosk-btn i { font-size: 3rem; }
            .faq-link-wrapper { right: 20px; bottom: 24px; }
            .time-container-permanent { min-width: 140px; font-size: 0.7rem; padding: 0 12px; }
        }
        
        /* Gentle pulse animation for container (non-intrusive) */
        @keyframes gentlePulse {
            0% { box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.4); }
            100% { box-shadow: 0 22px 38px -10px rgba(0, 0, 0, 0.55); }
        }
        .kiosk-btn {
            animation: gentlePulse 1.8s infinite alternate ease-in-out;
        }
        .kiosk-btn:hover {
            animation: none;
        }
        
        /* Heartbeat animation for icon: subtle beat */
        @keyframes subtleBeat {
            0% { transform: scale(1); }
            45% { transform: scale(1.08); }
            55% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        
        .kiosk-btn i {
            animation: subtleBeat 1.2s ease-in-out infinite;
            transform-origin: center;
        }
        
        .kiosk-btn:hover i {
            animation: none;
        }
        
        /* SweetAlert overrides: ZERO LAYOUT SHIFT */
        .swal2-popup {
            font-family: 'Poppins', sans-serif !important;
            border-radius: 28px !important;
        }
        body.swal2-shown {
            overflow: hidden !important;
            padding-right: 0px !important;
            margin-right: 0px !important;
        }
        .swal2-container {
            overflow-y: auto !important;
        }
        .swal2-backdrop-show {
            backdrop-filter: blur(3px);
            background-color: rgba(0, 0, 0, 0.7);
        }
        html:has(.swal2-shown), body:has(.swal2-shown) {
            overflow: hidden !important;
            margin-right: 0 !important;
            padding-right: 0 !important;
        }
    </style>
</head>
<body>

    <div class="portal-card" id="card">
        <div class="card-overlay"></div>
        
        <!-- Navbar: transparent with live time container -->
        <nav class="navbar-custom">
            <div class="logo-area">
                <img src="cliniclogohalf.png" alt="Logo" onerror="this.src='https://placehold.co/60x45/9C0C20/white?text=CL'">
                <span>PUPBC CareLink</span>
            </div>
            <div class="login-area">
                <div class="time-container-permanent" id="liveClockDisplay">
                    <i class="bi bi-clock me-2" style="font-size: 0.9rem;"></i>
                    <span id="clockTimeText">--:--:-- --</span>
                </div>
            </div>
        </nav>
        
        <!-- TOP & BOTTOM separators preserved -->
        <div class="logo-separator-wrapper">
            <div class="brand-separator"></div>
        </div>
        <div class="bottom-separator-wrapper">
            <div class="brand-separator"></div>
        </div>

        <div class="carousel-outer">
            <div class="carousel-inner-container">
                <div class="carousel-pane">
                    <div class="hero-text">
                        <h1>Your Health,<br>Our Safety.</h1>
                        <p>Ensuring a secure and healthy environment for <br>every Iskolar ng Bayan through accessible campus care.</p>
                    </div>
                    
                    <!-- STAT CARD BUTTONS: ONLY ONE "GET STARTED" - with redirect pop-up -->
                    <div class="stat-card-buttons">
                        <div class="kiosk-btn btn-getstarted" id="getStartedBtn">
                            <i class="fas fa-heartbeat"></i>
                            <span>GET STARTED</span>
                        </div>
                    </div>

                    <!-- FAQ LINK: NOW POSITIONED ON THE RIGHT SIDE CORNER, ALIGNED WITH LIVE TIME EDGE like a ruler -->
                    <div class="faq-link-wrapper">
                        <a href="faq.html" class="faq-simple-link" id="faqSimpleLink">
                            <i class="fas fa-question-circle"></i> Need more help? <strong>FAQs</strong>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ==================== LIVE CLOCK UPDATE ====================
        function updateLiveClock() {
            const clockSpan = document.getElementById('clockTimeText');
            if (!clockSpan) return;
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            const formattedHours = hours.toString().padStart(2, '0');
            const formattedMinutes = minutes.toString().padStart(2, '0');
            const formattedSeconds = seconds.toString().padStart(2, '0');
            clockSpan.innerText = `${formattedHours}:${formattedMinutes}:${formattedSeconds} ${ampm}`;
        }
        updateLiveClock();
        setInterval(updateLiveClock, 1000);
        
        // ==================== ELIMINATE LAYOUT SHIFT for modals ====================
        (function eliminateLayoutShiftCompletely() {
            const originalSwalFire = Swal.fire;
            const lockBodyForModal = () => {
                document.documentElement.style.overflow = 'hidden';
                document.body.style.overflow = 'hidden';
                document.body.style.paddingRight = '0px';
                document.body.style.marginRight = '0px';
                document.body.style.width = '100%';
                document.body.style.position = 'relative';
            };
            const unlockBodyForModal = () => {
                // keep locked style to avoid any shift
                document.documentElement.style.overflow = 'hidden';
                document.body.style.overflow = 'hidden';
                document.body.style.paddingRight = '0px';
                document.body.style.marginRight = '0px';
            };
            Swal.fire = function(...args) {
                lockBodyForModal();
                let config = args[0] || {};
                if (typeof config === 'object') {
                    config.scrollbarPadding = false;
                    config.heightAuto = false;
                    config.backdrop = true;
                    config.allowOutsideClick = false;
                } else {
                    args[0] = { ...(args[0] || {}), scrollbarPadding: false, heightAuto: false };
                }
                const result = originalSwalFire.apply(this, args);
                if (result && typeof result.then === 'function') {
                    result.finally(() => unlockBodyForModal());
                }
                return result;
            };
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.attributeName === 'style' && document.body.style.paddingRight !== '0px') {
                        document.body.style.paddingRight = '0px';
                    }
                    if (mutation.attributeName === 'class' && document.body.classList.contains('swal2-shown')) {
                        document.body.style.paddingRight = '0px';
                        document.body.style.marginRight = '0px';
                        document.body.style.overflow = 'hidden';
                    }
                });
            });
            observer.observe(document.body, { attributes: true });
            lockBodyForModal();
        })();
        
        // Background image setup preserved exactly as original
        const backgroundImageURL = "https://5.imimg.com/data5/SELLER/Default/2023/6/316157293/TP/IJ/GK/5863015/healthcare-kiosk-solutions-1000x1000.jpg";
        const card = document.getElementById('card');
        document.body.style.backgroundImage = `url('${backgroundImageURL}')`;
        if (card) card.style.backgroundImage = `url('${backgroundImageURL}')`;
        
        // ==================== GET STARTED BUTTON: REDIRECT POP-UP ====================
        function createRedirectHandlerWithPopup(targetUrl, friendlyName) {
            return (e) => {
                e.preventDefault();
                Swal.fire({
                    title: `🚀 Redirecting`,
                    text: `Opening ${friendlyName}...`,
                    icon: 'info',
                    timer: 1000,
                    showConfirmButton: false,
                    backdrop: `rgba(0,0,0,0.7)`,
                    scrollbarPadding: false,
                    heightAuto: false
                }).then(() => {
                    window.location.href = targetUrl;
                });
            };
        }
        
        const getStartedButton = document.getElementById('getStartedBtn');
        if (getStartedButton) {
            const freshButton = getStartedButton.cloneNode(true);
            getStartedButton.parentNode.replaceChild(freshButton, getStartedButton);
            freshButton.id = 'getStartedBtn';
            freshButton.addEventListener('click', createRedirectHandlerWithPopup('kioskdashboardpage.html', 'CareLink Dashboard'));
        }
        
        // FAQ link: preserve original clean navigation (no extra popup, just direct)
        const faqSimpleLink = document.getElementById('faqSimpleLink');
        if (faqSimpleLink) {
            const freshFaq = faqSimpleLink.cloneNode(true);
            faqSimpleLink.parentNode.replaceChild(freshFaq, faqSimpleLink);
            // maintain href behavior, but we keep it untouched
            freshFaq.addEventListener('click', (e) => {
                // natural navigation, nothing extra to prevent preservation
                console.log("FAQ navigation to faq.html");
            });
        }
        
        console.log("✅ COMPLETE: FAQ button repositioned to RIGHT SIDE corner, perfectly aligned with the live time container's right edge like a ruler. All original designs (separators, hero text, get started button, animations, live clock, responsive behavior) remain fully intact and preserved.");
    </script>
</body>
</html>
