<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Configuration | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --admin-dark: #0D141A;
            --admin-hover: #1a252f; /* Dark slate hover instead of maroon */
            --clay-bg: #ffffff;
            --body-bg: #f8fafb;
        }

        body {
            background-color: var(--body-bg);
            font-family: 'Poppins', sans-serif;
            padding: 3.5rem 2.5rem; 
            margin: 0;
        }

        .config-wrapper {
            max-width: 1100px;
            margin: 0 auto;
        }

        .settings-card {
            background: var(--clay-bg);
            border-radius: 25px;
            padding: 2rem;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
        }

        .section-title {
            font-weight: 700;
            color: var(--admin-dark);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- CUSTOM FORM ELEMENTS --- */
        .form-control-clay {
            background: #f1f3f7;
            border: none;
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .form-control-clay:focus {
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(13, 20, 26, 0.05); /* Neutral focus */
            outline: none;
        }

        .status-pill {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 600;
        }

        /* --- UPDATED BUTTON (NO RED HOVER) --- */
        .btn-save-config {
            background: var(--admin-dark);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-save-config:hover {
            background: var(--admin-hover); /* Slate/Steel blue-dark hover */
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 20, 26, 0.2);
        }

        .btn-discard {
            background: #ffffff;
            color: #6c757d;
            border: 1px solid #dee2e6;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-discard:hover {
            background: #f8f9fa;
            color: var(--admin-dark);
        }
    </style>
</head>
<body>

    <div class="config-wrapper">
        <div class="mb-5">
            <h3 class="fw-bold mb-0">System Configuration</h3>
            <p class="text-muted small">Manage global parameters and security protocols for CareLink.</p>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="settings-card">
                    <h5 class="section-title">
                        <i class="fa-solid fa-gear text-muted"></i> General Parameters
                    </h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-2">Campus Terminal Name</label>
                            <input type="text" class="form-control-clay" value="PUP Biñan Main Clinic">
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-2">System Timezone</label>
                            <select class="form-control-clay w-100">
                                <option>(GMT+08:00) Manila</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="settings-card">
                    <h5 class="section-title">
                        <i class="fa-solid fa-qrcode text-muted"></i> QR Link Security
                    </h5>
                    <div class="row g-3">
                        <div class="col-md-12 mb-2">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="qrRotation" checked>
                                <label class="form-check-label small" for="qrRotation">Enable Dynamic QR Token Rotation (Every 30s)</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-2">Entry Log Restriction</label>
                            <input type="number" class="form-control-clay" value="15">
                            <small class="text-muted" style="font-size: 0.7rem;">Minutes between allowed taps.</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="settings-card border-0" style="background: var(--admin-dark); color: white;">
                    <h6 class="fw-bold mb-3"><i class="fa-solid fa-server me-2 opacity-75"></i>Server Status</h6>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="small opacity-75">Database</span>
                        <span class="status-pill bg-success text-white">Online</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="small opacity-75">Storage</span>
                        <span class="status-pill bg-success text-white">92% Free</span>
                    </div>
                    <hr class="opacity-25">
                    <button class="btn btn-sm btn-outline-light w-100" style="font-size: 0.75rem;">Run Diagnostics</button>
                </div>

                <div class="settings-card">
                    <h6 class="fw-bold mb-3">Backup Protocols</h6>
                    <p class="text-muted" style="font-size: 0.75rem;">Last auto-backup: <br><strong>March 22, 2026 - 04:00 AM</strong></p>
                    <button class="btn btn-light btn-sm w-100 fw-bold border" style="font-size: 0.75rem;">Backup Now</button>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-2">
            <button class="btn-discard">Discard Changes</button>
            <button class="btn-save-config">Save System Changes</button>
        </div>
    </div>
<script>
        // Anti-Direct Access Logic
    if (window.self === window.top) {
        const currentPage = window.location.pathname.split("/").pop();
        window.location.href = "admindashboard.html?page=" + currentPage;
    }
</script>
</body>
</html>
