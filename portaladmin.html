<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --admin-dark: #0D141A;
            --admin-slate: #475867;
            --pup-maroon: #9C0C20;
            --clay-bg: #f8f9fa;
            --clay-shadow: 10px 10px 20px #bebebe, -10px -10px 20px #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--admin-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Ambient Background Glow */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--pup-maroon);
            filter: blur(150px);
            opacity: 0.2;
            z-index: 0;
            top: 10%;
            left: 10%;
        }

        .admin-card {
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 3.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--admin-slate);
        }

        .admin-icon-box {
            background: var(--clay-bg);
            border-radius: 30px;
            box-shadow: var(--clay-shadow);
            padding: 20px;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .form-control-clay {
            background: var(--clay-bg);
            border: none;
            border-radius: 15px;
            padding: 14px 20px;
            box-shadow: inset 5px 5px 10px #d1d9e6, inset -5px -5px 10px #ffffff;
            transition: 0.3s;
        }

        .form-control-clay:focus {
            box-shadow: inset 8px 8px 15px #c2ccd8, inset -8px -8px 15px #ffffff;
            background: #fff;
            outline: none;
        }

        .btn-admin-entry {
            background: var(--admin-dark);
            color: white;
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            border: none;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-admin-entry:hover {
            background: var(--pup-maroon);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(156, 12, 32, 0.4);
        }

        .security-footer {
            font-size: 0.75rem;
            color: var(--admin-slate);
            margin-top: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container d-flex justify-content-center">
    <div class="admin-card text-center">
        <div class="admin-icon-box">
            <i class="fa-solid fa-user-shield fa-3x" style="color: var(--admin-dark);"></i>
        </div>
        <h2 class="fw-bold mb-1" style="color: var(--admin-dark);">Admin Access</h2>
        <p class="text-muted mb-4 small">CareLink Management System Portal</p>

        <form>
            <div class="mb-3 text-start">
                <label class="small fw-bold ms-2 text-uppercase" style="color: var(--admin-slate);">Admin Credentials</label>
                <div class="input-group mb-2">
                    <span class="input-group-text bg-transparent border-0"><i class="fa-solid fa-lock-open"></i></span>
                    <input type="text" class="form-control form-control-clay" placeholder="Admin Username">
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0"><i class="fa-solid fa-key"></i></span>
                    <input type="password" class="form-control form-control-clay" placeholder="Secret Password">
                </div>
            </div>

            <div class="mb-4 text-start">
                <label class="small fw-bold ms-2 text-uppercase" style="color: var(--admin-slate);">Security Token</label>
                <input type="text" class="form-control form-control-clay" placeholder="Enter Department Code">
            </div>

            <button type="submit" class="btn btn-admin-entry">
                <i class="fa-solid fa-shield-check me-2"></i> AUTHORIZE ENTRY
            </button>
        </form>

        <div class="security-footer border-top pt-3">
            <i class="fa-solid fa-triangle-exclamation me-1 text-danger"></i> 
            Authorized PUPBC Personnel Only
        </div>

        <div class="mt-4">
            <a href="index.html" class="text-decoration-none small" style="color: var(--pup-maroon);">
                <i class="fa-solid fa-house me-1"></i> Exit to Main Site
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
