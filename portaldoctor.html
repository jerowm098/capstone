<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Portal | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --medical-slate: #475867;
            --soft-blue: #91ABBC;
            --pup-maroon: #9C0C20;
            --clay-bg: #f3f7f9;
            --clay-shadow: 9px 9px 18px #d1d9e6, -9px -9px 18px #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #91ABBC 0%, #eef5db 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .doctor-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 3rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 15px 15px 35px rgba(71, 88, 103, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        .doctor-icon-box {
            background: var(--clay-bg);
            border-radius: 50%;
            box-shadow: var(--clay-shadow);
            padding: 25px;
            display: inline-block;
            margin-bottom: 1.5rem;
            border: 4px solid white;
        }

        .form-control-clay {
            background: var(--clay-bg);
            border: none;
            border-radius: 15px;
            padding: 12px 18px;
            box-shadow: inset 4px 4px 8px #cbd5e0, inset -4px -4px 8px #ffffff;
            transition: 0.3s;
        }

        .form-control-clay:focus {
            box-shadow: inset 6px 6px 12px #b8c2d1, inset -6px -6px 12px #ffffff;
            outline: none;
        }

        .btn-doctor {
            background: var(--medical-slate);
            color: white;
            border-radius: 15px;
            padding: 14px;
            width: 100%;
            border: none;
            font-weight: 600;
            transition: 0.3s;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-doctor:hover {
            background: #2c3842;
            transform: scale(1.02);
            box-shadow: 0 8px 15px rgba(71, 88, 103, 0.3);
        }

        /* --- STYLES FOR THE REGISTER LINK MESSAGE --- */
        .register-prompt {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--medical-slate);
        }

        .register-link {
            color: var(--pup-maroon);
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
            padding: 2px 5px;
        }

        .register-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        .helper-text {
            font-size: 0.85rem;
            color: var(--medical-slate);
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="doctor-card">
        <div class="doctor-icon-box">
            <i class="fa-solid fa-user-nurse fa-3x" style="color: var(--medical-slate);"></i>
        </div>
        <h2 class="fw-bold" style="color: var(--medical-slate);">Doctor Portal</h2>
        <p class="text-muted small mb-4">PUPBC CareLink Staff Authentication</p>

        <form action="digitalhealthcare/doctorsprofile/view-00-mainprofilehtml.php" method="POST">
            <div class="mb-3 text-start">
                <label class="small fw-bold ms-2 mb-1">Employee / License ID</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0"><i class="fa-solid fa-stethoscope text-muted"></i></span>
                    <input type="text" class="form-control form-control-clay" placeholder="EMP-2026-XXXX">
                </div>
            </div>

            <div class="mb-4 text-start">
                <label class="small fw-bold ms-2 mb-1">Passcode</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0"><i class="fa-solid fa-fingerprint text-muted"></i></span>
                    <input type="password" class="form-control form-control-clay" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="btn btn-doctor">
                <i class="fa-solid fa-door-open me-2"></i> ENTER CLINIC
            </button>
        </form>

        <p class="register-prompt">
            Don't have an account? 
            <a href="docregister.html" class="register-link">Register here</a>
        </p>

        <div class="helper-text">
            <a href="#" class="text-decoration-none me-3" style="color: var(--pup-maroon);">Reset Pin</a>
            <span class="text-muted">|</span>
            <a href="portalmain.html" class="text-decoration-none ms-3" style="color: var(--medical-slate);">Return Portal</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
