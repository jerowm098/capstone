<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --standard-padding: 1.5rem;
            --border-subtle: 1px solid rgba(40, 49, 58, 0.1);
            --brand-primary: #28313a;      
            --medical-blue: #475867;        
            --medical-blue-light: #667f94;
            --medical-blue-soft: rgba(71, 88, 103, 0.08); 
            --white: #ffffff;
            --text-main: #28313a;          
            --text-muted: #5c7285;     
            --clay-bg: #f4f7f6;
            --success-green: #28a745;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: transparent;
            margin: 0;
            padding: var(--standard-padding);
            color: var(--text-main);
        }

        .section-main-title {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-main-title h4 {
            margin: 0;
            font-weight: 700;
            color: var(--brand-primary);
            font-size: 1.3rem;
        }

        /* --- FORM STYLING --- */
        .edit-form-card {
            background: var(--white);
            border: var(--border-subtle);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1.5px solid rgba(40, 49, 58, 0.1);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--medical-blue-light);
            box-shadow: 0 0 0 4px var(--medical-blue-soft);
            outline: none;
        }

        /* --- BUTTONS --- */
        .btn-group-actions {
            display: flex;
            gap: 12px;
            margin-top: 2rem;
        }

        .btn-save {
            background-color: var(--brand-primary);
            color: var(--white);
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-save:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background-color: transparent;
            color: var(--text-muted);
            border: 1.5px solid rgba(40, 49, 58, 0.1);
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-cancel:hover {
            background-color: rgba(0,0,0,0.02);
            color: var(--brand-primary);
        }

        .avatar-edit-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 2rem;
        }

        .avatar-preview {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--medical-blue-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--medical-blue);
            border: var(--border-subtle);
        }

        .btn-change-photo {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--brand-primary);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: pointer;
            border: 2px solid white;
        }
    </style>
</head>
<body>

    <div class="section-main-title">
        <h4>Edit Profile Details</h4>
    </div>

    <form action="nurseprofileview.html" method="POST" class="edit-form-card">
        
        <div class="avatar-edit-wrapper">
            <div class="avatar-preview">
                <i class="fa-solid fa-user-nurse"></i>
            </div>
            <label for="photo-upload" class="btn-change-photo" title="Change Photo">
                <i class="fa-solid fa-camera"></i>
            </label>
            <input type="file" id="photo-upload" style="display:none">
        </div>

        <div class="row g-4">
            <div class="col-md-8">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" name="fullname" value="Jane Smith Doe" placeholder="Enter your full name">
            </div>

            <div class="col-md-4">
                <label class="form-label">Employee ID</label>
                <input type="text" class="form-control bg-light" value="NURSE-2026-001" readonly>
            </div>

            <div class="col-md-6">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" name="email" value="j.doe@pup.edu.ph">
            </div>

            <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" name="phone" value="+63 912 345 6789">
            </div>

            <div class="col-md-6">
                <label class="form-label">Specialty / Designation</label>
                <select class="form-select form-control" name="specialty">
                    <option selected>Registered Nurse (RN)</option>
                    <option>Head Nurse</option>
                    <option>Clinic Assistant</option>
                    <option>Medical Technologist</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">PRC License Number</label>
                <input type="text" class="form-control" name="license" value="PRC-0987654321">
            </div>
        </div>

        <div class="btn-group-actions">
            <button type="submit" class="btn-save">
                <i class="fa-solid fa-check me-2"></i>Save Changes
            </button>
            <button type="button" class="btn-cancel" onclick="history.back()">
                Cancel
            </button>
        </div>
    </form>
<script>
    if (window.self === window.top) {
        const currentPage = window.location.pathname.split("/").pop();
        // Force the dashboard to load Inventory and this specific sub-page
        window.location.href = "nursedashboard.html?page=nurseprofile.html&subpage=" + currentPage;
    }
</script>
</body>
</html>
