<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Doctor Registration | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867;
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://media.istockphoto.com/id/1501183871/photo/doctors-registering-patients-at-the-hospital.jpg?s=612x612&w=0&k=20&c=mnjpoSNO69dNWp11zMmbmMx5S0ch4cG_d-8sMvKzKwI=');
            background-size: cover;
            background-position: center;
            filter: blur(10px);
            transform: scale(1.1);
            z-index: -1;
        }

        .registration-container {
            width: 100%; max-width: 1100px;
            height: 650px;
            background: transparent;
            border-radius: 40px;
            /* SWAPPED: Form Side (1.2fr) is wider on the Left, Brand (1fr) is narrower on the Right */
            display: grid; grid-template-columns: 1.2fr 1fr;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            position: relative;
            backdrop-filter: blur(5px);
        }

        /* BRAND SIDE (NOW ON RIGHT) */
        .brand-side {
            background: linear-gradient(rgba(71, 88, 103, 0.9), rgba(0, 0, 0, 0.5)), 
                        url('https://media.istockphoto.com/id/1501183871/photo/doctors-registering-patients-at-the-hospital.jpg?s=612x612&w=0&k=20&c=mnjpoSNO69dNWp11zMmbmMx5S0ch4cG_d-8sMvKzKwI=');
            background-size: cover;
            background-position: center;
            padding: 4rem;
            display: flex; flex-direction: column; justify-content: center;
            color: white;
            order: 2; /* Moves to right */
        }

        /* FORM SIDE (NOW ON LEFT) */
        .form-side {
            padding: 3rem 4rem;
            background: rgba(253, 253, 253, 0.95);
            display: flex; flex-direction: column; justify-content: center;
            order: 1; /* Moves to left */
        }

        .registration-header h2 { font-weight: 700; color: var(--medical-blue); margin-bottom: 0.5rem; text-align: center; }
        .registration-header p { color: #666; font-size: 0.9rem; margin-bottom: 2rem; text-align: center; }

        .input-box {
            background: var(--clay-bg);
            border-radius: 20px;
            padding: 2px 20px;
            box-shadow: var(--clay-inset);
            display: flex; 
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--medical-blue); }
        .input-box i { color: var(--medical-blue); margin-left: 10px; opacity: 0.6; font-size: 0.8rem; }
        .input-box input {
            background: transparent; border: none; outline: none;
            width: 100%; padding: 10px 0; font-size: 0.85rem;
            color: var(--medical-blue);
        }

        /* Side-by-Side Grid */
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-doctor {
            background: var(--medical-blue);
            color: white; border: none; border-radius: 20px;
            padding: 15px; width: 100%; font-weight: 600;
            box-shadow: 0 10px 20px rgba(71, 88, 103, 0.2);
            transition: 0.3s; margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-doctor:hover { transform: translateY(-3px); background: #35424d; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }

        .form-footer { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: #888; }
        .form-footer a { color: var(--pup-maroon); text-decoration: none; font-weight: 600; }
        
        .btn-back-footer {
            display: inline-block;
            margin-top: 1rem;
            color: var(--medical-blue) !important;
            font-size: 0.8rem;
            transition: 0.3s;
            opacity: 0.8;
            text-decoration: none;
        }
        .btn-back-footer:hover { opacity: 1; transform: translateX(-3px); color: var(--pup-maroon) !important; }
    </style>
</head>
<body>

<div class="registration-container">
    <div class="form-side">
        <div class="registration-header">
            <h2>Staff Registration</h2>
            <p>Join the PUPBC CareLink Medical Team</p>
        </div>

        <form action="#" method="POST">
            <div class="input-row">
                <div>
                    <label class="small fw-bold mb-1 ms-2" style="color: var(--medical-blue);">FIRST NAME</label>
                    <div class="input-box">
                        <input type="text" placeholder="First Name" required>
                    </div>
                </div>
                <div>
                    <label class="small fw-bold mb-1 ms-2" style="color: var(--medical-blue);">LAST NAME</label>
                    <div class="input-box">
                        <input type="text" placeholder="Last Name" required>
                    </div>
                </div>
            </div>

            <label class="small fw-bold mb-1 ms-2" style="color: var(--medical-blue);">OFFICIAL EMAIL</label>
            <div class="input-box">
                <input type="email" placeholder="doctor@pup.edu.ph" required>
                <i class="fa-solid fa-envelope"></i>
            </div>

            <div class="input-row">
                <div>
                    <label class="small fw-bold mb-1 ms-2" style="color: var(--medical-blue);">PASSWORD</label>
                    <div class="input-box">
                        <input type="password" placeholder="••••••••" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>
                <div>
                    <label class="small fw-bold mb-1 ms-2" style="color: var(--medical-blue);">CONFIRM</label>
                    <div class="input-box">
                        <input type="password" placeholder="••••••••" required>
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-doctor">
                COMPLETE REGISTRATION <i class="fa-solid fa-user-doctor ms-2"></i>
            </button>
        </form>

        <div class="form-footer">
            Already have an account? <br>
            <a href="nurselogin.html">Login Access Here</a>
            <br>
            <a href="portalmain.html" class="btn-back-footer">
                <i class="fa-solid fa-arrow-left-long"></i> Back to Portal
            </a>
        </div>
    </div>

    <div class="brand-side">
        <h1 class="display-4 fw-bold">Medical<br>Enrollment</h1>
        <p class="lead opacity-75">Professional Healthcare Management System.</p>
        <div class="mt-4">
            <div class="d-flex align-items-center mb-3">
                <i class="fa-solid fa-id-card-clip me-3"></i>
                <span>Credential Verification</span>
            </div>
            <div class="d-flex align-items-center">
                <i class="fa-solid fa-house-medical-circle-check me-3"></i>
                <span>Staff Account Security</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
