<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CareLink Express | Kiosk Dashboard – Other Concerns</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --pup-maroon-dark: #7a0919;
            --consult-sky: #38bdf8;
            --consult-sky-dark: #0ea5e9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CRITICAL: LOCK VIEWPORT — no scrollbar shifting, no overflow */
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000; 
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Blur background overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: inherit;
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.45);
            transform: scale(1.02);
            z-index: -2;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            z-index: -1;
        }

        /* MAIN UI CARD — fixed dimensions */
        .portal-card {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 20px;
            width: 1300px;
            height: 850px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.2) inset;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.92);
            flex-shrink: 0;
        }
        
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.65) 100%);
            z-index: 1;
            border-radius: inherit;
            pointer-events: none;
        }

        /* Navbar */
        .navbar-custom {
            position: absolute;
            top: 20px;
            left: 100px;
            right: 100px;
            padding: 15px 40px 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            z-index: 100;
        }

        /* Horizontal separators */
        .logo-separator-wrapper {
            position: absolute;
            top: 95px;
            left: 100px;
            right: 100px;
            z-index: 99;
            pointer-events: none;
        }
        
        .bottom-separator-wrapper {
            position: absolute;
            bottom: 80px;
            left: 100px;
            right: 100px;
            z-index: 99;
            pointer-events: none;
        }
        
        .brand-separator {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.7) 15%, 
                rgba(255,215,0,0.9) 50%, 
                rgba(255,255,255,0.7) 85%, 
                rgba(255,255,255,0) 100%);
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        
        .logo-area img { 
            height: 45px; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); 
        }
        
        .logo-area span { 
            font-weight: 800; 
            font-size: 1.5rem; 
            color: white; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .time-container-permanent {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Poppins', monospace;
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.45);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            min-width: 180px;
            white-space: nowrap;
        }

        /* ----- NEW: NO BACKGROUND CONTAINER FOR HEADER/TEXT, just inline text ----- */
        .concerns-header {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 140px;          /* aligns well below upper separator, no card background */
            width: auto;
            max-width: 900px;
            z-index: 10;
            text-align: center;
            background: transparent;
        }

        .concerns-header h1 {
            font-size: 3rem;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.1;
            margin-bottom: 6px;
            text-shadow: 0 2px 15px rgba(0,0,0,0.6);
        }

        .concerns-header p {
            font-size: 1.25rem;
            color: rgba(255,255,255,0.96);
            margin-bottom: 0;
            text-shadow: 0 1px 8px rgba(0,0,0,0.5);
            font-weight: 500;
        }

        /* CONTENT WRAPPER — MAXIMIZES SPACE BETWEEN THE TWO SEPARATORS */
        .dashboard-content-wrapper {
            position: absolute;
            top: 215px;          /* starts a bit below the header text */
            bottom: 115px;       /* ends just above bottom separator (80px + 35px safe zone) */
            left: 100px;
            right: 100px;
            z-index: 12;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* distribute space, but main area is flexible */
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            padding: 12px 8px 12px 8px;
        }
        
        .dashboard-content-wrapper::-webkit-scrollbar {
            width: 4px;
        }
        .dashboard-content-wrapper::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        .dashboard-content-wrapper::-webkit-scrollbar-thumb {
            background: #38bdf8;
            border-radius: 10px;
        }

        /* Stat Cards Grid: 3x2 or responsive => uses full width, modern glassmorphism */
        .stat-cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(20, 30, 45, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 28px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.3);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            background: rgba(56, 189, 248, 0.3);
            border-color: rgba(255,255,255,0.8);
        }

        .stat-card i {
            font-size: 2.8rem;
            color: #38bdf8;
            margin-bottom: 12px;
            text-shadow: 0 1px 2px black;
        }

        .stat-card h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
        }

        .stat-card p {
            font-size: 0.8rem;
            color: #e2e8f0;
            margin: 0;
            opacity: 0.9;
        }

        /* queue button row */
        .queue-action-area {
            display: flex;
            justify-content: center;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .queue-primary-btn {
            background: linear-gradient(95deg, #38bdf8, #0ea5e9);
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.25rem;
            color: #0a0f1a;
            transition: 0.2s;
            width: 280px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        .queue-primary-btn:hover {
            background: #0ea5e9;
            transform: scale(1.02);
            color: white;
        }

        .queue-primary-btn:active {
            transform: scale(0.98);
        }

        /* Medicine modal / dynamic interactions remain smooth */
        .medicine-list {
            max-height: 280px;
            overflow-y: auto;
            text-align: left;
        }
        .medicine-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 10px 6px;
            font-weight: 500;
        }
        .in-stock {
            color: #4ade80;
            font-weight: bold;
        }
        .out-stock {
            color: #f87171;
            font-weight: bold;
        }

        /* GO BACK & FAQ - same preserved styles */
        .go-back-wrapper {
            position: absolute;
            bottom: 24px;
            left: 130px;
            z-index: 15;
        }
        .go-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            padding: 6px 22px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #f1f5f9;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.35);
            cursor: pointer;
        }
        .faq-link-wrapper {
            position: absolute;
            bottom: 24px;
            right: 130px;
            z-index: 15;
        }
        .faq-simple-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            padding: 6px 22px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #e2e8f0;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.25);
        }
        .faq-simple-link:hover, .go-back-btn:hover {
            background: rgba(0, 0, 0, 0.65);
            color: white;
        }

        /* Responsive handling */
        @media (max-width: 1200px) {
            .portal-card { width: 95%; height: 90vh; }
            .navbar-custom, .logo-separator-wrapper, .bottom-separator-wrapper { left: 50px; right: 50px; }
            .dashboard-content-wrapper { left: 50px; right: 50px; top: 215px; bottom: 115px; }
            .go-back-wrapper { left: 80px; }
            .faq-link-wrapper { right: 80px; }
            .stat-cards-grid { gap: 16px; }
        }
        @media (max-width: 850px) {
            .stat-cards-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            .concerns-header h1 { font-size: 2.2rem; }
            .concerns-header p { font-size: 1rem; }
            .queue-primary-btn { width: 240px; font-size: 1rem; padding: 12px 20px; }
        }
        @media (max-width: 650px) {
            .dashboard-content-wrapper { top: 210px; bottom: 105px; }
            .concerns-header { top: 125px; }
            .stat-cards-grid { grid-template-columns: 1fr; gap: 12px; }
        }
    </style>
</head>
<body>

<div class="portal-card" id="card">
    <div class="card-overlay"></div>
    
    <nav class="navbar-custom">
        <div class="logo-area">
            <img src="cliniclogohalf.png" alt="PUP Logo" onerror="this.src='https://placehold.co/60x45/9C0C20/white?text=PUP'">
            <span>PUPBC CareLink</span>
        </div>
        <div class="login-area">
            <div class="time-container-permanent" id="liveClockDisplay">
                <i class="bi bi-clock me-2" style="font-size: 0.9rem;"></i>
                <span id="clockTimeText">--:--:-- --</span>
            </div>
        </div>
    </nav>
    
    <div class="logo-separator-wrapper"><div class="brand-separator"></div></div>
    <div class="bottom-separator-wrapper"><div class="brand-separator"></div></div>

    <!-- Header without background container: only plain text -->
    <div class="concerns-header">
        <h1>Clinic Other Concerns</h1>
        <p>Make an appointment</p>
    </div>

    <!-- Middle content: maximize space between separators -->
    <div class="dashboard-content-wrapper" id="dashboardContent">
        <!-- 6 Stat Cards Grid -->
        <div class="stat-cards-grid" id="statCardsGrid"></div>
        <!-- Queue Number Button -->
        <div class="queue-action-area">
            <button class="queue-primary-btn" id="getQueueNumberBtn">
                <i class="fas fa-ticket-alt"></i> Get Queue Number
            </button>
        </div>
    </div>
    
    <div class="go-back-wrapper">
        <a href="#" class="go-back-btn" id="goBackButton"><i class="fas fa-arrow-left"></i> Go Back</a>
    </div>
    <div class="faq-link-wrapper">
        <a href="faq.html" class="faq-simple-link" id="faqSimpleLink"><i class="fas fa-question-circle"></i> Need more help? <strong>FAQs</strong></a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ---- LIVE CLOCK (preserved) ----
    function updateLiveClock() {
        const clockSpan = document.getElementById('clockTimeText');
        if (!clockSpan) return;
        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        clockSpan.innerText = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')} ${ampm}`;
    }
    updateLiveClock();
    setInterval(updateLiveClock, 1000);
    
    // Background image (same aesthetic)
    const bgURL = "https://5.imimg.com/data5/SELLER/Default/2023/6/316157293/TP/IJ/GK/5863015/healthcare-kiosk-solutions-1000x1000.jpg";
    document.body.style.backgroundImage = `url('${bgURL}')`;
    const cardEl = document.getElementById('card');
    if (cardEl) cardEl.style.backgroundImage = `url('${bgURL}')`;
    
    // Lock layout shift for modals (no flicker)
    (function lockBody() {
        const origSwal = Swal.fire;
        Swal.fire = function(...args) {
            document.documentElement.style.overflow = 'hidden';
            document.body.style.overflow = 'hidden';
            let cfg = args[0] || {};
            if (typeof cfg === 'object') { cfg.scrollbarPadding = false; cfg.heightAuto = false; }
            else { args[0] = { ...(args[0] || {}), scrollbarPadding: false, heightAuto: false }; }
            const res = origSwal.apply(this, args);
            if (res && res.finally) res.finally(() => { document.documentElement.style.overflow = 'hidden'; });
            return res;
        };
        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
    })();
    
    // ----- Data for medicine stock (request medicine) -----
    const medicinesCatalog = [
        { name: "Paracetamol 500mg", stock: "In Stock" },
        { name: "Ibuprofen 200mg", stock: "In Stock" },
        { name: "Loratadine 10mg", stock: "Out of Stock" },
        { name: "Amoxicillin 500mg", stock: "In Stock" },
        { name: "Mefenamic Acid", stock: "Out of Stock" },
        { name: "Cetirizine 10mg", stock: "In Stock" },
        { name: "Ascorbic Acid (Vit C)", stock: "In Stock" }
    ];
    
    // Function to show Request Medicine modal with stock availability
    function showMedicineModal() {
        let medicineListHtml = `<div class="medicine-list">`;
        medicinesCatalog.forEach(med => {
            const statusClass = med.stock === "In Stock" ? "in-stock" : "out-stock";
            const statusText = med.stock === "In Stock" ? "✅ In Stock" : "❌ Out of Stock";
            medicineListHtml += `
                <div class="medicine-item">
                    <span>💊 ${med.name}</span>
                    <span class="${statusClass}">${statusText}</span>
                </div>
            `;
        });
        medicineListHtml += `</div><div class="mt-3 text-center text-white-50"><small>Please approach pharmacy counter for prescription.</small></div>`;
        Swal.fire({
            title: '📋 Request Medicine',
            html: medicineListHtml,
            icon: 'info',
            confirmButtonColor: '#38bdf8',
            confirmButtonText: 'Close',
            background: 'rgba(15, 25, 45, 0.95)',
            backdrop: true,
            customClass: {
                popup: 'swal-medicine-popup'
            }
        });
    }
    
    // Helper for generic concern modals with nice alert
    function showConcernModal(title, messageDetail) {
        Swal.fire({
            title: title,
            html: `<div style="font-size:1rem;">${messageDetail}</div><hr><span class="badge bg-info text-dark mt-2">Please proceed to the assistance desk</span>`,
            icon: 'info',
            confirmButtonColor: '#38bdf8',
            background: 'rgba(0,0,0,0.85)',
            color: '#fff'
        });
    }
    
    // Card definitions with icons and specific handlers
    const concernsList = [
        { id: 'medicine', title: 'Request Medicine', icon: 'fas fa-capsules', desc: 'Check available medicine stock', handler: () => showMedicineModal() },
        { id: 'medical_cert', title: 'Medical Certificate', icon: 'fas fa-file-medical', desc: 'Request medical certificate', handler: () => showConcernModal('Medical Certificate Request', 'You can request a medical certificate at the clinic window. Please bring valid ID and previous medical records if any.') },
        { id: 'vitals_check', title: 'Vitals Check', icon: 'fas fa-heartbeat', desc: 'Blood pressure, heart rate, etc', handler: () => showConcernModal('Vitals Check', 'Our nurse will assist you in checking your blood pressure, heart rate, temperature, and oxygen saturation. Please have a seat in the vitals area.') },
        { id: 'dental_services', title: 'Dental Services', icon: 'fas fa-tooth', desc: 'Consultation & oral check', handler: () => showConcernModal('Dental Services', 'Basic dental checkup, cleaning, and oral health advice available. Walk-in schedule: Mon/Wed/Fri 9AM-12PM.') },
        { id: 'clearance_signing', title: 'Clearance Signing', icon: 'fas fa-stamp', desc: 'Clinic clearance signature', handler: () => showConcernModal('Clearance Signing', 'For clearance signing, please present your clearance form, valid ID, and ensure previous medical obligations are settled.') },
        { id: 'general_inquiry', title: 'General Inquiry', icon: 'fas fa-comments', desc: 'Clinic FAQ, processes', handler: () => showConcernModal('General Inquiry', 'Our staff will assist you with any clinic-related inquiries. You may also refer to the digital FAQ board.') }
    ];
    
    // Dynamically render 6 stat cards
    const gridContainer = document.getElementById('statCardsGrid');
    function renderStatCards() {
        if (!gridContainer) return;
        gridContainer.innerHTML = '';
        concernsList.forEach(concern => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'stat-card';
            cardDiv.setAttribute('data-concern-id', concern.id);
            cardDiv.innerHTML = `
                <i class="${concern.icon}"></i>
                <h3>${concern.title}</h3>
                <p>${concern.desc}</p>
            `;
            cardDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                concern.handler();
            });
            gridContainer.appendChild(cardDiv);
        });
    }
    renderStatCards();
    
    // ----- QUEUE NUMBER LOGIC with simulate "Processing..." delay 3 seconds -----
    let queueCounter = 1;    // simple sequential queue number, resets on app? but fine for demo
    let isProcessingQueue = false;
    
    const queueBtn = document.getElementById('getQueueNumberBtn');
    if (queueBtn) {
        queueBtn.addEventListener('click', async () => {
            if (isProcessingQueue) {
                Swal.fire({
                    title: 'Please wait',
                    text: 'Your queue number is being generated...',
                    icon: 'info',
                    timer: 1500,
                    showConfirmButton: false
                });
                return;
            }
            isProcessingQueue = true;
            // Show processing with loader style
            const originalBtnText = queueBtn.innerHTML;
            queueBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processing...';
            queueBtn.disabled = true;
            
            // Simulate 3 sec delay (3000ms)
            await new Promise(resolve => setTimeout(resolve, 3000));
            
            // Generate queue number: format Q-XXX (three digits) e.g., Q-001
            const queueNumber = `Q-${queueCounter.toString().padStart(3, '0')}`;
            queueCounter++;
            if (queueCounter > 999) queueCounter = 1; // wrap around
            
            // Restore button
            queueBtn.innerHTML = originalBtnText;
            queueBtn.disabled = false;
            isProcessingQueue = false;
            
            // Success modal with queue number
            Swal.fire({
                title: '✅ Queue Number Assigned!',
                html: `<div style="font-size: 3rem; font-weight:800; background: rgba(56,189,248,0.2); border-radius: 32px; padding: 12px;">${queueNumber}</div><br>Your estimated wait time: ~10-15 minutes.<br>Please wait near the clinic reception.`,
                icon: 'success',
                confirmButtonText: 'Got it',
                confirmButtonColor: '#38bdf8',
                background: 'rgba(10, 20, 35, 0.95)',
                backdrop: true
            });
        });
    }
    
    // Go Back handler (preserved behavior: step back page, but since we are in dashboard, go to previous page or alert)
    const goBackBtn = document.getElementById('goBackButton');
    if (goBackBtn) {
        const newGoBack = goBackBtn.cloneNode(true);
        goBackBtn.parentNode.replaceChild(newGoBack, goBackBtn);
        newGoBack.addEventListener('click', (e) => {
            e.preventDefault();
            // try to go back if history available, otherwise show message
            if (window.history.length > 1) {
                window.history.back();
            } else {
                Swal.fire({
                    title: 'Navigation',
                    text: 'No previous page in history. You are on the dashboard.',
                    icon: 'info',
                    confirmButtonColor: '#38bdf8',
                    timer: 1500
                });
            }
        });
    }
    
    // FAQ link placeholder functionality (preserve)
    const faqLink = document.getElementById('faqSimpleLink');
    if (faqLink) {
        faqLink.addEventListener('click', (e) => {
            e.preventDefault();
            Swal.fire({
                title: 'Frequently Asked Questions',
                html: `<strong>❓ How do I get a queue number?</strong><br>Click "Get Queue Number" button and wait 3 seconds.<br><br>
                       <strong>💊 Medicine stock?</strong><br>Tap "Request Medicine" card to view availability.<br><br>
                       <strong>🏥 Other concerns?</strong><br>Click respective service card to see details.<br><br>
                       <i>For immediate help, approach front desk.</i>`,
                icon: 'question',
                confirmButtonColor: '#38bdf8',
                background: 'rgba(20,30,55,0.95)',
                color: 'white'
            });
        });
    }
    
    // Additional: ensure layout fully consumes space between separators, no overflow.
    // The .dashboard-content-wrapper uses justify-content safe and overflow auto only if needed, but grid fits ideally
    // Also dynamically scale card heights to prevent scroll? but we have small gap, but allowed minimal scroll if dense screen.
    // On standard 1300x850 layout, perfect fit. 
    console.log("✅ Kiosk Dashboard — Other Concerns ready: 6 stat cards + queue number (3 sec delay) + medicine stock modal. All constraints preserved.");
</script>
</body>
</html>
