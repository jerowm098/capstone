<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CareLink Express | Manual Patient ID Login — Kiosk Access</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --pup-maroon-dark: #7a0919;
            --key-bg: #f1f5f9;
            --key-active: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* LOCK VIEWPORT — no scrolling, rigid layout */
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Blur background overlay (same as original) */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: inherit;
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.45);
            transform: scale(1.02);
            z-index: -2;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            z-index: -1;
        }

        /* MAIN CARD — fixed dimensions */
        .portal-card {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 20px;
            width: 1300px;
            height: 850px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.2) inset;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.92);
            flex-shrink: 0;
        }
        
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.65) 100%);
            z-index: 1;
            border-radius: inherit;
            pointer-events: none;
        }

        /* NAVBAR + LOGO + TIME (exact same) */
        .navbar-custom {
            position: absolute;
            top: 20px;
            left: 100px;
            right: 100px;
            padding: 15px 40px 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            z-index: 100;
        }

        .logo-separator-wrapper {
            position: absolute;
            top: 95px;
            left: 100px;
            right: 100px;
            z-index: 99;
            pointer-events: none;
        }
        
        .bottom-separator-wrapper {
            position: absolute;
            bottom: 90px;
            left: 100px;
            right: 100px;
            z-index: 99;
            pointer-events: none;
        }
        
        .brand-separator {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.7) 15%, 
                rgba(255,215,0,0.9) 50%, 
                rgba(255,255,255,0.7) 85%, 
                rgba(255,255,255,0) 100%);
            border-radius: 4px;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            justify-content: flex-start; 
        }
        
        .logo-area img { 
            height: 45px; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); 
        }
        
        .logo-area span { 
            font-weight: 800; 
            font-size: 1.5rem; 
            color: white; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        .login-area { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            gap: 15px; 
        }

        .time-container-permanent {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Poppins', monospace;
            letter-spacing: 1px;
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.45);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            min-width: 180px;
            white-space: nowrap;
        }

        /* MIDDLE MAXIMIZED — uses full space between separators, NO overflow */
        .middle-maximized {
            position: absolute;
            top: 130px;
            bottom: 130px;
            left: 100px;
            right: 100px;
            z-index: 15;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 18px;
            overflow: visible;
        }

        /* HEADER: icon left, text right — no background container */
        .manual-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            flex-wrap: nowrap;
            background: transparent;
            margin: 0;
            padding: 0;
        }
        
        .manual-header i {
            font-size: 3rem;
            color: #ffffff;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
            text-shadow: 0 0 6px rgba(56,189,248,0.6);
        }
        
        .manual-header h1 {
            font-size: 2.6rem;
            font-weight: 800;
            color: white;
            margin: 0;
            text-shadow: 0 2px 12px rgba(0,0,0,0.6);
            letter-spacing: -0.5px;
            background: transparent;
            white-space: nowrap;
        }
        
        /* paragraph style */
        .manual-sub {
            font-size: 1.3rem;
            font-weight: 500;
            color: rgba(255,255,255,0.98);
            text-align: center;
            text-shadow: 0 1px 8px rgba(0,0,0,0.6);
            margin: 0 0 5px 0;
            background: transparent;
            letter-spacing: 0.5px;
        }
        
        /* INPUT + KEYBOARD SECTION — wider but compact height */
        .input-card-area {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        
        .patient-id-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            border: 2px solid rgba(255,255,255,0.5);
            padding: 4px 20px;
        }
        
        .patient-id-field input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1.9rem;
            font-weight: 600;
            font-family: 'Poppins', monospace;
            letter-spacing: 1px;
            color: white;
            text-align: center;
            padding: 12px 8px;
        }
        
        .patient-id-field input::placeholder {
            color: rgba(255,255,240,0.6);
            font-size: 1.2rem;
            font-weight: 400;
        }
        
        /* COMPACT & WIDER KEYBOARD — reduced height, wider buttons */
        .kiosk-keyboard {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 28px;
            padding: 14px 20px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.35);
            box-shadow: 0 10px 24px rgba(0,0,0,0.5);
        }
        
        .key-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .key-row:last-child {
            margin-bottom: 0;
        }
        
        .key {
            background: #f8fafc;
            border: none;
            font-size: 1.35rem;
            font-weight: 700;
            font-family: 'Poppins', monospace;
            padding: 8px 0;
            border-radius: 18px;
            width: 68px;
            text-align: center;
            color: #0f172a;
            transition: 0.08s linear;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .key:active {
            transform: scale(0.94);
            background: #cbd5e1;
        }
        
        .key-special {
            background: #334155;
            color: white;
            width: 88px;
            font-size: 1rem;
            font-weight: 600;
        }
        
        .key-wide {
            width: 130px;
            background: #0f172a;
            color: white;
            font-size: 1rem;
        }
        
        .key-clear {
            background: #b91c1c;
            color: white;
        }
        
        .verify-btn {
            background: linear-gradient(95deg, #0f3b5c, #0ea5e9);
            border: none;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 60px;
            color: white;
            width: auto;
            min-width: 220px;
            margin-top: 6px;
            letter-spacing: 1px;
            transition: 0.15s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
        }
        
        .verify-btn:active {
            transform: scale(0.97);
        }
        
        /* BOTTOM BUTTONS: exactly preserved */
        .go-back-wrapper {
            position: absolute;
            bottom: 38px;
            left: 130px;
            z-index: 15;
            pointer-events: auto;
        }
        
        .go-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            padding: 8px 24px;
            border-radius: 60px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: #f1f5f9;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.35);
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        
        .go-back-btn i { font-size: 1.1rem; }
        .go-back-btn:hover { background: rgba(0, 0, 0, 0.75); color: white; border-color: rgba(255,255,255,0.7); }
        
        .faq-link-wrapper {
            position: absolute;
            bottom: 38px;
            right: 130px;
            z-index: 15;
            pointer-events: auto;
        }
        
        .faq-simple-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            padding: 8px 24px;
            border-radius: 60px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: #e2e8f0;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(0,0,0,0.3);
        }
        
        .faq-simple-link i { font-size: 1rem; color: #2dd4bf; }
        .faq-simple-link:hover { background: rgba(0, 0, 0, 0.55); color: white; border-color: white; }
        
        /* Responsive: adjust keyboard width, keep inside lines */
        @media (max-width: 1200px) {
            .navbar-custom { left: 70px; right: 70px; }
            .logo-separator-wrapper { left: 70px; right: 70px; }
            .bottom-separator-wrapper { left: 70px; right: 70px; }
            .middle-maximized { left: 70px; right: 70px; top: 125px; bottom: 125px; }
            .manual-header h1 { font-size: 2.2rem; white-space: normal; text-align: center; }
            .key { width: 62px; font-size: 1.25rem; padding: 7px 0; }
            .key-special { width: 82px; }
            .key-wide { width: 110px; }
        }
        
        @media (max-width: 950px) {
            .navbar-custom { left: 45px; right: 45px; }
            .logo-separator-wrapper { left: 45px; right: 45px; top: 95px; }
            .bottom-separator-wrapper { left: 45px; right: 45px; bottom: 90px; }
            .middle-maximized { left: 45px; right: 45px; top: 120px; bottom: 115px; gap: 14px; }
            .manual-header h1 { font-size: 1.9rem; }
            .manual-header i { font-size: 2.6rem; }
            .manual-sub { font-size: 1.1rem; }
            .patient-id-field input { font-size: 1.6rem; padding: 8px 8px; }
            .key { width: 55px; font-size: 1.1rem; padding: 6px 0; border-radius: 14px; }
            .key-special { width: 75px; font-size: 0.85rem; }
            .key-wide { width: 100px; }
            .verify-btn { font-size: 1rem; padding: 10px 24px; }
            .kiosk-keyboard { padding: 12px 15px; }
            .key-row { gap: 8px; margin-bottom: 8px; }
        }
        
        @media (max-width: 750px) {
            .key { width: 48px; font-size: 1rem; }
            .key-special { width: 68px; }
            .key-wide { width: 90px; }
            .manual-header h1 { font-size: 1.6rem; }
        }
        
        @media (max-width: 650px) {
            .middle-maximized { top: 115px; bottom: 110px; gap: 12px; }
            .key { width: 45px; font-size: 0.9rem; padding: 5px 0; }
            .key-special { width: 65px; font-size: 0.75rem; }
            .key-wide { width: 85px; }
            .verify-btn { min-width: 180px; font-size: 0.9rem; }
        }
        
        @media (max-width: 580px) {
            .navbar-custom { left: 25px; right: 25px; flex-direction: column; top: 15px; }
            .login-area { justify-content: center; }
            .logo-separator-wrapper { left: 25px; right: 25px; top: 105px; }
            .bottom-separator-wrapper { left: 25px; right: 25px; bottom: 100px; }
            .middle-maximized { left: 25px; right: 25px; top: 140px; bottom: 130px; }
            .key { width: 42px; font-size: 0.85rem; }
            .key-special { width: 58px; }
            .key-wide { width: 80px; }
        }
        
        /* No scrollbars, safe */
        .swal2-popup { font-family: 'Poppins', sans-serif !important; border-radius: 28px !important; }
        body.swal2-shown { overflow: hidden !important; padding-right: 0px !important; }
    </style>
</head>
<body>

<div class="portal-card" id="card">
    <div class="card-overlay"></div>
    
    <!-- Navbar: Logo + Live time -->
    <nav class="navbar-custom">
        <div class="logo-area">
            <img src="cliniclogohalf.png" alt="Logo" onerror="this.src='https://placehold.co/60x45/9C0C20/white?text=CL'">
            <span>PUPBC CareLink</span>
        </div>
        <div class="login-area">
            <div class="time-container-permanent" id="liveClockDisplay">
                <i class="bi bi-clock me-2" style="font-size: 0.9rem;"></i>
                <span id="clockTimeText">--:--:-- --</span>
            </div>
        </div>
    </nav>
    
    <!-- Top & Bottom separators -->
    <div class="logo-separator-wrapper">
        <div class="brand-separator"></div>
    </div>
    <div class="bottom-separator-wrapper">
        <div class="brand-separator"></div>
    </div>

    <!-- MIDDLE SECTION: fits perfectly between horizontal lines -->
    <div class="middle-maximized">
        <div class="manual-header">
            <i class="fas fa-id-card"></i>
            <h1>MANUAL PATIENT ID TO LOGIN</h1>
        </div>
        <div class="manual-sub">
            Tap your student number below
        </div>
        
        <div class="input-card-area">
            <div class="patient-id-field">
                <input type="text" id="patientIdInput" placeholder="e.g., 2026-00123-RN-0" autocomplete="off" readonly>
            </div>
            
            <!-- COMPACT & WIDER KEYBOARD (reduced height) -->
            <div class="kiosk-keyboard">
                <div class="key-row">
                    <button class="key" data-key="1">1</button>
                    <button class="key" data-key="2">2</button>
                    <button class="key" data-key="3">3</button>
                    <button class="key" data-key="4">4</button>
                    <button class="key" data-key="5">5</button>
                    <button class="key" data-key="6">6</button>
                    <button class="key" data-key="7">7</button>
                    <button class="key" data-key="8">8</button>
                    <button class="key" data-key="9">9</button>
                    <button class="key" data-key="0">0</button>
                </div>
                <div class="key-row">
                    <button class="key" data-key="-">-</button>
                    <button class="key" data-key="R">R</button>
                    <button class="key" data-key="N">N</button>
                    <button class="key" data-key="A">A</button>
                    <button class="key" data-key="B">B</button>
                    <button class="key" data-key="C">C</button>
                    <button class="key" data-key="D">D</button>
                    <button class="key" data-key="E">E</button>
                    <button class="key" data-key="F">F</button>
                </div>
                <div class="key-row">
                    <button class="key key-special" data-action="backspace"><i class="fas fa-delete-left"></i> DEL</button>
                    <button class="key key-special key-clear" data-action="clear">CLEAR</button>
                    <button class="key key-wide" data-action="space">SPACE</button>
                </div>
            </div>
            
            <button class="verify-btn" id="verifyManualBtn">
                <i class="fas fa-check-circle me-2"></i> VERIFY PATIENT
            </button>
        </div>
    </div>

    <!-- Go Back button -->
    <div class="go-back-wrapper">
        <a href="#" class="go-back-btn" id="goBackButton">
            <i class="fas fa-arrow-left"></i> Go Back
        </a>
    </div>

    <!-- FAQ Link -->
    <div class="faq-link-wrapper">
        <a href="faq.html" class="faq-simple-link" id="faqSimpleLink">
            <i class="fas fa-question-circle"></i> Need more help? <strong>FAQs</strong>
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ========== LIVE CLOCK ==========
    function updateLiveClock() {
        const clockSpan = document.getElementById('clockTimeText');
        if (!clockSpan) return;
        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;
        const formattedHours = hours.toString().padStart(2, '0');
        const formattedMinutes = minutes.toString().padStart(2, '0');
        const formattedSeconds = seconds.toString().padStart(2, '0');
        clockSpan.innerText = `${formattedHours}:${formattedMinutes}:${formattedSeconds} ${ampm}`;
    }
    updateLiveClock();
    setInterval(updateLiveClock, 1000);
    
    // ========== PREVENT LAYOUT SHIFT + SWEETALERT OVERFLOW ==========
    (function fixSwalAndOverflow() {
        const originalSwalFire = Swal.fire;
        const lockBody = () => {
            document.documentElement.style.overflow = 'hidden';
            document.body.style.overflow = 'hidden';
            document.body.style.paddingRight = '0px';
        };
        const unlockBody = () => {
            document.documentElement.style.overflow = 'hidden';
            document.body.style.overflow = 'hidden';
        };
        Swal.fire = function(...args) {
            lockBody();
            let config = args[0] || {};
            if (typeof config === 'object') {
                config.scrollbarPadding = false;
                config.heightAuto = false;
                config.backdrop = true;
                config.allowOutsideClick = false;
            } else {
                args[0] = { ...(args[0] || {}), scrollbarPadding: false, heightAuto: false };
            }
            const result = originalSwalFire.apply(this, args);
            if (result && typeof result.then === 'function') {
                result.finally(() => unlockBody());
            }
            return result;
        };
        const observer = new MutationObserver(() => {
            if (document.body.style.paddingRight !== '0px') document.body.style.paddingRight = '0px';
        });
        observer.observe(document.body, { attributes: true });
        lockBody();
    })();
    
    // Background image
    const backgroundImageURL = "https://5.imimg.com/data5/SELLER/Default/2023/6/316157293/TP/IJ/GK/5863015/healthcare-kiosk-solutions-1000x1000.jpg";
    const card = document.getElementById('card');
    document.body.style.backgroundImage = `url('${backgroundImageURL}')`;
    if (card) card.style.backgroundImage = `url('${backgroundImageURL}')`;
    
    // ========== MANUAL ID + KEYBOARD LOGIC ==========
    const patientInput = document.getElementById('patientIdInput');
    
    // Attach keyboard events
    const keys = document.querySelectorAll('.key');
    keys.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            const keyValue = btn.getAttribute('data-key');
            const action = btn.getAttribute('data-action');
            
            if (action === 'backspace') {
                let currentVal = patientInput.value;
                patientInput.value = currentVal.slice(0, -1);
            } 
            else if (action === 'clear') {
                patientInput.value = '';
            }
            else if (action === 'space') {
                patientInput.value += ' ';
            }
            else if (keyValue) {
                patientInput.value += keyValue;
            }
            patientInput.focus();
        });
    });
    
    // Show welcome popup exactly: "scanned id 2026-00123-RN-0, welcome Juan" with a 3-second timer + redirect
    function showWelcomeWithTimer(enteredId) {
        const patientId = enteredId.trim();
        if (patientId === "") {
            Swal.fire({
                title: 'Empty ID',
                text: 'Please enter a valid patient ID using the keyboard.',
                icon: 'warning',
                confirmButtonText: 'OK',
                backdrop: true
            });
            return false;
        }
        
        // Requirement: popup displays "scanned id XXXX, welcome Juan"
        // We use "Juan" as per spec example
        const welcomeName = "Juan";
        
        Swal.fire({
            title: '✅ Patient Verified',
            html: `<div style="font-size:1.4rem; font-weight:800; margin-bottom:12px;">scanned id ${patientId}, welcome ${welcomeName}</div><div style="font-size:0.95rem;">Manual entry confirmed. Redirecting...</div>`,
            icon: 'success',
            confirmButtonText: 'Continue to Dashboard',
            confirmButtonColor: '#0ea5e9',
            backdrop: `rgba(0,0,0,0.85)`,
            allowOutsideClick: false,
            showConfirmButton: true,
            timer: 3000,
            timerProgressBar: true,
            didOpen: () => {
                Swal.showLoading();
                const confirmBtn = Swal.getConfirmButton();
                if (confirmBtn) confirmBtn.disabled = true;
            },
            willClose: () => {}
        }).then((result) => {
            // after timer or manual confirm, redirect to placeholder
            window.location.href = "patient-dashboard-placeholder.html";
        });
        
        // Fallback redirect after 3 seconds in case something blocks
        setTimeout(() => {
            if (window.location.href.includes('kioskmanualpatientqr')) {
                window.location.href = "patient-dashboard-placeholder.html";
            }
        }, 3100);
        return true;
    }
    
    // VERIFY button handler
    const verifyBtn = document.getElementById('verifyManualBtn');
    if (verifyBtn) {
        verifyBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const idValue = patientInput.value;
            if (idValue.trim() === "") {
                Swal.fire({
                    title: 'Empty ID',
                    text: 'Please type your student ID or patient number using the on-screen keyboard.',
                    icon: 'warning',
                    confirmButtonText: 'OK',
                });
                return;
            }
            showWelcomeWithTimer(idValue);
        });
    }
    
    // ========== GO BACK BUTTON (preserved behavior) ==========
    const goBackBtn = document.getElementById('goBackButton');
    if (goBackBtn) {
        const freshGoBack = goBackBtn.cloneNode(true);
        goBackBtn.parentNode.replaceChild(freshGoBack, goBackBtn);
        freshGoBack.addEventListener('click', (e) => {
            e.preventDefault();
            if (window.history.length > 1) {
                window.history.back();
            } else {
                Swal.fire({
                    title: 'Navigate Back',
                    text: 'Returning to dashboard.',
                    icon: 'info',
                    timer: 1000,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = 'kiosk_layout_dashboard.html';
                });
            }
        });
    }
    
    // FAQ link - keep default navigation with no conflicts
    const faqLink = document.getElementById('faqSimpleLink');
    if (faqLink) {
        faqLink.addEventListener('click', (e) => {});
    }
    
    console.log("✅ Manual Patient ID Page - compact wider keyboard, fits between separators, popup shows 'scanned id ... welcome Juan' with 3s redirect.");
</script>
</body>
</html>
