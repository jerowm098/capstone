<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --float-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f4f7f6; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

        .master-floating-container {
            background: white;
            width: 100%;
            max-width: 1150px;
            min-height: 300px;
            border-radius: 30px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: none;
        }

        .internal-navbar-tabs {
            background: var(--pup-maroon);
            padding: 0 1.5rem;
            display: flex;
            justify-content: flex-start;
        }

        .nav-tabs-custom {
            border-bottom: none;
            display: flex;
            gap: 15px;
        }

        .nav-tabs-custom .nav-link {
            color: rgba(255, 255, 255, 0.7);
            border: none;
            padding: 1.2rem 1.5rem;
            font-weight: 600;
            background: transparent !important;
            position: relative;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-tabs-custom .nav-link:hover,
        .nav-tabs-custom .nav-link.active {
            color: #ffffff !important;
        }

        .nav-tabs-custom .nav-link::after {
            content: "";
            position: absolute;
            bottom: 8px;
            left: 50%;
            width: 0;
            height: 3px;
            background-color: white;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-tabs-custom .nav-link.active::after {
            width: 80%;
        }

        .appointment-body {
            padding: 30px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .fixed-content {
            display: flex;
            gap: 25px;
            align-items: stretch;
        }

        /* Eto ang adjustment para bumaba ang side columns (1 and 3) */
        .side-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            /* In-adjust natin para pumantay sa card ng step indicator (approx 45px - 50px) */
            padding-top: 48px; 
        }

        .floating-form-card {
            flex: 1;
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            min-height: 500px;
            transition: all 0.3s ease;
            margin: 5px; 
            border: 1px solid rgba(0, 0, 0, 0.08); 
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08), 0 4px 8px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
        }

        .floating-form-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
            border-color: rgba(156, 12, 32, 0.3);
        }

        .centered-step-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-bottom: 15px; 
            height: 33px; /* Fixed height para sa spacing */
        }
        
        .step-progress-wrapper { width: 100%; max-width: 300px; }
        .step-dots { display: flex; justify-content: space-between; position: relative; }
        .step-dots::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #ddd; transform: translateY(-50%); z-index: 1; }
        .dot { width: 28px; height: 28px; background: white; border: 2px solid #ddd; border-radius: 50%; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #aaa; }
        .dot.active { border-color: var(--pup-maroon); color: var(--pup-maroon); box-shadow: 0 0 10px rgba(156,12,32,0.2); }
        .dot.completed { background: var(--pup-maroon); border-color: var(--pup-maroon); color: white; }

        .calendar-box { background: #fdfdfd; padding: 12px; border-radius: 15px; box-shadow: inset 2px 2px 5px #e6e9ee; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .calendar-day { font-size: 0.7rem; padding: 8px 0; border-radius: 8px; cursor: pointer; text-align: center; }
        .calendar-day.today { background: var(--pup-maroon); color: white; }
        .calendar-day.selected { background: #ffdadd; color: var(--pup-maroon); outline: 1px solid var(--pup-maroon); }

        .btn-confirm { background: var(--pup-maroon); color: white; width: 100%; border-radius: 12px; padding: 12px; font-weight: 600; border: none; margin-top: 15px; }
        .btn-cancel { background: none; color: #888; width: 100%; border: none; font-size: 0.8rem; margin-top: 8px; }

        .history-list-item { padding: 12px; border-radius: 15px; background: #f8f9fa; margin-bottom: 10px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .history-list-item.active { border-color: var(--pup-maroon); background: white; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 700; }
        .status-completed { background: #e7f9ee; color: #28a745; }
        .status-cancelled { background: #fff1f0; color: #f5222d; }
    </style>
</head>
<body>

    <div class="master-floating-container">
        <div class="internal-navbar-tabs">
            <div class="nav nav-tabs nav-tabs-custom" id="nav-tab">
                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-make">
                    <i class="fa-solid fa-calendar-plus me-2"></i>Make Appointment
                </button>
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-history">
                    <i class="fa-solid fa-clock-rotate-left me-2"></i>Appointment History
                </button>
            </div>
        </div>

        <div class="appointment-body">
            <div class="tab-content">
                <div class="tab-pane fade show active" id="tab-make">
                    <div class="fixed-content">
                        
                        <div class="side-column">
                            <div class="floating-form-card"> 
                                <div class="fw-bold text-muted mb-3 small uppercase"><i class="fa-solid fa-calendar-day"></i> 01. Schedule</div>
                                <div class="calendar-box">
                                    <div class="calendar-grid" id="calendar"></div>
                                </div>
                                <p class="text-center mt-auto pt-3 small text-muted">March 2026</p>
                            </div>
                        </div>

                        <div style="flex: 1.3; display: flex; flex-direction: column;">
                            <div class="centered-step-container">
                                <div class="step-progress-wrapper">
                                    <div class="step-dots">
                                        <div class="dot completed"><i class="fa-solid fa-check"></i></div>
                                        <div class="dot active">2</div>
                                        <div class="dot">3</div>
                                    </div>
                                </div>
                            </div>
                            <div class="floating-form-card">
                                <div class="fw-bold text-muted mb-3 small uppercase"><i class="fa-solid fa-user-md"></i> 02. Patient Details</div>
                                <div class="mb-2">
                                    <label class="form-label small fw-bold">Triage Level</label>
                                    <select class="form-select form-select-sm rounded-3">
                                        <option>Routine / Regular Checkup</option>
                                        <option>Urgent / Pain</option>
                                    </select>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small fw-bold">Consultation Type</label>
                                    <select class="form-select form-select-sm rounded-3">
                                        <option>General Medicine</option>
                                        <option>Dental Services</option>
                                    </select>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small fw-bold">Reason for Visit</label>
                                    <textarea class="form-control form-control-sm rounded-3" rows="3" placeholder="Symptoms..."></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="side-column">
                            <div class="floating-form-card">
                                <div class="fw-bold text-muted mb-3 small uppercase"><i class="fa-solid fa-qrcode"></i> 03. Confirmation</div>
                                <div class="text-center p-3 border rounded-4 bg-light mb-3">
                                    <i class="fa-solid fa-qrcode fa-4x mb-2 text-dark"></i>
                                    <div class="fw-bold small" style="color: var(--pup-maroon);">TICKET #2026-01</div>
                                    <hr class="my-2 opacity-25">
                                    <div class="small text-start">
                                        <div class="d-flex justify-content-between"><span>Queue:</span> <strong>08</strong></div>
                                        <div class="d-flex justify-content-between"><span>Wait:</span> <strong>~15m</strong></div>
                                    </div>
                                </div>
                                <div class="mt-auto"> 
                                    <button class="btn btn-confirm">SUBMIT</button>
                                    <button class="btn btn-cancel" onclick="location.reload();">CANCEL</button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="tab-pane fade" id="tab-history">
                    <div class="fixed-content">
                        <div class="floating-form-card" style="flex: 1; overflow-y: auto; max-height: 500px;">
                            <div class="fw-bold text-muted mb-3 small uppercase">Past Visits</div>
                            <div class="history-list-item active">
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="small fw-bold text-maroon">MAR 15</span>
                                    <span class="status-badge status-completed">Completed</span>
                                </div>
                                <div class="small fw-bold">General Medicine</div>
                            </div>
                        </div>

                        <div class="floating-form-card" style="flex: 1.5;">
                            <div class="fw-bold text-muted mb-3 small uppercase">Visit Details</div>
                            <div class="p-3 bg-light rounded-4">
                                <div class="row g-2 small">
                                    <div class="col-6">TICKET ID: <br><span id="hist-ticket" class="fw-bold text-maroon">#2026-0089</span></div>
                                    <div class="col-6 text-end"><span id="hist-status" class="status-badge status-completed">Completed</span></div>
                                    <div class="col-12 mt-2">PERSONNEL: <br><span id="hist-person" class="fw-bold">Dr. Jose Rizal</span></div>
                                </div>
                            </div>
                            <div class="mt-3 small">
                                <label class="fw-bold">Doctor's Notes:</label>
                                <div id="hist-notes" class="p-2 border rounded-3 bg-white mt-1" style="min-height: 80px;">Patient advised to rest.</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const calendar = document.getElementById('calendar');
        for (let i = 1; i <= 30; i++) {
            const day = document.createElement('div');
            day.className = 'calendar-day' + (i === 22 ? ' today' : '');
            day.innerText = i;
            day.onclick = function() {
                document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
                this.classList.add('selected');
            };
            calendar.appendChild(day);
        }

        const triggerTabList = [].slice.call(document.querySelectorAll('.nav-link'))
        triggerTabList.forEach(function (triggerEl) {
            const tabTrigger = new bootstrap.Tab(triggerEl)
            triggerEl.addEventListener('click', function (event) {
                event.preventDefault()
                tabTrigger.show()
            })
        })

        if (window.self === window.top) {
            const currentPage = window.location.pathname.split("/").pop();
            window.location.href = "studdashboard.html?page=" + currentPage;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
