<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CareLink Express | Register New Patient — Kiosk Registration</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --pup-maroon-dark: #7a0919;
            --key-bg: #f1f5f9;
            --key-active: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* LOCK VIEWPORT — no scrolling, rigid layout */
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Blur background overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: inherit;
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.45);
            transform: scale(1.02);
            z-index: -2;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            z-index: -1;
        }

        /* MAIN CARD — fixed dimensions */
        .portal-card {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 20px;
            width: 1300px;
            height: 850px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.2) inset;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.92);
            flex-shrink: 0;
        }
        
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.65) 100%);
            z-index: 1;
            border-radius: inherit;
            pointer-events: none;
        }

        /* NAVBAR + LOGO + TIME */
        .navbar-custom {
            position: absolute;
            top: 20px;
            left: 100px;
            right: 100px;
            padding: 15px 40px 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            z-index: 100;
        }

        .logo-separator-wrapper {
            position: absolute;
            top: 95px;
            left: 100px;
            right: 100px;
            z-index: 99;
            pointer-events: none;
        }
        
        .bottom-separator-wrapper {
            position: absolute;
            bottom: 90px;
            left: 100px;
            right: 100px;
            z-index: 99;
            pointer-events: none;
        }
        
        .brand-separator {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.7) 15%, 
                rgba(255,215,0,0.9) 50%, 
                rgba(255,255,255,0.7) 85%, 
                rgba(255,255,255,0) 100%);
            border-radius: 4px;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            justify-content: flex-start; 
        }
        
        .logo-area img { 
            height: 45px; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); 
        }
        
        .logo-area span { 
            font-weight: 800; 
            font-size: 1.5rem; 
            color: white; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        .login-area { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            gap: 15px; 
        }

        .time-container-permanent {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Poppins', monospace;
            letter-spacing: 1px;
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.45);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            min-width: 180px;
            white-space: nowrap;
        }

        /* MIDDLE MAXIMIZED — uses full space between separators, NO overflow, VERTICAL CENTER with even gap */
        .middle-maximized {
            position: absolute;
            top: 130px;
            bottom: 130px;
            left: 100px;
            right: 100px;
            z-index: 15;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            overflow: visible;
        }

        /* HEADER: icon left, text right — no background container, preserved */
        .register-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            flex-wrap: nowrap;
            background: transparent;
            margin: 0;
            padding: 0;
        }
        
        .register-header i {
            font-size: 3rem;
            color: #ffffff;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.6));
            text-shadow: 0 0 8px rgba(34,211,238,0.8);
        }
        
        .register-header h1 {
            font-size: 2.3rem;
            font-weight: 800;
            color: white;
            margin: 0;
            text-shadow: 0 2px 12px rgba(0,0,0,0.6);
            letter-spacing: -0.3px;
            background: transparent;
            white-space: nowrap;
        }
        
        /* paragraph style inline, no container background */
        .register-sub {
            font-size: 1.3rem;
            font-weight: 500;
            color: rgba(255,255,255,0.98);
            text-align: center;
            text-shadow: 0 1px 8px rgba(0,0,0,0.6);
            margin: 0 0 5px 0;
            background: transparent;
            letter-spacing: 0.5px;
        }
        
        /* FORM CARD — minimal fields, user friendly, compact but spacious */
        .registration-form-card {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 28px 32px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
        
        .form-group {
            margin-bottom: 22px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 8px;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }
        
        .form-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.55);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            padding: 12px 20px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            color: white;
            outline: none;
            transition: 0.2s;
        }
        
        .form-group input:focus {
            border-color: #0ea5e9;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 0 2px rgba(14,165,233,0.3);
        }
        
        .form-group input::placeholder {
            color: rgba(255,255,240,0.6);
            font-weight: 400;
        }
        
        .two-cols {
            display: flex;
            gap: 18px;
        }
        
        .two-cols .form-group {
            flex: 1;
        }
        
        /* register action button */
        .register-action-btn {
            background: linear-gradient(95deg, #0f3b5c, #0ea5e9);
            border: none;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 14px 20px;
            border-radius: 60px;
            color: white;
            width: 100%;
            margin-top: 10px;
            letter-spacing: 1px;
            transition: 0.15s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .register-action-btn:active {
            transform: scale(0.97);
        }
        
        /* BOTTOM BUTTONS: exactly preserved */
        .go-back-wrapper {
            position: absolute;
            bottom: 38px;
            left: 130px;
            z-index: 15;
            pointer-events: auto;
        }
        
        .go-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            padding: 8px 24px;
            border-radius: 60px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: #f1f5f9;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.35);
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        
        .go-back-btn i { font-size: 1.1rem; }
        .go-back-btn:hover { background: rgba(0, 0, 0, 0.75); color: white; border-color: rgba(255,255,255,0.7); }
        
        .faq-link-wrapper {
            position: absolute;
            bottom: 38px;
            right: 130px;
            z-index: 15;
            pointer-events: auto;
        }
        
        .faq-simple-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            padding: 8px 24px;
            border-radius: 60px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: #e2e8f0;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(0,0,0,0.3);
        }
        
        .faq-simple-link i { font-size: 1rem; color: #2dd4bf; }
        .faq-simple-link:hover { background: rgba(0, 0, 0, 0.55); color: white; border-color: white; }
        
        /* Responsive adjustments: preserve space & no scroll */
        @media (max-width: 1200px) {
            .navbar-custom { left: 70px; right: 70px; }
            .logo-separator-wrapper { left: 70px; right: 70px; }
            .bottom-separator-wrapper { left: 70px; right: 70px; }
            .middle-maximized { left: 70px; right: 70px; top: 125px; bottom: 125px; gap: 20px; }
            .register-header h1 { font-size: 1.9rem; white-space: normal; text-align: center; }
            .register-header i { font-size: 2.6rem; }
            .register-sub { font-size: 1.1rem; }
            .registration-form-card { padding: 22px 26px; max-width: 580px; }
        }
        
        @media (max-width: 950px) {
            .navbar-custom { left: 45px; right: 45px; }
            .logo-separator-wrapper { left: 45px; right: 45px; top: 95px; }
            .bottom-separator-wrapper { left: 45px; right: 45px; bottom: 90px; }
            .middle-maximized { left: 45px; right: 45px; top: 120px; bottom: 115px; gap: 18px; }
            .register-header h1 { font-size: 1.6rem; }
            .register-sub { font-size: 1rem; }
            .registration-form-card { padding: 20px 20px; }
            .two-cols { gap: 12px; }
        }
        
        @media (max-width: 750px) {
            .middle-maximized { top: 115px; bottom: 110px; }
            .register-header h1 { font-size: 1.4rem; }
            .register-header i { font-size: 2.2rem; }
        }
        
        @media (max-width: 580px) {
            .navbar-custom { left: 25px; right: 25px; flex-direction: column; top: 15px; }
            .login-area { justify-content: center; }
            .logo-separator-wrapper { left: 25px; right: 25px; top: 105px; }
            .bottom-separator-wrapper { left: 25px; right: 25px; bottom: 100px; }
            .middle-maximized { left: 25px; right: 25px; top: 140px; bottom: 130px; gap: 16px; }
            .register-header h1 { font-size: 1.2rem; white-space: normal; text-align: center; }
            .register-sub { font-size: 0.9rem; }
            .registration-form-card { padding: 18px 16px; }
        }
        
        /* No scrollbars, safe */
        .swal2-popup { font-family: 'Poppins', sans-serif !important; border-radius: 28px !important; }
        body.swal2-shown { overflow: hidden !important; padding-right: 0px !important; }
    </style>
</head>
<body>

<div class="portal-card" id="card">
    <div class="card-overlay"></div>
    
    <!-- Navbar: Logo + Live time (exact same) -->
    <nav class="navbar-custom">
        <div class="logo-area">
            <img src="cliniclogohalf.png" alt="Logo" onerror="this.src='https://placehold.co/60x45/9C0C20/white?text=CL'">
            <span>PUPBC CareLink</span>
        </div>
        <div class="login-area">
            <div class="time-container-permanent" id="liveClockDisplay">
                <i class="bi bi-clock me-2" style="font-size: 0.9rem;"></i>
                <span id="clockTimeText">--:--:-- --</span>
            </div>
        </div>
    </nav>
    
    <!-- Top & Bottom separators (horizontal lines) -->
    <div class="logo-separator-wrapper">
        <div class="brand-separator"></div>
    </div>
    <div class="bottom-separator-wrapper">
        <div class="brand-separator"></div>
    </div>

    <!-- MIDDLE SECTION: NEW REGISTRATION UI, fully between lines, NO overflow, maximum usage -->
    <div class="middle-maximized">
        <!-- Header: icon left, header name right (no background container) -->
        <div class="register-header">
            <i class="fas fa-user-plus"></i>
            <h1>REGISTER NEW PATIENT FOR ACCESS</h1>
        </div>
        <!-- Paragraph subtext -->
        <div class="register-sub">
            Create your CareLink profile — quick & easy
        </div>
        
        <!-- Minimalist user-friendly registration form (only essential fields) -->
        <div class="registration-form-card">
            <div class="two-cols">
                <div class="form-group">
                    <label><i class="fas fa-user me-1"></i> First Name</label>
                    <input type="text" id="firstName" placeholder="e.g., Juan" autocomplete="off">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user me-1"></i> Last Name</label>
                    <input type="text" id="lastName" placeholder="e.g., Dela Cruz" autocomplete="off">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-id-card me-1"></i> Student / Patient ID</label>
                <input type="text" id="patientIdReg" placeholder="e.g., 2026-00123-PN-0" autocomplete="off">
            </div>
            <button class="register-action-btn" id="registerNowBtn">
                <i class="fas fa-check-double"></i> REGISTER & CONTINUE
            </button>
            <div style="font-size: 0.7rem; text-align: center; margin-top: 16px; color: rgba(255,255,220,0.7);">
                <i class="fas fa-shield-alt"></i> Your info is secure and confidential
            </div>
        </div>
    </div>

    <!-- Go Back button (preserved) -->
    <div class="go-back-wrapper">
        <a href="#" class="go-back-btn" id="goBackButton">
            <i class="fas fa-arrow-left"></i> Go Back
        </a>
    </div>

    <!-- FAQ Link (preserved) -->
    <div class="faq-link-wrapper">
        <a href="faq.html" class="faq-simple-link" id="faqSimpleLink">
            <i class="fas fa-question-circle"></i> Need more help? <strong>FAQs</strong>
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ========== LIVE CLOCK ==========
    function updateLiveClock() {
        const clockSpan = document.getElementById('clockTimeText');
        if (!clockSpan) return;
        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;
        const formattedHours = hours.toString().padStart(2, '0');
        const formattedMinutes = minutes.toString().padStart(2, '0');
        const formattedSeconds = seconds.toString().padStart(2, '0');
        clockSpan.innerText = `${formattedHours}:${formattedMinutes}:${formattedSeconds} ${ampm}`;
    }
    updateLiveClock();
    setInterval(updateLiveClock, 1000);
    
    // ========== PREVENT LAYOUT SHIFT + SWEETALERT OVERFLOW ==========
    (function fixSwalAndOverflow() {
        const originalSwalFire = Swal.fire;
        const lockBody = () => {
            document.documentElement.style.overflow = 'hidden';
            document.body.style.overflow = 'hidden';
            document.body.style.paddingRight = '0px';
        };
        const unlockBody = () => {
            document.documentElement.style.overflow = 'hidden';
            document.body.style.overflow = 'hidden';
        };
        Swal.fire = function(...args) {
            lockBody();
            let config = args[0] || {};
            if (typeof config === 'object') {
                config.scrollbarPadding = false;
                config.heightAuto = false;
                config.backdrop = true;
                config.allowOutsideClick = false;
            } else {
                args[0] = { ...(args[0] || {}), scrollbarPadding: false, heightAuto: false };
            }
            const result = originalSwalFire.apply(this, args);
            if (result && typeof result.then === 'function') {
                result.finally(() => unlockBody());
            }
            return result;
        };
        const observer = new MutationObserver(() => {
            if (document.body.style.paddingRight !== '0px') document.body.style.paddingRight = '0px';
        });
        observer.observe(document.body, { attributes: true });
        lockBody();
    })();
    
    // Background image (same as original)
    const backgroundImageURL = "https://5.imimg.com/data5/SELLER/Default/2023/6/316157293/TP/IJ/GK/5863015/healthcare-kiosk-solutions-1000x1000.jpg";
    const card = document.getElementById('card');
    document.body.style.backgroundImage = `url('${backgroundImageURL}')`;
    if (card) card.style.backgroundImage = `url('${backgroundImageURL}')`;
    
    // ========== REGISTRATION LOGIC (User-friendly, minimum fields) ==========
    const firstNameInput = document.getElementById('firstName');
    const lastNameInput = document.getElementById('lastName');
    const patientIdRegInput = document.getElementById('patientIdReg');
    const registerBtn = document.getElementById('registerNowBtn');
    
    // Helper: clean inputs
    function getTrimmedValues() {
        const firstName = firstNameInput ? firstNameInput.value.trim() : '';
        const lastName = lastNameInput ? lastNameInput.value.trim() : '';
        const patientId = patientIdRegInput ? patientIdRegInput.value.trim() : '';
        return { firstName, lastName, patientId };
    }
    
    // Show welcome popup with "scanned id XXXX, welcome Juan" + timer + redirect to placeholder
    function showRegistrationWelcomeWithTimer(patientId, fullName) {
        // The requirement: display an id like "2026-00123-PN-0" and name "welcome Juan".
        // Use the provided patientId from input or fallback with PN format example
        const displayId = patientId || "2026-00123-PN-0";
        const displayName = fullName || "Juan";
        
        Swal.fire({
            title: '🎉 Registration Successful!',
            html: `<div style="font-size:1.4rem; font-weight:800; margin-bottom:12px;">scanned id ${displayId}, welcome ${displayName}</div>
                   <div style="font-size:0.95rem;">Your CareLink profile has been created. Redirecting to dashboard...</div>`,
            icon: 'success',
            confirmButtonText: 'Continue to Dashboard',
            confirmButtonColor: '#0ea5e9',
            backdrop: `rgba(0,0,0,0.85)`,
            allowOutsideClick: false,
            showConfirmButton: true,
            timer: 3000,
            timerProgressBar: true,
            didOpen: () => {
                Swal.showLoading();
                const confirmBtn = Swal.getConfirmButton();
                if (confirmBtn) confirmBtn.disabled = true;
            },
            willClose: () => {}
        }).then(() => {
            // Redirect to placeholder dashboard after manual click or timer
            window.location.href = "patient-dashboard-placeholder.html";
        });
        
        // fallback redirect after 3.1 sec if any blocking occurs
        setTimeout(() => {
            if (window.location.href.includes('kioskregister.html')) {
                window.location.href = "patient-dashboard-placeholder.html";
            }
        }, 3100);
    }
    
    // Validate registration fields (user friendly, not many fields)
    function validateAndRegister() {
        const { firstName, lastName, patientId } = getTrimmedValues();
        
        if (!firstName) {
            Swal.fire({
                title: 'First Name Required',
                text: 'Please enter your first name to continue.',
                icon: 'warning',
                confirmButtonText: 'OK',
                backdrop: true
            });
            firstNameInput.focus();
            return false;
        }
        
        if (!lastName) {
            Swal.fire({
                title: 'Last Name Required',
                text: 'Please enter your last name.',
                icon: 'warning',
                confirmButtonText: 'OK',
                backdrop: true
            });
            lastNameInput.focus();
            return false;
        }
        
        if (!patientId) {
            Swal.fire({
                title: 'Patient ID Missing',
                text: 'Please enter your Student / Patient ID (e.g., 2026-00123-PN-0).',
                icon: 'warning',
                confirmButtonText: 'OK',
                backdrop: true
            });
            patientIdRegInput.focus();
            return false;
        }
        
        // Basic format suggestion: optional but friendly check for PN pattern (non-blocking)
        // Just for user hint, but not enforced strictly.
        const fullGreetName = `${firstName}`;  // welcome Juan (use first name)
        
        // Show popup message exactly with scanned id & welcome (first name)
        showRegistrationWelcomeWithTimer(patientId, fullGreetName);
        return true;
    }
    
    if (registerBtn) {
        registerBtn.addEventListener('click', (e) => {
            e.preventDefault();
            validateAndRegister();
        });
    }
    
    // ========== GO BACK BUTTON (preserved behavior with fallback) ==========
    const goBackBtn = document.getElementById('goBackButton');
    if (goBackBtn) {
        const freshGoBack = goBackBtn.cloneNode(true);
        goBackBtn.parentNode.replaceChild(freshGoBack, goBackBtn);
        freshGoBack.addEventListener('click', (e) => {
            e.preventDefault();
            if (window.history.length > 1) {
                window.history.back();
            } else {
                Swal.fire({
                    title: 'Navigate Back',
                    text: 'Returning to kiosk dashboard.',
                    icon: 'info',
                    timer: 1000,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = 'kiosk_layout_dashboard.html';
                });
            }
        });
    }
    
    // FAQ link (preserved, no conflict)
    const faqLink = document.getElementById('faqSimpleLink');
    if (faqLink) {
        faqLink.addEventListener('click', (e) => {
            // standard navigation, keep as is
        });
    }
    
    // Allow Enter key to submit (for better usability)
    const inputFields = [firstNameInput, lastNameInput, patientIdRegInput];
    inputFields.forEach(input => {
        if (input) {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (registerBtn) registerBtn.click();
