<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Register | PUPBC CareLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867;
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(156, 12, 32, 0.85), rgba(13, 20, 26, 0.9)), 
                        url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1920');
            background-size: cover;
            background-attachment: fixed;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .appointment-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 3rem 3.5rem; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            width: 1300px;
            height: 800px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            position: relative;
            border: 1px solid rgba(255,255,255,0.4);
            box-sizing: border-box;
        }

        .page-header h2 { color: var(--pup-maroon); font-weight: 800; margin-bottom: 8px; font-size: 2.5rem; text-align: center;}
        .page-header p { color: var(--medical-blue); font-size: 1.1rem; opacity: 0.8; margin: 0; text-align: center;}

        .registration-container {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 50px;
            flex-grow: 1; 
            align-items: stretch;
            padding: 20px 0;
        }

        .step-column {
            background: var(--clay-bg);
            border-radius: 32px;
            padding: 40px;
            box-shadow: var(--clay-shadow);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .qr-display-area {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .form-label { font-weight: 600; color: var(--medical-blue); font-size: 1rem; margin-bottom: 12px; }
        
        .input-group-clay {
            background: white; 
            border-radius: 18px;
            padding: 18px 22px; 
            box-shadow: var(--clay-inset);
            display: flex; 
            align-items: center; 
            margin-bottom: 30px;
        }

        /* Narrower margin for the email input specifically to keep the note close */
        .email-group {
            margin-bottom: 8px;
        }

        .input-group-clay input {
            background: transparent; border: none; outline: none;
            width: 100%; color: var(--medical-blue); font-size: 1.1rem;
        }

        .input-group-clay i {
            color: var(--pup-maroon);
            opacity: 0.6;
            font-size: 1.3rem;
            margin-left: 10px;
        }

        /* New Note Style */
        .input-note {
            font-size: 0.85rem;
            color: var(--medical-blue);
            opacity: 0.7;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .result-qr-container {
            width: 260px; height: 260px;
            background: white; border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--clay-inset);
            padding: 20px;
            margin: 0 auto;
            position: relative;
        }

        #qr-placeholder-icon {
            font-size: 6rem;
            color: #d1d9e6;
        }

        .btn-register {
            background: var(--pup-maroon); color: white; border: none; border-radius: 22px;
            padding: 24px; width: 100%; font-weight: 600; font-size: 1.3rem; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(156, 12, 32, 0.2);
            height: 85px; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: auto;
        }
        .btn-register:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .id-display-box {
            background: white; 
            border-radius: 22px; 
            box-shadow: var(--clay-inset); 
            width: 100%;
            padding: 24px;
            height: 85px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .qr-status-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-link-area {
            text-align: center;
            padding-top: 10px;
        }

        .back-link {
            text-decoration: none;
            color: var(--medical-blue);
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 25px;
            border-radius: 15px;
        }

        .back-link:hover {
            color: var(--pup-maroon);
            background: transparent; 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="appointment-card">
    
    <div class="page-header">
        <h2>Kiosk Quick Register</h2>
        <p>Register your student profile to enable QR-based login and clinic services.</p>
    </div>

    <div class="registration-container">
        
        <div class="step-column">
            <h5 class="fw-bold mb-4" style="color: var(--medical-blue);">
                <i class="fa-solid fa-user-plus me-2" style="color: var(--pup-maroon);"></i> Student Information
            </h5>
            
            <label class="form-label">Student ID Number</label>
            <div class="input-group-clay">
                <input type="text" id="studentId" placeholder="e.g. 2019-00123-BN-0">
                <i class="fa-solid fa-address-card"></i> 
            </div>

            <label class="form-label">Gmail Address</label>
            <div class="input-group-clay email-group">
                <input type="email" id="studentEmail" placeholder="e.g. name@example.com">
                <i class="fa-solid fa-envelope"></i> 
            </div>
            <div class="input-note">
                <i class="fa-solid fa-circle-info"></i> Your password will be sent to this Gmail.
            </div>

            <div style="flex-grow: 1;"></div>

            <button class="btn-register" onclick="generateQR()">
                Complete Registration
            </button>
        </div>

        <div class="step-column qr-display-area">
            <h5 class="fw-bold mb-4" style="color: var(--medical-blue); width: 100%; text-align: left;">
                <i class="fa-solid fa-qrcode me-2" style="color: var(--pup-maroon);"></i> Identification QR
            </h5>
            
            <div class="result-qr-container" id="qr-wrapper">
                <i class="fa-solid fa-qrcode" id="qr-placeholder-icon"></i>
                <img id="result-qr-img" src="" alt="Generated QR" style="display: none; width: 100%; height: 100%; object-fit: contain;">
            </div>
            
            <div class="qr-status-wrapper">
                <div class="qr-status-text" id="qr-status" style="font-size: 1.1rem; font-weight: 500; color: var(--medical-blue);">
                    Fill in details and click register
                </div>
            </div>
            
            <div class="id-display-box text-center">
                <strong id="final-id-text" style="color: var(--pup-maroon); font-size: 1.3rem; letter-spacing: 2px;">NO DATA</strong>
                <small class="text-muted d-block" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">Registered Student ID</small>
            </div>
        </div>

    </div>

    <div class="footer-link-area">
        <a href="kioskportal.html" class="back-link">
            <i class="fa-solid fa-arrow-left-long"></i>
            Back to Portal
        </a>
    </div>
</div>

<script>
    function generateQR() {
        const studentId = document.getElementById('studentId').value.trim();
        const studentEmail = document.getElementById('studentEmail').value.trim();
        const qrImg = document.getElementById('result-qr-img');
        const qrPlaceholder = document.getElementById('qr-placeholder-icon');
        const statusText = document.getElementById('qr-status');
        const finalId = document.getElementById('final-id-text');

        if (studentId.length > 0 && studentEmail.length > 0) {
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(studentId)}&color=9C0C20`;
            
            qrImg.src = qrUrl;
            qrImg.style.display = "block"; 
            qrPlaceholder.style.display = "none"; 
            
            statusText.innerHTML = '<span style="color: #4BB543;"><i class="fa-solid fa-circle-check"></i> Registration Successful</span>';
            finalId.innerText = studentId;

            console.log("Registered:", studentId, studentEmail);
            
        } else {
            alert("Please fill in both Student ID and Email before completing registration.");
        }
    }
</script>

</body>
</html>
