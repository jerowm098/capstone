<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CareLink Express | Kiosk Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867;
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 6px 6px 12px #d1d9e6, inset -6px -6px 12px #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(156, 12, 32, 0.8), rgba(13, 20, 26, 0.9)), 
                        url('https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=1920');
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 2rem 2.5rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            width: 1300px;
            height: 800px; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        hr {
            border: 0;
            border-top: 2px solid rgba(71, 88, 103, 0.15);
            margin: 1rem 0;
            opacity: 1;
        }

        .greeting-container {
            width: 890px;
            margin: 0 auto 10px auto;
            text-align: left;
        }

        .user-greeting {
            color: var(--medical-blue);
            font-size: 2rem;
            font-weight: 600;
            margin: 0;
        }

        .stat-card-grid {
            display: flex;
            justify-content: center;
            align-items: center; 
            flex-grow: 1;
        }

        /* SERVICES GRID - refined spacing to accommodate further height increase and width reduction */
        .services-wrapper {
            display: grid;
            grid-template-columns: repeat(2, 420px);
            grid-template-rows: repeat(2, auto);
            gap: 38px 48px;          /* Vertical gap increased from 32px to 38px to handle additional +2% height boost */
            justify-content: center;
            align-items: center;
        }

        /* ===== BUTTON MODIFICATIONS (DOUBLE ADJUSTMENT) ===== 
           - Width reduced by ADDITIONAL 2%: original baseline ~420px → first adjustment 98% (~411.6px) → NOW further reduced to 96.04% of original (~403.4px)
           - Height increased by ADDITIONAL 2%: original baseline ~180px → first adjustment 102% (~183.6px) → NOW further increased to 104.04% of original (~187.3px)
           - Internal padding refined for perfect vertical alignment
           - Vertical spacing between buttons increased accordingly (gap: 38px)
        */
        .stat-btn {
            background: var(--clay-bg);
            border-radius: 35px;
            padding: 18px 10px;       /* slightly increased top/bottom padding from 16px to 18px to match new taller button proportion */
            text-decoration: none !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--clay-shadow);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.6);
            cursor: pointer;
            color: inherit;
            /* NEW DIMENSIONS: width = 96.04% (approx 403.4px), height = 104.04% (approx 187.3px) */
            width: 96.04%;           
            height: 104.04%;         
            margin: 0 auto;
            transition: all 0.2s ease;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Icon styling adapted for new taller button with slightly increased icon size for visual balance */
        .stat-btn i { 
            font-size: 3.6rem;        /* slightly increased from 3.4rem to maintain visual weight with taller button */
            color: var(--pup-maroon); 
            margin-bottom: 14px;      /* increased from 12px to 14px for improved vertical rhythm */
        }
        .stat-btn .stat-label { 
            font-weight: 600; 
            color: var(--medical-blue); 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            line-height: 1.3; 
            letter-spacing: 0.3px;
        }

        /* Hover effect: subtle micro-interaction maintaining stability */
        .stat-btn:hover { 
            box-shadow: var(--clay-inset); 
            transform: scale(0.98);    /* minimal scale keeps within new dimensions */
        }

        .back-home-footer { text-align: center; padding-top: 0.5rem; }
        .home-link { color: var(--medical-blue); text-decoration: none; font-weight: 600; font-size: 1.1rem; }

        #confirmation-box {
            display: none; 
            text-align: center;
            flex-grow: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .btn-confirm { 
            padding: 18px 40px; 
            border-radius: 15px; 
            border: none; 
            font-weight: 600; 
            width: 280px; 
            font-size: 1.1rem; 
        }
        .btn-yes { background: var(--pup-maroon); color: white; }
        .btn-no { background: white; color: var(--medical-blue); box-shadow: var(--clay-shadow); }

        .hidden { display: none !important; }
        
        /* For cloned button in confirmation box: preserve exact resized look with highlight */
        #selected-button-container .stat-btn {
            width: 100% !important;   
            height: 100% !important;
            margin: 0;
            box-shadow: var(--clay-inset);
            border: 4px solid var(--pup-maroon);
            padding: 18px 10px;       /* consistent with updated padding */
        }
        
        /* adjust grid to seamlessly handle the 2% size modifications (cumulative) */
        .services-wrapper {
            display: grid;
            grid-template-columns: repeat(2, minmax(390px, 430px));
            grid-template-rows: repeat(2, minmax(185px, 200px));
            gap: 38px 48px;           /* enhanced gap: extra vertical spacing (now 38px) to accommodate height increase */
            justify-content: center;
            align-items: center;
        }
        
        /* responsive handling for slightly smaller viewports but preserve the new button proportions */
        @media (max-width: 1350px) {
            .services-wrapper {
                grid-template-columns: repeat(2, 380px);
                grid-template-rows: repeat(2, 185px);
                gap: 34px 38px;
            }
            .stat-btn {
                width: 96%;
                height: 104%;
            }
            .stat-btn i { font-size: 3.3rem; }
            .stat-btn .stat-label { font-size: 1.1rem; }
        }

        /* Extra polish: micro adjustment for consistent spacing between buttons in grid */
        .stat-card-grid .services-wrapper {
            margin: 0 auto;
        }
        
        /* Ensure the greeting and footer remain unaffected */
        .footer-section {
            margin-top: 4px;
        }
        
        /* smooth loading appearance */
        .portal-card, .stat-btn {
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>

<div class="portal-card" id="mainCard">
    <div class="header-section">
        <div class="text-center"> 
            <h1 class="fw-bold mb-0" style="color: var(--medical-blue); font-size: 3rem;">CareLink Express</h1>
            <p class="text-muted" id="instructionText" style="font-size: 1.2rem;">Touch a service to begin your request</p>
        </div>
        <hr id="headerSeparator">
    </div>

    <div class="greeting-container" id="userGreeting">
        <h2 class="user-greeting">Hello, <span style="color: var(--pup-maroon);">Juan</span>!</h2>
    </div>

    <div class="stat-card-grid" id="buttonGrid">
        <div class="services-wrapper">
            <!-- Each stat-btn now has cumulative width reduction (96.04% of original width) and cumulative height increase (104.04% of original height).
                 Grid gap increased to 38px vertical to ensure comfortable spacing between taller buttons. -->
            <div onclick="showConfirmation('make a walk-in appointment', 'kioskappointment-walkin.html', this)" class="stat-btn">
                <i class="fa-solid fa-person-walking"></i>
                <div class="stat-label">Walk-in<br>Appointments</div>
            </div>

            <div onclick="showConfirmation('cancel an existing appointment', 'kioskcancelappointment.html', this)" class="stat-btn">
                <i class="fa-solid fa-calendar-xmark"></i>
                <div class="stat-label">Cancel<br>Appointment</div>
            </div>

            <div onclick="showConfirmation('view your appointment history', 'kioskappointmenthistory.html', this)" class="stat-btn">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <div class="stat-label">Appointment<br>History</div>
            </div>

            <div onclick="showConfirmation('view your medical records', 'kioskappointmentrecords.html', this)" class="stat-btn">
                <i class="fa-solid fa-file-medical"></i>
                <div class="stat-label">View<br>Records</div>
            </div>
        </div>
    </div>

    <div class="footer-section" id="footerNav">
        <hr>
        <div class="back-home-footer">
            <a href="kioskportal.html" class="home-link">
                <i class="fa-solid fa-arrow-left"></i> Go Back
            </a>
        </div>
    </div>

    <div id="confirmation-box">
        <div id="selected-button-container" class="d-flex justify-content-center mb-4" style="width: 420px; height: 188px;"></div>
        <h2 class="fw-bold" style="color: var(--medical-blue); font-size: 2.2rem;">Confirm your destination</h2>
        <p class="confirm-text h4 mb-5 text-muted">You are about to <b id="targetName" class="text-danger">...</b>.<br>Do you want to proceed?</p>
        
        <div class="d-flex gap-4 justify-content-center">
            <button class="btn-confirm btn-yes" id="finalProceed">Yes, Proceed</button>
            <button class="btn-confirm btn-no" onclick="cancelRedirect()">No, Go Back</button>
        </div>
    </div>
</div>

<script>
    let currentTargetUrl = "";

    function showConfirmation(name, url, element) {
        currentTargetUrl = url;
        document.getElementById('buttonGrid').classList.add('hidden');
        document.getElementById('footerNav').classList.add('hidden');
        document.getElementById('headerSeparator').classList.add('hidden'); 
        document.getElementById('userGreeting').classList.add('hidden'); 
        document.getElementById('instructionText').innerText = "Please confirm your action";
        document.getElementById('targetName').innerHTML = name;
        
        const confirmBox = document.getElementById('confirmation-box');
        const container = document.getElementById('selected-button-container');
        
        container.innerHTML = "";
        // Clone the original stat-btn which already has cumulative width reduction & height increase
        const clone = element.cloneNode(true);
        
        // Ensure the cloned button appears within the confirmation preview exactly as the new resized button
        clone.style.width = "100%";
        clone.style.height = "100%";
        clone.style.pointerEvents = "none";
        clone.style.boxShadow = "var(--clay-inset)";
        clone.style.border = "4px solid var(--pup-maroon)";
        clone.style.margin = "0";
        clone.style.padding = "18px 10px";    // match updated padding for consistency
        // Keep any extra styling that might have been overwritten
        clone.style.display = "flex";
        clone.style.flexDirection = "column";
        clone.style.alignItems = "center";
        clone.style.justifyContent = "center";
        container.appendChild(clone);
        
        // Ensure confirmation container is visible with flex
        confirmBox.style.display = "flex";
        
        // Dynamically sync container height to the actual button height (which is now ~187px)
        const actualBtnHeight = clone.offsetHeight;
        if (actualBtnHeight > 0) {
            container.style.height = actualBtnHeight + 'px';
        }
        
        // Attach proceed action
        document.getElementById('finalProceed').onclick = function() {
            window.location.href = currentTargetUrl;
        };
    }

    function cancelRedirect() {
        // Reset main dashboard visibility
        document.getElementById('buttonGrid').classList.remove('hidden');
        document.getElementById('footerNav').classList.remove('hidden');
        document.getElementById('headerSeparator').classList.remove('hidden');
        document.getElementById('userGreeting').classList.remove('hidden'); 
        document.getElementById('confirmation-box').style.display = "none";
        document.getElementById('instructionText').innerText = "Touch a service to begin your request";
        // Reset any leftover state
        const container = document.getElementById('selected-button-container');
        if (container) container.innerHTML = "";
    }
    
    // On window load, verify that buttons reflect the cumulative dimensions (width: ~96.04% / height: ~104.04%)
    // Also adjust spacing dynamically to ensure perfect alignment.
    window.addEventListener('load', function() {
        const firstBtn = document.querySelector('.stat-btn');
        if (firstBtn) {
            const btnStyles = window.getComputedStyle(firstBtn);
            const btnWidth = parseFloat(btnStyles.width);
            const btnHeight = parseFloat(btnStyles.height);
            // Original baseline: width ~420px, height ~180px.
            // After two rounds: width ~403.4px (96.04% of 420), height ~187.3px (104.04% of 180).
            console.log(`CareLink Kiosk (double adjustment): Button dimensions → width: ${btnWidth.toFixed(1)}px (≈96.04% of original 420px), height: ${btnHeight.toFixed(1)}px (≈104.04% of original 180px). Vertical gap increased to 38px for comfortable spacing.`);
            
            // Additional check: ensure grid gap reflects the extra height
            const wrapper = document.querySelector('.services-wrapper');
            if (wrapper) {
                const gapStyle = window.getComputedStyle(wrapper);
                const rowGap = gapStyle.rowGap;
                console.log(`Grid row-gap set to ${rowGap} — accommodates taller buttons with proper breathing room.`);
            }
        }
        
        // Fine-tune confirmation container height based on actual button dimensions
        const confirmContainer = document.getElementById('selected-button-container');
        if (confirmContainer) {
            const btnSample = document.querySelector('.stat-btn');
            if (btnSample) {
                const sampleHeight = btnSample.offsetHeight;
                if (sampleHeight > 0) {
                    confirmContainer.style.height = sampleHeight + 'px';
                    confirmContainer.style.width = '420px';
                }
            }
        }
        
        // Ensure that on any window resize, confirmation container height syncs if visible
        window.addEventListener('resize', function() {
            const confirmDisplay = document.getElementById('confirmation-box');
            if (confirmDisplay && confirmDisplay.style.display === 'flex') {
                const freshBtnSample = document.querySelector('.stat-btn');
                if (freshBtnSample) {
                    const newHeight = freshBtnSample.offsetHeight;
                    const containerDiv = document.getElementById('selected-button-container');
                    if (containerDiv && newHeight) containerDiv.style.height = newHeight + 'px';
                }
            }
        });
    });
</script>
</body>
</html>
