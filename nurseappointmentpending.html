<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Pending Requests | PUPBC CareLink | with Appointment ID</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --standard-padding: 1.5rem;
            --border-subtle: 1px solid rgba(40, 49, 58, 0.1);
            --brand-primary: #28313a;      
            --medical-blue: #475867;        
            --medical-blue-dark: #1a2127; 
            --medical-blue-light: #667f94;
            --medical-blue-soft: rgba(71, 88, 103, 0.08); 
            --white: #ffffff;
            --text-main: #28313a;          
            --text-muted: #5c7285;     
            --clay-bg: #f4f7f6;
            --danger-red: #dc3545;
            --success-green: #28a745;
            --warning-orange: #f39c12;
            --appointment-id-bg: rgba(71, 88, 103, 0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: transparent;
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        .appointments-wrapper {
            width: 100%;
            background: transparent;
        }

        .form-content {
            padding: var(--standard-padding);
        }

        /* ===== NEW LAYOUT: Search bar area ===== */
        .search-section {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .search-wrapper {
            position: relative;
            display: inline-block;
        }

        .search-box {
            background: var(--clay-bg);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 10px;
            padding: 8px 15px 8px 38px;
            width: 300px;
            transition: 0.2s;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--medical-blue-light);
            background: var(--white);
            box-shadow: none;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
            pointer-events: none;
        }

        /* Counter + Pagination row (side by side) */
        .counter-pagination-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 16px;
        }

        .total-counter {
            background: var(--medical-blue-soft);
            color: var(--medical-blue-dark);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .total-counter i {
            color: var(--warning-orange);
            font-size: 1rem;
        }

        .pagination-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .pagination-btn {
            background: var(--white);
            border: 1px solid rgba(40, 49, 58, 0.2);
            color: var(--brand-primary);
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .pagination-btn i {
            font-size: 0.7rem;
        }

        .pagination-btn:hover:not(:disabled) {
            background-color: var(--brand-primary);
            border-color: var(--brand-primary);
            color: white;
            transform: translateY(-1px);
        }

        .pagination-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            background: #f1f2f4;
        }

        .page-number.active-page {
            background: var(--brand-primary);
            border-color: var(--brand-primary);
            color: white;
            font-weight: 600;
        }

        /* HORIZONTAL SEPARATOR LINE */
        .separator-line {
            border-bottom: var(--border-subtle);
            margin-bottom: 16px;
        }

        /* status badge for "pending" */
        .status-badge-pending {
            background: #fff4e5;
            color: #b7791f;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Appointment ID badge style (matching student cancel class) */
        .appointment-id-badge {
            background: var(--appointment-id-bg);
            color: var(--medical-blue-dark);
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            letter-spacing: 0.3px;
            border: 1px solid rgba(71, 88, 103, 0.15);
            white-space: nowrap;
        }

        .appointment-id-badge i {
            margin-right: 0px;
            font-size: 0.7rem;
            color: var(--medical-blue-light);
        }

        /* TABLE STYLES */
        .table-custom {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-bottom: 0;
            font-size: 0.82rem;
        }

        .table-custom thead th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.77rem;
            text-transform: uppercase;
            padding: 10px 12px;
            border: none;
            background: transparent;
            letter-spacing: 0.3px;
            border-bottom: var(--border-subtle);
        }

        .table-custom tbody tr {
            background-color: var(--white);
            transition: all 0.2s ease;
            cursor: default;
        }

        .table-custom tbody tr:hover td {
            background-color: var(--medical-blue-soft) !important;
        }

        .table-custom td {
            padding: 12px 12px;
            vertical-align: middle;
            border-top: var(--border-subtle);
            border-bottom: var(--border-subtle);
            background-color: var(--white);
            font-size: 0.82rem;
        }

        .table-custom td:first-child { 
            border-left: var(--border-subtle); 
            border-radius: 10px 0 0 10px; 
        }
        .table-custom td:last-child { 
            border-right: var(--border-subtle); 
            border-radius: 0 10px 10px 0; 
        }

        .profile-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            background: var(--medical-blue);
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            transition: transform 0.2s ease;
        }
        .profile-avatar:hover {
            transform: scale(1.05);
        }

        .student-info-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .student-text {
            display: flex;
            flex-direction: column;
        }

        .patient-name {
            font-weight: 600;
            color: var(--brand-primary);
            display: block;
            font-size: 0.88rem;
        }

        .patient-id-text {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .id-label {
            font-weight: 500;
            color: var(--medical-blue);
            margin-right: 4px;
        }

        .email-cell {
            font-size: 0.82rem;
        }

        /* Request Action Buttons - Check and X */
        .request-action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .btn-accept-request {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: all 0.2s ease;
            cursor: pointer;
            background: rgba(40, 167, 69, 0.12);
            color: var(--success-green);
            font-size: 1rem;
        }

        .btn-accept-request:hover {
            background: var(--success-green);
            color: white;
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        .btn-decline-request {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: all 0.2s ease;
            cursor: pointer;
            background: rgba(220, 53, 69, 0.12);
            color: var(--danger-red);
            font-size: 1rem;
        }

        .btn-decline-request:hover {
            background: var(--danger-red);
            color: white;
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 2.5rem;
            color: var(--text-muted);
        }

        /* MODAL top-aligned */
        .modal.top-aligned-modal .modal-dialog {
            margin-top: 0.5rem !important;
            margin-bottom: 0;
            align-items: flex-start !important;
        }
        .modal.top-aligned-modal .modal-dialog {
            display: flex;
            align-items: flex-start;
            min-height: calc(100% - 0.5rem);
        }
        .modal.top-aligned-modal .modal-content {
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            border: none;
        }
        @media (max-width: 576px) {
            .modal.top-aligned-modal .modal-dialog {
                margin: 0.5rem 0.75rem;
            }
        }

        @media (max-width: 1200px) {
            .table-custom td, .table-custom th {
                padding: 10px 8px;
            }
            .btn-accept-request, .btn-decline-request {
                width: 30px;
                height: 30px;
                font-size: 0.85rem;
            }
            .profile-avatar {
                width: 34px;
                height: 34px;
                font-size: 0.8rem;
            }
            .appointment-id-badge {
                font-size: 0.7rem;
                padding: 3px 8px;
            }
            .appointment-id-badge i {
                font-size: 0.65rem;
            }
        }

        @media (max-width: 768px) {
            .form-content {
                padding: 1rem;
            }
            .counter-pagination-row {
                flex-direction: column;
                align-items: stretch;
            }
            .total-counter {
                justify-content: center;
                width: fit-content;
                margin: 0 auto;
            }
            .pagination-wrapper {
                justify-content: center;
            }
            .search-section {
                justify-content: center;
            }
            .search-box {
                width: 100%;
            }
            .search-wrapper {
                width: 100%;
            }
            .table-responsive-custom {
                overflow-x: auto;
            }
            .pagination-btn {
                padding: 0.3rem 0.7rem;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<div class="appointments-wrapper">
    <div class="form-content">
        <!-- SEARCH BAR SECTION - above counter/pagination -->
        <div class="search-section">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-box" id="searchPendingInput" placeholder="Search pending requests...">
            </div>
        </div>

        <!-- COUNTER + PAGINATION ROW (side by side) -->
        <div class="counter-pagination-row">
            <div class="total-counter" id="totalPendingCounter">
                <i class="fa-solid fa-hourglass-half"></i> 
                Total Pending Requests: <span id="totalCount">0</span>
            </div>
            <div class="pagination-wrapper" id="paginationControlsTop">
                <!-- pagination buttons will be injected here -->
            </div>
        </div>

        <!-- HORIZONTAL SEPARATOR LINE -->
        <div class="separator-line"></div>

        <!-- TABLE CONTAINER - NEW COLUMN ADDED: Appointment ID between Email and Service Type -->
        <div class="table-responsive-custom">
            <table class="table table-custom">
                <thead>
                    <tr>
                        <th>Student Details</th>
                        <th>Email of Students</th>
                        <th>Appointment ID</th>
                        <th>Service Type</th>
                        <th>Status</th>
                        <th>Appointment Time</th>
                        <th style="width: 110px; text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody id="pendingTableBody">
                    <!-- dynamic rows - 4 maximum per page -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL FOR ACCEPT -->
<div class="modal fade top-aligned-modal" id="acceptConfirmModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content" style="border-radius: 16px;">
            <div class="modal-header" style="background: var(--success-green); color: white; border-radius: 16px 16px 0 0;">
                <h5 class="modal-title"><i class="fa-solid fa-check-circle me-2"></i>Accept Request</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="padding: 1.5rem;">
                <p class="mb-0">Accept appointment request for <strong id="acceptStudentName"></strong>?</p>
                <small class="text-muted">Status will be changed to "Completed".</small>
            </div>
            <div class="modal-footer" style="border-top: none;">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success" id="confirmAcceptBtn">Accept</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL FOR DECLINE -->
<div class="modal fade top-aligned-modal" id="declineConfirmModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content" style="border-radius: 16px;">
            <div class="modal-header" style="background: var(--danger-red); color: white; border-radius: 16px 16px 0 0;">
                <h5 class="modal-title"><i class="fa-solid fa-times-circle me-2"></i>Decline Request</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="padding: 1.5rem;">
                <p class="mb-0">Decline appointment request for <strong id="declineStudentName"></strong>?</p>
                <small class="text-muted">Status will be changed to "Cancelled".</small>
            </div>
            <div class="modal-footer" style="border-top: none;">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeclineBtn">Decline</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ============================================================
    // PENDING REQUESTS — WITH APPOINTMENT ID COLUMN ADDED
    // - New column "Appointment ID" inserted between Student Email and Service Type
    // - Each row includes APT-XXXX-XXX format with icon (matching student cancel class)
    // - Sample IDs: APT-2604-334, APT-2606-335, APT-2607-336, etc.
    // - Maximum 4 rows per page, pagination at top, search across all fields including Appointment ID
    // ============================================================
    
    let appointmentsList = [
        { id: "a1", appointmentId: "APT-2604-334", time: "08:30 AM", patientName: "Mark Anthony Sy", patientId: "STUD-2024-0552", email: "mark.sy@example.com", service: "Regular Check-up", status: "Completed" },
        { id: "a2", appointmentId: "APT-2606-335", time: "10:15 AM", patientName: "Maria Clara", patientId: "STUD-2023-1023", email: "maria.clara@example.com", service: "Lab Result Review", status: "Pending" },
        { id: "a3", appointmentId: "APT-2607-336", time: "01:00 PM", patientName: "Jose Rizal", patientId: "STUD-2023-0881", email: "jose.rizal@example.com", service: "Vaccination", status: "Pending" },
        { id: "a4", appointmentId: "APT-2608-337", time: "03:30 PM", patientName: "Andres Bonifacio", patientId: "STUD-2022-0456", email: "andres.bonifacio@example.com", service: "Dental Consultation", status: "Completed" },
        { id: "a5", appointmentId: "APT-2609-338", time: "09:00 AM", patientName: "Gabriela Silang", patientId: "STUD-2024-0789", email: "gabriela.silang@example.com", service: "Follow-up", status: "Pending" },
        { id: "a6", appointmentId: "APT-2610-339", time: "11:20 AM", patientName: "Emilio Aguinaldo", patientId: "STUD-2023-1123", email: "emilio.aguinaldo@example.com", service: "Regular Check-up", status: "Completed" },
        { id: "a7", appointmentId: "APT-2611-340", time: "02:45 PM", patientName: "Melchora Aquino", patientId: "STUD-2022-0987", email: "melchora.aquino@example.com", service: "Lab Result Review", status: "Pending" },
        { id: "a8", appointmentId: "APT-2612-341", time: "04:10 PM", patientName: "Lapu-Lapu", patientId: "STUD-2024-0011", email: "lapu.lapu@example.com", service: "Dental Consultation", status: "Cancelled" },
        { id: "a9", appointmentId: "APT-2613-342", time: "11:00 AM", patientName: "Francisco Balagtas", patientId: "STUD-2024-0999", email: "balagtas@example.com", service: "Regular Check-up", status: "Pending" },
        { id: "a10", appointmentId: "APT-2614-343", time: "02:00 PM", patientName: "Gregoria de Jesus", patientId: "STUD-2023-0777", email: "gregoria@example.com", service: "Vaccination", status: "Pending" }
    ];

    // 4 rows per page
    const ITEMS_PER_PAGE = 4;
    
    let currentPage = 1;
    let currentFilteredList = [];
    
    let acceptModalInstance, declineModalInstance;
    let currentActionId = null;
    let currentActionName = null;

    // Helper functions
    function getInitials(name) {
        if (!name) return "?";
        const parts = name.trim().split(/\s+/);
        if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
        return parts[0].charAt(0).toUpperCase() + parts[parts.length - 1].charAt(0).toUpperCase();
    }

    function getAvatarColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        const colors = ['#4a6fa5', '#6c5b7b', '#c06c6c', '#2c7a47', '#d97706', '#7c3aed', '#db2777', '#0891b2'];
        return colors[Math.abs(hash) % colors.length];
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // Get only pending appointments
    function getPendingOnly() {
        return appointmentsList.filter(apt => apt.status === 'Pending');
    }

    // Get filtered pending based on search input (including appointmentId)
    function getFilteredPending() {
        const searchTerm = document.getElementById('searchPendingInput')?.value.toLowerCase().trim() || '';
        const pending = getPendingOnly();
        if (!searchTerm) return [...pending];
        return pending.filter(apt => 
            apt.patientName.toLowerCase().includes(searchTerm) || 
            apt.patientId.toLowerCase().includes(searchTerm) ||
            (apt.email && apt.email.toLowerCase().includes(searchTerm)) ||
            apt.service.toLowerCase().includes(searchTerm) ||
            apt.time.toLowerCase().includes(searchTerm) ||
            apt.appointmentId.toLowerCase().includes(searchTerm)
        );
    }

    // Render pagination controls at TOP
    function renderPaginationControls() {
        const container = document.getElementById('paginationControlsTop');
        if (!container) return;
        
        const totalItems = currentFilteredList.length;
        const totalPages = Math.max(1, Math.ceil(totalItems / ITEMS_PER_PAGE));
        
        let html = `<button class="pagination-btn" id="prevPageBtn" ${currentPage === 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left"></i> Prev</button>`;
        
        const maxVisible = 5;
        let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
        let endPage = Math.min(totalPages, startPage + maxVisible - 1);
        if (endPage - startPage + 1 < maxVisible) startPage = Math.max(1, endPage - maxVisible + 1);
        
        for (let i = startPage; i <= endPage; i++) {
            html += `<button class="pagination-btn page-number ${i === currentPage ? 'active-page' : ''}" data-page="${i}">${i}</button>`;
        }
        
        html += `<button class="pagination-btn" id="nextPageBtn" ${currentPage === totalPages ? 'disabled' : ''}>Next <i class="fa-solid fa-chevron-right"></i></button>`;
        container.innerHTML = html;
        
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        if (prevBtn) prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
        if (nextBtn) nextBtn.addEventListener('click', () => goToPage(currentPage + 1));
        
        document.querySelectorAll('.page-number').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = parseInt(btn.dataset.page);
                if (!isNaN(page)) goToPage(page);
            });
        });
    }

    function goToPage(page) {
        const totalPages = Math.max(1, Math.ceil(currentFilteredList.length / ITEMS_PER_PAGE));
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderPendingTable();
    }

    function renderPendingTable() {
        const tbody = document.getElementById('pendingTableBody');
        if (!tbody) return;
        
        const filtered = getFilteredPending();
        currentFilteredList = filtered;
        const totalPages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;
        
        const startIdx = (currentPage - 1) * ITEMS_PER_PAGE;
        const pageItems = filtered.slice(startIdx, startIdx + ITEMS_PER_PAGE);
        
        // update total pending count
        const totalPending = getPendingOnly().length;
        document.getElementById('totalCount').innerText = totalPending;
        
        if (pageItems.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5"><div class="empty-state"><i class="fa-solid fa-inbox fa-3x mb-3 opacity-50"></i><p class="mb-0">No pending appointment requests.</p><small class="text-muted">All requests have been processed.</small></div></td></tr>`;
            renderPaginationControls();
            return;
        }
        
        // Table columns: Student Details | Email | Appointment ID (NEW) | Service Type | Status | Time | Action
        tbody.innerHTML = pageItems.map(apt => {
            const initials = getInitials(apt.patientName);
            const avatarBg = getAvatarColor(apt.patientName);
            const emailDisplay = apt.email ? escapeHtml(apt.email) : '—';
            const safePatientName = escapeHtml(apt.patientName).replace(/'/g, "&#39;");
            const displayPatientId = `<span class="id-label">ID:</span> ${escapeHtml(apt.patientId)}`;
            const appointmentIdSafe = escapeHtml(apt.appointmentId);
            
            return `<tr data-id="${apt.id}">
                <td>
                    <div class="student-info-wrapper">
                        <div class="profile-avatar" style="background: ${avatarBg};">${escapeHtml(initials)}</div>
                        <div class="student-text">
                            <span class="patient-name">${escapeHtml(apt.patientName)}</span>
                            <span class="patient-id-text">${displayPatientId}</span>
                        </div>
                    </div>
                </td>
                <td class="email-cell"><i class="fa-regular fa-envelope me-1" style="font-size:0.75rem;"></i> ${emailDisplay}</td>
                <td><span class="appointment-id-badge"><i class="fa-solid fa-receipt"></i> ${appointmentIdSafe}</span></td>
                <td>${escapeHtml(apt.service)}</td>
                <td><span class="status-badge-pending"><i class="fa-solid fa-clock me-1"></i>Pending</span></td>
                <td><span class="fw-bold">${escapeHtml(apt.time)}</span></td>
                <td style="text-align: center;">
                    <div class="request-action-buttons">
                        <button class="btn-accept-request" onclick="openAcceptModal('${apt.id}', '${safePatientName}')" title="Accept Request">
                            <i class="fa-solid fa-check"></i>
                        </button>
                        <button class="btn-decline-request" onclick="openDeclineModal('${apt.id}', '${safePatientName}')" title="Decline Request">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </td>
              </tr>`;
        }).join('');
        
        renderPaginationControls();
    }

    function refreshTable() { 
        currentPage = 1; 
        renderPendingTable(); 
    }

    // --- Open Modals for accept / decline ---
    window.openAcceptModal = function(id, name) {
        currentActionId = id;
        currentActionName = name;
        document.getElementById('acceptStudentName').innerText = name;
        acceptModalInstance.show();
    };

    window.openDeclineModal = function(id, name) {
        currentActionId = id;
        currentActionName = name;
        document.getElementById('declineStudentName').innerText = name;
        declineModalInstance.show();
    };

    function executeAccept() {
        if (currentActionId) {
            const index = appointmentsList.findIndex(a => a.id === currentActionId);
            if (index !== -1 && appointmentsList[index].status === 'Pending') {
                appointmentsList[index].status = 'Completed';
                refreshTable();
                showToastMessage(`Request for ${currentActionName} accepted!`, 'success');
            }
            acceptModalInstance.hide();
            currentActionId = null;
        }
    }

    function executeDecline() {
        if (currentActionId) {
            const index = appointmentsList.findIndex(a => a.id === currentActionId);
            if (index !== -1 && appointmentsList[index].status === 'Pending') {
                appointmentsList[index].status = 'Cancelled';
                refreshTable();
                showToastMessage(`Request for ${currentActionName} declined.`, 'danger');
            }
            declineModalInstance.hide();
            currentActionId = null;
        }
    }

    function showToastMessage(message, type) {
        const toast = document.createElement('div');
        toast.className = 'position-fixed bottom-0 end-0 p-3';
        toast.style.zIndex = '9999';
        const icon = type === 'success' ? 'fa-check-circle' : 'fa-times-circle';
        const bgClass = type === 'success' ? 'bg-success' : 'bg-danger';
        toast.innerHTML = `
            <div class="toast align-items-center text-white ${bgClass} border-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="2000">
                <div class="d-flex">
                    <div class="toast-body">
                        <i class="fa-solid ${icon} me-2"></i>
                        ${message}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
        `;
        document.body.appendChild(toast);
        const bsToast = new bootstrap.Toast(toast.querySelector('.toast'), { autohide: true, delay: 2000 });
        bsToast.show();
        toast.addEventListener('hidden.bs.toast', () => toast.remove());
    }

    function setupEventListeners() {
        const searchInput = document.getElementById('searchPendingInput');
        if (searchInput) {
            searchInput.addEventListener('input', () => {
                currentPage = 1;
                renderPendingTable();
            });
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        acceptModalInstance = new bootstrap.Modal(document.getElementById('acceptConfirmModal'), { backdrop: 'static', keyboard: false });
        declineModalInstance = new bootstrap.Modal(document.getElementById('declineConfirmModal'), { backdrop: 'static', keyboard: false });
        
        document.getElementById('confirmAcceptBtn').addEventListener('click', executeAccept);
        document.getElementById('confirmDeclineBtn').addEventListener('click', executeDecline);
        
        setupEventListeners();
        renderPendingTable();
    });

    /* IMPORTANT SCRIPT BECAUSE THIS IS EMBEDDED CLASS OF MY IFRAME DASHBOARD */
    if (window.self === window.top) {
        const currentPagePath = window.location.pathname.split("/").pop();
        if (currentPagePath && !currentPagePath.includes('nursedashboard.html')) {
            window.location.href = "nursedashboard.html?page=nurseappointment.html&subpage=" + currentPagePath;
        }
    }
</script>
</body>
</html>
