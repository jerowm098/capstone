<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration | PUPBC CareLink</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pup-maroon: #9C0C20;
            --medical-blue: #475867;
            --clay-bg: #f0f0f0;
            --clay-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --clay-inset: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
        }

        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://media.istockphoto.com/id/1501183871/photo/doctors-registering-patients-at-the-hospital.jpg?s=612x612&w=0&k=20&c=mnjpoSNO69dNWp11zMmbmMx5S0ch4cG_d-8sMvKzKwI=');
            background-size: cover;
            background-position: center;
            filter: blur(10px);
            transform: scale(1.1);
            z-index: -1;
        }

        .registration-container {
            width: 100%; max-width: 1100px;
            height: 650px;
            background: transparent;
            border-radius: 40px;
            display: grid; grid-template-columns: 1.2fr 1fr;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            position: relative;
            backdrop-filter: blur(5px);
        }

        @media screen and (max-width: 768px) {
            body {
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
                align-items: flex-start;
                padding: 20px;
            }
            .registration-container {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        .brand-side {
            background: linear-gradient(rgba(71, 88, 103, 0.9), rgba(0, 0, 0, 0.5)), 
                        url('https://media.istockphoto.com/id/1501183871/photo/doctors-registering-patients-at-the-hospital.jpg?s=612x612&w=0&k=20&c=mnjpoSNO69dNWp11zMmbmMx5S0ch4cG_d-8sMvKzKwI=');
            background-size: cover;
            background-position: center;
            padding: 4rem;
            display: flex; flex-direction: column; justify-content: center;
            color: white;
            order: 2;
        }

        .form-side {
            padding: 3rem 4rem;
            background: rgba(253, 253, 253, 0.95);
            display: flex; flex-direction: column; justify-content: center;
            order: 1;
        }

        .registration-header h2 { font-weight: 700; color: var(--medical-blue); margin-bottom: 0.5rem; text-align: center; }
        .registration-header p { color: #666; font-size: 0.9rem; margin-bottom: 2rem; text-align: center; }

        .input-box {
            background: var(--clay-bg);
            border-radius: 20px;
            padding: 2px 20px;
            box-shadow: var(--clay-inset);
            display: flex; 
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--medical-blue); }
        .input-box i { 
            color: var(--medical-blue); 
            margin-left: 10px; 
            opacity: 0.6; 
            font-size: 0.9rem;
            cursor: pointer;
        }
        .input-box input, 
        .input-box select {
            background: transparent; 
            border: none; 
            outline: none;
            width: 100%; 
            padding: 10px 0;
            font-size: 0.85rem;
            color: var(--medical-blue);
            font-family: 'Poppins', sans-serif;
        }
        
        .input-box input[readonly] {
            cursor: default;
            background-color: transparent;
            opacity: 0.9;
            font-family: 'Poppins', monospace;
        }
        
        .copy-tooltip { position: relative; }
        .copy-tooltip .tooltip-text {
            visibility: hidden;
            background-color: var(--medical-blue);
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 4px 8px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -40px;
            font-size: 0.7rem;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .copy-tooltip .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: var(--medical-blue) transparent transparent transparent;
        }
        .copy-tooltip.show-tooltip .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
        
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .email-role-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 0;
        }

        .btn-doctor {
            background: var(--medical-blue);
            color: white; border: none; border-radius: 20px;
            padding: 15px; width: 100%; font-weight: 600;
            box-shadow: 0 10px 20px rgba(71, 88, 103, 0.2);
            transition: 0.3s; margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-doctor:hover { transform: translateY(-3px); background: #35424d; }

        .form-footer { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: #888; }
        .form-footer a { color: var(--pup-maroon); text-decoration: none; font-weight: 600; }
        
        .btn-back-footer {
            display: inline-block;
            margin-top: 1rem;
            color: var(--medical-blue) !important;
            font-size: 0.8rem;
            transition: 0.3s;
            text-decoration: none;
        }
        .btn-back-footer:hover { opacity: 1; transform: translateX(-3px); color: var(--pup-maroon) !important; }

        .field-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--medical-blue);
            margin-bottom: 5px;
            margin-left: 12px;
            display: block;
        }
        
        .password-toggle-icon {
            cursor: pointer;
            margin-left: 10px;
            opacity: 0.6;
            transition: opacity 0.2s;
            font-size: 0.9rem;
            color: var(--medical-blue);
        }
        .password-toggle-icon:hover { opacity: 1; }

        /* Modal customization */
        .modal-content {
            border-radius: 28px;
            border: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .modal-header {
            border-bottom: none;
            padding: 1.5rem 1.8rem 0.5rem 1.8rem;
        }
        .modal-body {
            padding: 0.8rem 1.8rem 1.5rem 1.8rem;
            font-size: 1rem;
            color: #2c3e4e;
        }
        .modal-footer {
            border-top: none;
            padding: 0.5rem 1.8rem 1.5rem 1.8rem;
            justify-content: center;
        }
        .modal-icon {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
        }
        .btn-modal-confirm {
            background: var(--medical-blue);
            color: white;
            border-radius: 50px;
            padding: 10px 32px;
            font-weight: 500;
            border: none;
            transition: 0.2s;
        }
        .btn-modal-confirm:hover {
            background: #2c3e4f;
            transform: scale(1.02);
        }
        .staff-id-highlight {
            background: #e8f0fe;
            border-radius: 12px;
            padding: 10px 16px;
            margin-top: 12px;
            font-family: monospace;
            font-size: 1rem;
            font-weight: 600;
            color: var(--medical-blue);
            display: inline-block;
            letter-spacing: 0.5px;
        }
        .login-note {
            font-size: 0.85rem;
            margin-top: 12px;
            color: #2e7d64;
        }
    </style>
</head>
<body>

<div class="registration-container">
    <div class="form-side">
        <div class="registration-header">
            <h2>Staff Registration</h2>
            <p>Join the PUPBC CareLink Medical Team</p>
        </div>

        <form id="registrationForm">
            <div class="input-row">
                <div>
                    <label class="field-label">FIRST NAME</label>
                    <div class="input-box">
                        <input type="text" id="firstName" placeholder="First Name" required>
                    </div>
                </div>
                <div>
                    <label class="field-label">LAST NAME</label>
                    <div class="input-box">
                        <input type="text" id="lastName" placeholder="Last Name" required>
                    </div>
                </div>
            </div>

            <div class="email-role-row">
                <div>
                    <label class="field-label">EMAIL</label>
                    <div class="input-box">
                        <input type="email" id="email" placeholder="doctor@pup.edu.ph" required>
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                </div>
                <div>
                    <label class="field-label">YOUR ID NUMBER</label>
                    <div class="input-box copy-tooltip" id="idNumberContainer">
                        <input type="text" id="staffIdField" value="2026-001234-RN-0" readonly>
                        <i class="fa-regular fa-copy" id="copyIdIcon" style="cursor: pointer;"></i>
                        <span class="tooltip-text">Copied!</span>
                    </div>
                </div>
            </div>

            <div class="input-row" style="margin-top: 5px;">
                <div>
                    <label class="field-label">PASSWORD</label>
                    <div class="input-box">
                        <input type="password" id="passwordField" placeholder="••••••••" required>
                        <i class="fa-regular fa-eye-slash password-toggle-icon" id="togglePassword"></i>
                    </div>
                </div>
                <div>
                    <label class="field-label">CONFIRM PASSWORD</label>
                    <div class="input-box">
                        <input type="password" id="confirmPasswordField" placeholder="••••••••" required>
                        <i class="fa-regular fa-eye-slash password-toggle-icon" id="toggleConfirmPassword"></i>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-doctor">
                COMPLETE REGISTRATION <i class="fa-solid fa-user-doctor ms-2"></i>
            </button>
        </form>

        <div class="form-footer">
            Already have an account? <br>
            <a href="nurselogin.html">Login Here</a>
            <br>
            <a href="portalmain.html" class="btn-back-footer">
                <i class="fa-solid fa-arrow-left-long"></i> Back to Portal
            </a>
        </div>
    </div>

    <div class="brand-side">
        <h1 class="display-4 fw-bold">Medical<br>Enrollment</h1>
        <p class="lead opacity-75">Professional Healthcare Management System.</p>
        <div class="mt-4">
            <div class="d-flex align-items-center mb-3">
                <i class="fa-solid fa-id-card-clip me-3"></i>
                <span>Credential Verification</span>
            </div>
            <div class="d-flex align-items-center">
                <i class="fa-solid fa-house-medical-circle-check me-3"></i>
                <span>Staff Account Security</span>
            </div>
        </div>
    </div>
</div>

<!-- MODAL COMPONENT (Single dynamic modal for all messages) -->
<div class="modal fade" id="universalModal" data-bs-backdrop="static" data-bs-keyboard="true" tabindex="-1" aria-labelledby="universalModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center">
            <div class="modal-header justify-content-center border-0 pb-0">
                <div id="modalIconArea" class="modal-icon">
                    <i class="fa-regular fa-circle-check" style="color: #2e7d64;"></i>
                </div>
            </div>
            <div class="modal-body">
                <h5 class="fw-bold mb-3" id="modalTitle" style="color: #2c3e4f;">Notification</h5>
                <p id="modalMessage" class="mb-2">This is a modal message.</p>
                <div id="modalExtraDetails" class="duplicate-details" style="display: none;"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-modal-confirm" id="modalConfirmBtn">Got it</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function() {
        // DOM elements
        const passwordField = document.getElementById('passwordField');
        const togglePassword = document.getElementById('togglePassword');
        const confirmField = document.getElementById('confirmPasswordField');
        const toggleConfirm = document.getElementById('toggleConfirmPassword');
        const staffIdField = document.getElementById('staffIdField');
        const copyIcon = document.getElementById('copyIdIcon');
        const tooltipContainer = document.getElementById('idNumberContainer');
        const form = document.getElementById('registrationForm');
        
        // Form fields for clearing
        const firstNameField = document.getElementById('firstName');
        const lastNameField = document.getElementById('lastName');
        const emailField = document.getElementById('email');
        
        // Variables for redirect after success modal closes
        let pendingRedirect = false;
        let redirectUrl = '';
        
        // ======================== RANDOM STAFF ID GENERATOR ========================
        function generateRandomStaffId() {
            const currentYear = new Date().getFullYear();
            const randomNum = Math.floor(Math.random() * 99999) + 1;
            const paddedNumber = randomNum.toString().padStart(5, '0');
            return `${currentYear}-${paddedNumber}-RN-0`;
        }
        
        function refreshStaffId() {
            if (staffIdField) {
                const newId = generateRandomStaffId();
                staffIdField.value = newId;
                console.log("New Staff ID generated:", newId);
            }
        }
        
        // Generate initial random Staff ID on page load
        refreshStaffId();
        
        // Add refresh icon for staff ID
        const idContainer = document.getElementById('idNumberContainer');
        if (idContainer && !document.getElementById('refreshIdIcon')) {
            const refreshIcon = document.createElement('i');
            refreshIcon.id = 'refreshIdIcon';
            refreshIcon.className = 'fa-solid fa-arrows-rotate';
            refreshIcon.style.cursor = 'pointer';
            refreshIcon.style.marginLeft = '12px';
            refreshIcon.style.opacity = '0.6';
            refreshIcon.style.transition = 'opacity 0.2s';
            refreshIcon.style.fontSize = '0.9rem';
            refreshIcon.style.color = 'var(--medical-blue)';
            refreshIcon.title = 'Generate new Staff ID';
            
            const copyIconElement = document.getElementById('copyIdIcon');
            if (copyIconElement) {
                idContainer.insertBefore(refreshIcon, copyIconElement);
            } else {
                idContainer.appendChild(refreshIcon);
            }
            
            refreshIcon.addEventListener('mouseenter', () => { refreshIcon.style.opacity = '1'; });
            refreshIcon.addEventListener('mouseleave', () => { refreshIcon.style.opacity = '0.6'; });
            
            refreshIcon.addEventListener('click', function(e) {
                e.preventDefault();
                refreshStaffId();
                staffIdField.style.transition = '0.2s';
                staffIdField.style.backgroundColor = '#e8f0fe';
                setTimeout(() => {
                    staffIdField.style.backgroundColor = '';
                }, 300);
            });
        }
        
        // Modal controller
        let modalInstance = null;
        const modalElement = document.getElementById('universalModal');
        if (modalElement) {
            modalInstance = new bootstrap.Modal(modalElement);
        }
        
        // Helper function to show modal with custom confirm handler
        function showModalDialog(title, message, type = 'info', extraHtml = '', onConfirm = null) {
            const modalTitleEl = document.getElementById('modalTitle');
            const modalMessageEl = document.getElementById('modalMessage');
            const modalIconArea = document.getElementById('modalIconArea');
            const extraDetailsDiv = document.getElementById('modalExtraDetails');
            const confirmBtn = document.getElementById('modalConfirmBtn');
            
            if (!modalTitleEl || !modalMessageEl || !modalIconArea || !extraDetailsDiv) return;
            
            let iconHtml = '';
            switch(type) {
                case 'success':
                    iconHtml = '<i class="fa-regular fa-circle-check" style="font-size: 3rem; color: #2e7d64;"></i>';
                    break;
                case 'error':
                    iconHtml = '<i class="fa-solid fa-circle-exclamation" style="font-size: 3rem; color: #9C0C20;"></i>';
                    break;
                case 'warning':
                    iconHtml = '<i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem; color: #e67e22;"></i>';
                    break;
                default:
                    iconHtml = '<i class="fa-regular fa-bell" style="font-size: 3rem; color: #475867;"></i>';
            }
            modalIconArea.innerHTML = iconHtml;
            modalTitleEl.innerText = title;
            modalMessageEl.innerText = message;
            
            if (extraHtml && extraHtml.trim() !== '') {
                extraDetailsDiv.innerHTML = extraHtml;
                extraDetailsDiv.style.display = 'block';
            } else {
                extraDetailsDiv.style.display = 'none';
                extraDetailsDiv.innerHTML = '';
            }
            
            // Remove previous event listeners by cloning and replacing
            const newConfirmBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);
            
            // Set up new click handler
            newConfirmBtn.addEventListener('click', function() {
                if (modalInstance) modalInstance.hide();
                if (onConfirm && typeof onConfirm === 'function') {
                    onConfirm();
                }
            });
            
            if (modalInstance) modalInstance.show();
        }
        
        // Function to clear all form fields
        function clearAllFormFields() {
            if (firstNameField) firstNameField.value = '';
            if (lastNameField) lastNameField.value = '';
            if (emailField) emailField.value = '';
            if (passwordField) passwordField.value = '';
            if (confirmField) confirmField.value = '';
            // Generate a new random Staff ID for the next registration
            refreshStaffId();
            console.log("All form fields cleared");
        }
        
        // Function to redirect to login page
        function redirectToLogin() {
            window.location.href = 'nurselogin.html';
        }
        
        // Password toggle
        function toggleVisibility(inputField, toggleIcon) {
            if (inputField.type === 'password') {
                inputField.type = 'text';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            } else {
                inputField.type = 'password';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            }
        }
        
        if (togglePassword) {
            togglePassword.addEventListener('click', () => toggleVisibility(passwordField, togglePassword));
        }
        if (toggleConfirm) {
            toggleConfirm.addEventListener('click', () => toggleVisibility(confirmField, toggleConfirm));
        }
        
        // Copy ID functionality
        if (copyIcon && staffIdField) {
            copyIcon.addEventListener('click', function(e) {
                e.preventDefault();
                staffIdField.select();
                staffIdField.setSelectionRange(0, 99999);
                try {
                    const successful = document.execCommand('copy');
                    if (successful && tooltipContainer) {
                        tooltipContainer.classList.add('show-tooltip');
                        setTimeout(() => tooltipContainer.classList.remove('show-tooltip'), 1500);
                    }
                } catch (err) {
                    console.error('Copy failed');
                }
                staffIdField.blur();
            });
        }
        
        // Server save
        async function saveToServer(userData) {
            try {
                const response = await fetch('nurseregistersave.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                const result = await response.json();
                return result;
            } catch (error) {
                console.error('Network error:', error);
                return { success: false, message: 'Network error: Unable to connect to server. Is PHP running?', network_error: true };
            }
        }
        
        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const firstName = firstNameField.value.trim();
            const lastName = lastNameField.value.trim();
            const email = emailField.value.trim();
            const password = passwordField.value.trim();
            const confirm = confirmField.value.trim();
            const staffId = staffIdField.value.trim();
            
            // Client-side validations
            if (!firstName) {
                showModalDialog('Missing Field', 'First name is required.', 'warning');
                return;
            }
            if (!lastName) {
                showModalDialog('Missing Field', 'Last name is required.', 'warning');
                return;
            }
            if (!email) {
                showModalDialog('Invalid Email', 'Please enter your email address.', 'warning');
                return;
            }
            const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            if (!emailPattern.test(email)) {
                showModalDialog('Invalid Email Format', 'Please provide a valid email address (e.g., name@domain.com).', 'error');
                return;
            }
            if (password !== confirm) {
                showModalDialog('Password Mismatch', 'The passwords you entered do not match. Please re-enter.', 'error');
                return;
            }
            if (password.length < 6) {
                showModalDialog('Weak Password', 'Password must be at least 6 characters long for security.', 'warning');
                return;
            }
            
            const registrationData = {
                firstName: firstName,
                lastName: lastName,
                email: email,
                staffId: staffId,
                password: password,
                registeredAt: new Date().toISOString(),
                role: "Medical Staff"
            };
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            
            const serverResponse = await saveToServer(registrationData);
            
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnText;
            
            if (serverResponse.success) {
                // Store the staff ID for success message
                const generatedStaffId = staffId;
                
                // Success message with "Your nurse/staff ID" format
                const welcomeMsg = `Welcome ${escapeHtml(firstName)} ${escapeHtml(lastName)}! Your account has been created.`;
                
                // Create extra HTML showing the staff ID with proper label "Your nurse/staff ID:"
                const cleanExtraHtml = `
                    <div class="mt-3">
                        <div class="staff-id-highlight">
                            <i class="fa-regular fa-id-card me-2"></i>Your nurse/staff ID: ${escapeHtml(generatedStaffId)}
                        </div>
                        <div class="login-note">
                            <i class="fa-regular fa-bell me-1"></i> You will be redirected to the login page.
                        </div>
                    </div>
                `;
                
                // Show success modal with redirect after close
                showModalDialog(
                    'Registration Successful!',
                    welcomeMsg,
                    'success',
                    cleanExtraHtml,
                    function() {
                        // After modal closes: clear all form fields and redirect to login
                        clearAllFormFields();
                        redirectToLogin();
                    }
                );
                
                console.log("Registration saved:", registrationData);
            } 
            else {
                // ERROR handling
                let titleMsg = 'Registration Failed';
                let modalType = 'error';
                let finalMessage = serverResponse.message || 'Registration could not be completed due to duplicate or server error.';
                
                if (serverResponse.duplicate_field === 'email') {
                    titleMsg = 'Duplicate Email Address';
                    const emailValue = escapeHtml(email);
                    finalMessage = `Duplicate registration! This email "${emailValue}" is already registered. Please use a different email address to register.`;
                } 
                else if (serverResponse.duplicate_field === 'staffId') {
                    titleMsg = 'Duplicate Staff ID';
                    const staffIdValue = escapeHtml(staffId);
                    finalMessage = `Duplicate registration! This Staff ID "${staffIdValue}" is already registered. Please use a different Staff ID to register.`;
                    refreshStaffId();
                }
                else {
                    finalMessage = serverResponse.message || 'Registration could not be completed. Please try again.';
                }
                
                showModalDialog(titleMsg, finalMessage, modalType, '');
            }
        });
        
        console.log("Random Staff ID active — After success: form clears and redirects to nurselogin.html");
        
        // Override alert to prevent any native alerts
        window.originalAlert = window.alert;
        window.alert = function(message) {
            console.warn("Alert blocked and converted to modal:", message);
            showModalDialog("System Notice", String(message), "info");
        };
    })();
</script>
</body>
